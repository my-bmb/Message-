<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Video Call with {{ other_user.username }} - Professional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .status-bar {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
            position: relative;
        }
        .call-timer {
            font-family: monospace;
            font-weight: 600;
            background: rgba(0,0,0,0.5);
            padding: 3px 10px;
            border-radius: 30px;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }
        .connection-badge {
            background: #f39c12;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 0.65rem;
            font-weight: 600;
            margin-left: 10px;
        }
        .connection-badge.connected { background: #2ecc71; }
        .connection-badge.failed { background: #e11d48; }
        .connection-badge.checking { background: #f39c12; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        
        .video-container {
            position: relative;
            flex: 1;
            background: #000;
            overflow: hidden;
        }
        
        .video-box.large {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            z-index: 1;
        }
        .video-box.large video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-box.small {
            position: absolute;
            width: 170px;
            height: auto;
            aspect-ratio: 9 / 16;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            cursor: grab;
            z-index: 20;
            transition: box-shadow 0.2s;
            top: 20px;
            right: 20px;
            left: auto;
            bottom: auto;
        }
        .video-box.small:active { cursor: grabbing; }
        .video-box.small.dragging {
            opacity: 0.9;
            box-shadow: 0 12px 25px rgba(0,0,0,0.5);
            border-color: #2ecc71;
        }
        .video-box.small video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        @media (max-width: 768px) {
            .video-box.small { width: 130px; top: 15px; right: 15px; }
        }
        @media (max-width: 480px) {
            .video-box.small { width: 110px; top: 10px; right: 10px; }
        }
        
        .user-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            color: white;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            z-index: 15;
            pointer-events: none;
        }
        
        .swap-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            z-index: 25;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            opacity: 0.95;
        }
        .swap-btn:hover {
            background: #2ecc71;
            transform: scale(1.05);
            opacity: 1;
        }
        
        .connecting-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .spinner-ring {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid #2ecc71;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .controls-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 16px 25px 16px;
            background: transparent;
            z-index: 200;
            pointer-events: none;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            background: transparent;
            padding: 0;
            border: none;
            pointer-events: auto;
        }
        .control-btn {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .control-btn:hover {
            transform: scale(1.08);
            background: rgba(0, 0, 0, 0.8);
            border-color: rgba(255,255,255,0.3);
        }
        .control-btn.active {
            background: #e11d48;
            border-color: #e11d48;
            color: white;
        }
        .end-call-btn {
            background: #e11d48;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.4rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 10px rgba(225,29,72,0.3);
        }
        .end-call-btn:hover {
            transform: scale(1.06);
            background: #be123c;
        }
        
        .incoming-popup {
            position: fixed;
            bottom: 85px;
            left: 20px;
            right: 20px;
            max-width: 350px;
            margin: 0 auto;
            background: rgba(20, 25, 45, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 10px 18px;
            display: none;
            align-items: center;
            justify-content: space-between;
            z-index: 300;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 2px solid #34d399;
            font-size: 0.85rem;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .incoming-popup span i {
            margin-right: 8px;
            color: #34d399;
            font-size: 1rem;
        }
        .incoming-popup button {
            background: none;
            border: none;
            font-size: 1.5rem;
            margin: 0 4px;
            cursor: pointer;
        }
        .accept-btn { color: #34d399; }
        .reject-btn { color: #f87171; }
        
        .toast-msg {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #e2e8f0;
            z-index: 350;
            display: none;
            white-space: nowrap;
            pointer-events: none;
        }
        
        .quality-badge {
            position: fixed;
            top: 50px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-family: monospace;
            z-index: 100;
            color: #2ecc71;
        }
        
        .debug-panel {
            position: fixed;
            bottom: 10px;
            left: 10px;
            width: 400px;
            max-height: 250px;
            background: rgba(0, 0, 0, 0.95);
            border-radius: 12px;
            border-left: 3px solid #2ecc71;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            z-index: 500;
            overflow-y: auto;
            padding: 8px;
            color: #0f0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .debug-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            margin-bottom: 6px;
            padding-bottom: 4px;
            font-weight: bold;
            font-size: 11px;
            color: #fff;
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.95);
        }
        .debug-panel-header button {
            background: #dc2626;
            border: none;
            color: white;
            border-radius: 4px;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 9px;
        }
        .debug-entry {
            border-bottom: 1px solid #222;
            padding: 3px 0;
            font-size: 9px;
            word-break: break-word;
        }
        .debug-time { color: #888; margin-right: 6px; }
        .debug-error { color: #f87171; }
        .debug-warn { color: #fbbf24; }
        .debug-success { color: #34d399; }
        .debug-info { color: #60a5fa; }
        .debug-critical { color: #ff6b6b; background: #330000; font-weight: bold; }
        
        @media (max-width: 768px) {
            .debug-panel { width: 300px; max-height: 200px; font-size: 8px; bottom: 5px; left: 5px; }
            .video-box.small { width: 130px; top: 15px; right: 15px; }
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <span><i class="fas fa-video"></i> Video Call <span id="userIdDisplay" style="font-size:10px;color:#888;"></span></span>
        <div>
            <span class="call-timer" id="timerDisplay">00:00</span>
            <span class="connection-badge" id="connectionStatus">Initializing</span>
        </div>
    </div>

    <div class="video-container" id="videoContainer">
        <div id="remoteBox" class="video-box large">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="user-label"><i class="fas fa-user"></i> {{ other_user.username }}</div>
            <button class="swap-btn" id="swapToRemoteBtn" title="Swap"><i class="fas fa-exchange-alt"></i></button>
            <div id="remoteConnectingOverlay" class="connecting-overlay" style="display: none;">
                <div class="spinner-ring"></div>
            </div>
        </div>
        
        <div id="localBox" class="video-box small">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="user-label"><i class="fas fa-user"></i> You</div>
            <button class="swap-btn" id="swapToLocalBtn" title="Swap"><i class="fas fa-exchange-alt"></i></button>
            <div id="localConnectingOverlay" class="connecting-overlay" style="display: none;">
                <div class="spinner-ring"></div>
            </div>
        </div>
    </div>
    
    <div id="qualityBadge" class="quality-badge">📡 Connecting...</div>

    <div class="controls-wrapper">
        <div class="controls">
            <button class="control-btn" id="muteBtn" title="Mute"><i class="fas fa-microphone"></i></button>
            <button class="control-btn" id="videoToggleBtn" title="Camera"><i class="fas fa-video"></i></button>
            <button class="control-btn" id="cameraSwitchBtn" title="Switch camera"><i class="fas fa-sync-alt"></i></button>
            <button class="control-btn" id="fullscreenBtn" title="Fullscreen"><i class="fas fa-expand"></i></button>
            <button class="end-call-btn" id="endCallBtn"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <div id="incomingPopup" class="incoming-popup">
        <span><i class="fas fa-video fa-shake"></i> 📞 Incoming video call from <strong id="callerName"></strong></span>
        <div>
            <button id="acceptCallBtn" class="accept-btn"><i class="fas fa-check-circle"></i> Accept</button>
            <button id="rejectCallBtn" class="reject-btn"><i class="fas fa-times-circle"></i> Reject</button>
        </div>
    </div>
    <div id="toastMsg" class="toast-msg"></div>
    
    <div class="debug-panel" id="debugPanel">
        <div class="debug-panel-header">
            <span>🎥 VIDEO CALL - CALL MANAGER ACTIVE</span>
            <button id="clearDebugBtn">Clear</button>
        </div>
        <div id="debugLogs">
            <div class="debug-entry"><span class="debug-time">[Init]</span> <span class="debug-success">CallManager v3.0 initialized</span></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // ==================== DEBUG LOGGER ====================
        const DebugLogger = {
            logs: [],
            
            log: function(message, type = 'info', category = 'general') {
                const timestamp = new Date().toLocaleTimeString();
                const logEntry = { timestamp, message, type, category };
                this.logs.unshift(logEntry);
                if (this.logs.length > 200) this.logs.pop();
                
                const styles = {
                    error: 'background: #e11d48; color: white; padding: 2px 4px; border-radius: 3px;',
                    warn: 'background: #f39c12; color: black; padding: 2px 4px; border-radius: 3px;',
                    success: 'background: #2ecc71; color: black; padding: 2px 4px; border-radius: 3px;',
                    info: 'background: #3498db; color: white; padding: 2px 4px; border-radius: 3px;',
                    critical: 'background: #ff0000; color: white; padding: 2px 4px; border-radius: 3px; font-weight: bold;'
                };
                const style = styles[type] || styles.info;
                console.log(`%c[${timestamp}] [${category}] ${message}`, style);
                this.updateUI(logEntry);
            },
            
            error: function(msg, cat) { this.log(msg, 'error', cat); },
            warn: function(msg, cat) { this.log(msg, 'warn', cat); },
            success: function(msg, cat) { this.log(msg, 'success', cat); },
            info: function(msg, cat) { this.log(msg, 'info', cat); },
            critical: function(msg, cat) { this.log(msg, 'critical', cat); },
            
            updateUI: function(entry) {
                const container = document.getElementById('debugLogs');
                if (!container) return;
                
                const typeClass = {
                    error: 'debug-error', warn: 'debug-warn', success: 'debug-success',
                    info: 'debug-info', critical: 'debug-critical'
                }[entry.type] || 'debug-info';
                
                const div = document.createElement('div');
                div.className = 'debug-entry';
                div.innerHTML = `<span class="debug-time">[${entry.timestamp}]</span> <span class="${typeClass}">[${entry.category.toUpperCase()}]</span> ${this.escapeHtml(entry.message)}`;
                container.insertBefore(div, container.firstChild);
                
                while (container.children.length > 150) {
                    container.removeChild(container.lastChild);
                }
            },
            
            escapeHtml: function(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        };
        
        document.getElementById('clearDebugBtn')?.addEventListener('click', () => {
            const container = document.getElementById('debugLogs');
            if (container) {
                container.innerHTML = '<div class="debug-entry"><span class="debug-time">[Cleared]</span> <span class="debug-info">Logs cleared</span></div>';
            }
            DebugLogger.logs = [];
        });
        
        // ==================== VIDEO CALL MANAGER CLASS ====================
        class VideoCallManager {
            constructor(config = {}) {
                this.config = {
                    callTimeout: config.callTimeout || 35000,
                    iceTimeout: config.iceTimeout || 12000,
                    reconnectAttempts: config.reconnectAttempts || 10,
                    reconnectDelay: config.reconnectDelay || 1000,
                    debug: config.debug !== false,
                    enableTURN: config.enableTURN !== false,
                    ...config
                };
                
                this.socket = null;
                this.peerConnection = null;
                this.localStream = null;
                this.remoteStream = null;
                this.pendingIceCandidates = [];
                this.isCallActive = false;
                this.isCaller = false;
                this.callStartTime = null;
                this.callTimer = null;
                this.iceCandidateCount = 0;
                this.currentUserId = null;
                this.currentUserName = null;
                this.targetUserId = null;
                this.targetUserName = null;
                this.callType = 'video';
                this.callTimeoutId = null;
                this.reconnectAttempt = 0;
                
                this.callbacks = {
                    onIncomingCall: null,
                    onCallAccepted: null,
                    onCallRejected: null,
                    onCallEnded: null,
                    onCallError: null,
                    onLocalStreamReady: null,
                    onRemoteStreamReady: null,
                    onConnectionStateChange: null,
                    onIceStateChange: null,
                    onCallTimer: null
                };
                
                this.videoConstraints = {
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } },
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                };
                
                this.iceServers = this.getIceServers();
                this.init();
            }
            
            getIceServers() {
                const servers = [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'stun:stun3.l.google.com:19302' },
                    { urls: 'stun:stun4.l.google.com:19302' },
                    { urls: 'stun:stun.stunprotocol.org:3478' }
                ];
                
                if (this.config.enableTURN) {
                    servers.push(
                        { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                        { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
                    );
                }
                return servers;
            }
            
            init() {
                this.debug('success', 'VideoCallManager initialized');
                this.setupSocket();
                this.setupBeforeUnload();
            }
            
            setupSocket() {
                this.socket = io({
                    reconnection: true,
                    reconnectionAttempts: this.config.reconnectAttempts,
                    reconnectionDelay: this.config.reconnectDelay,
                    timeout: 20000
                });
                
                this.socket.on('connect', () => {
                    this.debug('success', `Socket connected! ID: ${this.socket.id}`);
                    this.reconnectAttempt = 0;
                    
                    if (this.currentUserId) {
                        this.registerUser(this.currentUserId, this.currentUserName);
                    }
                    
                    this.checkPendingCalls();
                });
                
                this.socket.on('disconnect', () => {
                    this.debug('warn', 'Socket disconnected!');
                    if (this.isCallActive) {
                        this.handleCallError('Connection lost');
                    }
                });
                
                this.socket.on('connect_error', (err) => {
                    this.debug('error', `Socket error: ${err.message}`);
                    this.reconnectAttempt++;
                });
                
                this.socket.on('incoming_call', (data) => this.handleIncomingCall(data));
                this.socket.on('call_answered', (data) => this.handleCallAnswered(data));
                this.socket.on('ice_candidate', (data) => this.handleIceCandidate(data));
                this.socket.on('call_ended', () => this.handleCallEnded());
                this.socket.on('call_rejected', () => this.handleCallRejected());
                this.socket.on('call_timeout', () => this.handleCallTimeout());
                this.socket.on('call_error', (err) => this.handleCallError(err.message));
                this.socket.on('user_registered', (data) => {
                    this.debug('success', `User registered: ${data.user_id}`);
                });
            }
            
            registerUser(userId, userName = null) {
                this.currentUserId = userId;
                this.currentUserName = userName;
                
                if (this.socket && this.socket.connected) {
                    this.socket.emit('register_user', { user_id: userId, user_name: userName });
                    this.debug('info', `Registered user: ${userId}`);
                    return true;
                }
                return false;
            }
            
            async startCall(targetUserId, targetUserName) {
                this.debug('critical', `========== STARTING VIDEO CALL to ${targetUserId} ==========`);
                
                if (!targetUserId) {
                    this.debug('error', 'No target user');
                    return false;
                }
                
                if (this.isCallActive) {
                    await this.endCall();
                }
                
                this.targetUserId = targetUserId;
                this.targetUserName = targetUserName;
                this.isCaller = true;
                
                if (!this.socket || !this.socket.connected) {
                    this.debug('info', 'Waiting for socket...');
                    await this.waitForSocket();
                }
                
                try {
                    this.debug('info', 'Requesting camera and microphone...');
                    this.localStream = await navigator.mediaDevices.getUserMedia(this.videoConstraints);
                    
                    const videoTrack = this.localStream.getVideoTracks()[0];
                    const audioTrack = this.localStream.getAudioTracks()[0];
                    this.debug('success', `Camera: ${videoTrack?.label || 'active'}`);
                    this.debug('success', `Microphone: ${audioTrack?.label || 'active'}`);
                    
                    if (this.callbacks.onLocalStreamReady) {
                        this.callbacks.onLocalStreamReady(this.localStream);
                    }
                    
                    await this.createPeerConnection();
                    
                    this.localStream.getTracks().forEach(track => {
                        this.peerConnection.addTrack(track, this.localStream);
                        this.debug('info', `Added ${track.kind} track`);
                    });
                    
                    this.debug('info', 'Creating offer...');
                    const offer = await this.peerConnection.createOffer({
                        offerToReceiveVideo: true,
                        offerToReceiveAudio: true
                    });
                    await this.peerConnection.setLocalDescription(offer);
                    this.debug('success', 'Offer created');
                    
                    this.socket.emit('call_user', {
                        target_id: targetUserId,
                        caller_id: this.currentUserId,
                        caller_name: this.currentUserName,
                        call_type: 'video',
                        offer: this.peerConnection.localDescription
                    });
                    this.debug('socket', `Call offer sent to ${targetUserId}`);
                    
                    this.setCallTimeout();
                    this.isCallActive = true;
                    this.saveCallState();
                    
                    return true;
                    
                } catch (err) {
                    this.debug('error', `Start call failed: ${err.message}`);
                    this.cleanupCall();
                    
                    let msg = 'Camera/Mic access denied';
                    if (err.name === 'NotAllowedError') msg = 'Please allow camera and microphone access';
                    if (err.name === 'NotFoundError') msg = 'No camera or microphone found';
                    if (this.callbacks.onCallError) this.callbacks.onCallError(msg);
                    return false;
                }
            }
            
            async acceptCall(callData) {
                this.debug('critical', `========== ACCEPTING VIDEO CALL from ${callData.caller_id} ==========`);
                
                this.targetUserId = callData.caller_id;
                this.targetUserName = callData.caller_name;
                this.isCaller = false;
                
                try {
                    this.debug('info', 'Requesting camera and microphone...');
                    this.localStream = await navigator.mediaDevices.getUserMedia(this.videoConstraints);
                    
                    const videoTrack = this.localStream.getVideoTracks()[0];
                    const audioTrack = this.localStream.getAudioTracks()[0];
                    this.debug('success', `Camera: ${videoTrack?.label || 'active'}`);
                    this.debug('success', `Microphone: ${audioTrack?.label || 'active'}`);
                    
                    if (this.callbacks.onLocalStreamReady) {
                        this.callbacks.onLocalStreamReady(this.localStream);
                    }
                    
                    await this.createPeerConnection();
                    
                    this.localStream.getTracks().forEach(track => {
                        this.peerConnection.addTrack(track, this.localStream);
                        this.debug('info', `Added ${track.kind} track`);
                    });
                    
                    this.debug('info', 'Setting remote description...');
                    await this.peerConnection.setRemoteDescription(new RTCSessionDescription(callData.offer));
                    this.debug('success', 'Remote description set');
                    
                    this.debug('info', 'Creating answer...');
                    const answer = await this.peerConnection.createAnswer();
                    await this.peerConnection.setLocalDescription(answer);
                    this.debug('success', 'Answer created');
                    
                    this.socket.emit('answer_call', {
                        caller_id: callData.caller_id,
                        answer: this.peerConnection.localDescription,
                        call_type: 'video'
                    });
                    this.debug('socket', `Answer sent to ${callData.caller_id}`);
                    
                    this.isCallActive = true;
                    this.saveCallState();
                    
                    if (this.callbacks.onCallAccepted) {
                        this.callbacks.onCallAccepted(callData.caller_id);
                    }
                    
                    return true;
                    
                } catch (err) {
                    this.debug('error', `Accept failed: ${err.message}`);
                    this.cleanupCall();
                    if (this.callbacks.onCallError) this.callbacks.onCallError('Failed to accept call');
                    return false;
                }
            }
            
            rejectCall(callerId) {
                this.debug('info', `Rejecting call from ${callerId}`);
                if (this.socket && this.socket.connected) {
                    this.socket.emit('reject_call', { caller_id: callerId });
                }
                if (this.callbacks.onCallRejected) {
                    this.callbacks.onCallRejected(callerId);
                }
            }
            
            async endCall() {
                this.debug('info', 'Ending call...');
                
                if (this.socket && this.socket.connected && this.targetUserId) {
                    this.socket.emit('end_call', { target_id: this.targetUserId });
                }
                
                this.cleanupCall();
                
                if (this.callbacks.onCallEnded) {
                    this.callbacks.onCallEnded();
                }
            }
            
            async createPeerConnection() {
                if (this.peerConnection) {
                    this.peerConnection.close();
                    this.peerConnection = null;
                }
                
                const config = {
                    iceServers: this.iceServers,
                    iceCandidatePoolSize: 10,
                    bundlePolicy: 'max-bundle',
                    rtcpMuxPolicy: 'require'
                };
                
                this.peerConnection = new RTCPeerConnection(config);
                this.debug('success', 'PeerConnection created');
                
                this.peerConnection.ontrack = (event) => {
                    this.debug('success', `Received ${event.track.kind} track from remote`);
                    if (event.streams && event.streams[0]) {
                        this.remoteStream = event.streams[0];
                        if (this.callbacks.onRemoteStreamReady) {
                            this.callbacks.onRemoteStreamReady(this.remoteStream);
                        }
                    }
                };
                
                this.peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        this.iceCandidateCount++;
                        this.debug('ice', `Sending ICE #${this.iceCandidateCount} (${event.candidate.type})`);
                        
                        if (this.socket && this.socket.connected && this.targetUserId) {
                            this.socket.emit('ice_candidate', {
                                target_id: this.targetUserId,
                                candidate: event.candidate
                            });
                        }
                    } else {
                        this.debug('success', `ICE gathering complete - ${this.iceCandidateCount} candidates`);
                    }
                };
                
                this.peerConnection.onicegatheringstatechange = () => {
                    this.debug('ice', `ICE gathering state: ${this.peerConnection.iceGatheringState}`);
                };
                
                this.peerConnection.oniceconnectionstatechange = () => {
                    const state = this.peerConnection.iceConnectionState;
                    this.debug('ice', `ICE connection state: ${state}`);
                    
                    if (this.callbacks.onIceStateChange) {
                        this.callbacks.onIceStateChange(state);
                    }
                    
                    if (state === 'connected' || state === 'completed') {
                        this.debug('success', '🎉 ICE connection established!');
                        this.clearCallTimeout();
                        this.startCallTimer();
                        if (this.callbacks.onConnectionStateChange) {
                            this.callbacks.onConnectionStateChange('connected');
                        }
                    } else if (state === 'failed') {
                        this.debug('error', '❌ ICE connection failed!');
                        this.handleCallError('Connection failed');
                    } else if (state === 'checking') {
                        this.debug('info', 'ICE checking - establishing connection...');
                        if (this.callbacks.onConnectionStateChange) {
                            this.callbacks.onConnectionStateChange('connecting');
                        }
                    } else if (state === 'disconnected') {
                        this.debug('warn', 'ICE disconnected - connection unstable');
                        if (this.callbacks.onConnectionStateChange) {
                            this.callbacks.onConnectionStateChange('unstable');
                        }
                    }
                };
                
                this.peerConnection.onconnectionstatechange = () => {
                    this.debug('info', `Connection state: ${this.peerConnection.connectionState}`);
                };
                
                this.peerConnection.onsignalingstatechange = () => {
                    this.debug('info', `Signaling state: ${this.peerConnection.signalingState}`);
                };
                
                // Fix for queued ICE candidates
                const originalSetRemoteDesc = this.peerConnection.setRemoteDescription;
                this.peerConnection.setRemoteDescription = async (desc) => {
                    this.debug('info', `Setting remote description: ${desc.type}`);
                    const result = await originalSetRemoteDesc.call(this.peerConnection, desc);
                    
                    if (this.pendingIceCandidates.length > 0) {
                        this.debug('ice', `Processing ${this.pendingIceCandidates.length} queued candidates`);
                        for (const candidate of this.pendingIceCandidates) {
                            try {
                                await this.peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                                this.debug('success', 'Queued ICE candidate added');
                            } catch(e) {
                                this.debug('warn', `Failed to add queued candidate: ${e.message}`);
                            }
                        }
                        this.pendingIceCandidates = [];
                    }
                    return result;
                };
            }
            
            handleIncomingCall(data) {
                this.debug('critical', `🔔 INCOMING VIDEO CALL from ${data.caller_id} (${data.caller_name})`);
                
                // Save to sessionStorage
                sessionStorage.setItem('pending_video_call', JSON.stringify({
                    callerId: data.caller_id,
                    callerName: data.caller_name,
                    offer: data.offer,
                    timestamp: Date.now()
                }));
                
                if (this.callbacks.onIncomingCall) {
                    this.callbacks.onIncomingCall({
                        callerId: data.caller_id,
                        callerName: data.caller_name,
                        callType: data.call_type,
                        offer: data.offer
                    });
                }
            }
            
            handleCallAnswered(data) {
                this.debug('success', `Call answered by remote!`);
                this.clearCallTimeout();
                this.startCallTimer();
                
                if (this.peerConnection && this.peerConnection.signalingState === 'have-local-offer') {
                    this.peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer))
                        .then(() => {
                            this.debug('success', 'Remote description set from answer');
                            if (this.callbacks.onCallAccepted) {
                                this.callbacks.onCallAccepted(this.targetUserId);
                            }
                        })
                        .catch(err => this.debug('error', `Set answer failed: ${err.message}`));
                }
            }
            
            handleIceCandidate(data) {
                if (!this.peerConnection || !data.candidate) return;
                
                if (!this.peerConnection.remoteDescription) {
                    this.debug('ice', 'Remote description not ready - queueing candidate');
                    this.pendingIceCandidates.push(data.candidate);
                } else {
                    this.peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate))
                        .then(() => this.debug('success', 'ICE candidate added'))
                        .catch(err => this.debug('warn', `ICE candidate error: ${err.message}`));
                }
            }
            
            handleCallEnded() {
                this.debug('info', 'Remote user ended the call');
                this.cleanupCall();
                if (this.callbacks.onCallEnded) this.callbacks.onCallEnded();
            }
            
            handleCallRejected() {
                this.debug('warn', 'Call rejected by remote user');
                this.cleanupCall();
                if (this.callbacks.onCallRejected) this.callbacks.onCallRejected(this.targetUserId);
            }
            
            handleCallTimeout() {
                this.debug('warn', 'Call timeout - no answer');
                this.cleanupCall();
                if (this.callbacks.onCallError) this.callbacks.onCallError('No answer');
            }
            
            handleCallError(message) {
                this.debug('error', `Call error: ${message}`);
                this.cleanupCall();
                if (this.callbacks.onCallError) this.callbacks.onCallError(message);
            }
            
            setCallTimeout() {
                this.callTimeoutId = setTimeout(() => {
                    if (!this.isCallActive) {
                        this.handleCallTimeout();
                    }
                }, this.config.callTimeout);
            }
            
            clearCallTimeout() {
                if (this.callTimeoutId) {
                    clearTimeout(this.callTimeoutId);
                    this.callTimeoutId = null;
                }
            }
            
            startCallTimer() {
                this.callStartTime = Date.now();
                if (this.callTimer) clearInterval(this.callTimer);
                
                this.callTimer = setInterval(() => {
                    if (!this.callStartTime) return;
                    const elapsed = Math.floor((Date.now() - this.callStartTime) / 1000);
                    if (this.callbacks.onCallTimer) {
                        this.callbacks.onCallTimer(elapsed);
                    }
                }, 1000);
            }
            
            stopCallTimer() {
                if (this.callTimer) {
                    clearInterval(this.callTimer);
                    this.callTimer = null;
                }
                this.callStartTime = null;
            }
            
            cleanupCall() {
                this.debug('info', 'Cleaning up call resources...');
                this.clearCallTimeout();
                this.stopCallTimer();
                
                this.isCallActive = false;
                this.isCaller = false;
                this.iceCandidateCount = 0;
                this.pendingIceCandidates = [];
                
                if (this.localStream) {
                    this.localStream.getTracks().forEach(track => track.stop());
                    this.localStream = null;
                }
                
                if (this.peerConnection) {
                    this.peerConnection.close();
                    this.peerConnection = null;
                }
                
                this.remoteStream = null;
                sessionStorage.removeItem('video_call_state');
            }
            
            saveCallState() {
                sessionStorage.setItem('video_call_state', JSON.stringify({
                    targetUserId: this.targetUserId,
                    targetUserName: this.targetUserName,
                    isCaller: this.isCaller,
                    timestamp: Date.now()
                }));
            }
            
            checkPendingCalls() {
                const pending = sessionStorage.getItem('pending_video_call');
                if (pending && !this.isCallActive) {
                    try {
                        const data = JSON.parse(pending);
                        if (Date.now() - data.timestamp < 30000) {
                            this.debug('info', `Found pending video call from ${data.callerId}`);
                            if (this.callbacks.onIncomingCall) {
                                this.callbacks.onIncomingCall({
                                    callerId: data.callerId,
                                    callerName: data.callerName,
                                    offer: data.offer,
                                    isPending: true
                                });
                            }
                        } else {
                            sessionStorage.removeItem('pending_video_call');
                        }
                    } catch(e) {}
                }
            }
            
            waitForSocket() {
                return new Promise((resolve) => {
                    if (this.socket && this.socket.connected) {
                        resolve();
                    } else {
                        this.socket.once('connect', () => resolve());
                    }
                });
            }
            
            setupBeforeUnload() {
                window.addEventListener('beforeunload', () => {
                    if (this.isCallActive) {
                        this.endCall();
                    }
                });
            }
            
            toggleMute() {
                if (!this.localStream || !this.isCallActive) return false;
                const audioTrack = this.localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    this.debug('info', `Microphone ${audioTrack.enabled ? 'unmuted' : 'muted'}`);
                    return audioTrack.enabled;
                }
                return false;
            }
            
            toggleVideo() {
                if (!this.localStream || !this.isCallActive) return false;
                const videoTrack = this.localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    this.debug('info', `Camera ${videoTrack.enabled ? 'on' : 'off'}`);
                    return videoTrack.enabled;
                }
                return false;
            }
            
            async switchCamera() {
                if (!this.localStream || !this.isCallActive) return false;
                
                const videoTrack = this.localStream.getVideoTracks()[0];
                if (!videoTrack) return false;
                
                const capabilities = videoTrack.getCapabilities();
                if (!capabilities?.facingMode) return false;
                
                const currentMode = videoTrack.getSettings().facingMode;
                const newMode = currentMode === 'user' ? 'environment' : 'user';
                
                try {
                    const newStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { exact: newMode } },
                        audio: true
                    });
                    
                    const newVideoTrack = newStream.getVideoTracks()[0];
                    const oldVideoTrack = this.localStream.getVideoTracks()[0];
                    
                    this.localStream.removeTrack(oldVideoTrack);
                    this.localStream.addTrack(newVideoTrack);
                    
                    if (this.peerConnection) {
                        const sender = this.peerConnection.getSenders().find(s => s.track === oldVideoTrack);
                        if (sender) await sender.replaceTrack(newVideoTrack);
                    }
                    
                    oldVideoTrack.stop();
                    this.debug('success', `Switched to ${newMode} camera`);
                    return true;
                    
                } catch(e) {
                    this.debug('error', `Camera switch failed: ${e.message}`);
                    return false;
                }
            }
            
            on(event, callback) {
                const callbackKey = `on${event.charAt(0).toUpperCase()}${event.slice(1)}`;
                if (this.callbacks.hasOwnProperty(callbackKey)) {
                    this.callbacks[callbackKey] = callback;
                }
            }
            
            getStatus() {
                return {
                    isCallActive: this.isCallActive,
                    socketConnected: this.socket ? this.socket.connected : false,
                    currentUserId: this.currentUserId,
                    targetUserId: this.targetUserId,
                    iceCandidates: this.iceCandidateCount
                };
            }
            
            debug(level, message) {
                if (!this.config.debug) return;
                const logger = {
                    error: () => DebugLogger.error(message, 'VIDEOMGR'),
                    warn: () => DebugLogger.warn(message, 'VIDEOMGR'),
                    success: () => DebugLogger.success(message, 'VIDEOMGR'),
                    info: () => DebugLogger.info(message, 'VIDEOMGR'),
                    critical: () => DebugLogger.critical(message, 'VIDEOMGR'),
                    ice: () => DebugLogger.info(message, 'ICE')
                };
                (logger[level] || logger.info)();
            }
        }
        
        // ==================== MAIN APPLICATION ====================
        
        // Get user info from server
        const currentUserId = "{{ current_user.id }}";
        const currentUserName = "{{ current_user.username }}";
        const otherUserId = "{{ other_user.id }}";
        const otherUserName = "{{ other_user.username }}";
        const chatRedirectUrl = "{{ url_for('chat', user_id=other_user.id) }}";
        
        // Check role
        const urlParams = new URLSearchParams(window.location.search);
        const isCaller = urlParams.get('role') !== 'receiver';
        
        DebugLogger.success(`========================================`, 'APP');
        DebugLogger.success(`VIDEO CALL APPLICATION`, 'APP');
        DebugLogger.info(`Current User: ${currentUserId} (${currentUserName})`, 'APP');
        DebugLogger.info(`Target User: ${otherUserId} (${otherUserName})`, 'APP');
        DebugLogger.info(`Role: ${isCaller ? 'CALLER' : 'RECEIVER'}`, 'APP');
        
        // Display user ID
        document.getElementById('userIdDisplay').innerHTML = `ID: ${currentUserId.slice(0,8)}...`;
        
        // Initialize VideoCallManager
        const callManager = new VideoCallManager({
            debug: true,
            callTimeout: 35000,
            enableTURN: true
        });
        
        // DOM elements
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const localBox = document.getElementById('localBox');
        const remoteBox = document.getElementById('remoteBox');
        const muteBtn = document.getElementById('muteBtn');
        const videoToggleBtn = document.getElementById('videoToggleBtn');
        const cameraSwitchBtn = document.getElementById('cameraSwitchBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const endCallBtn = document.getElementById('endCallBtn');
        const incomingPopup = document.getElementById('incomingPopup');
        const acceptCallBtn = document.getElementById('acceptCallBtn');
        const rejectCallBtn = document.getElementById('rejectCallBtn');
        const callerNameSpan = document.getElementById('callerName');
        const timerDisplay = document.getElementById('timerDisplay');
        const connectionStatusSpan = document.getElementById('connectionStatus');
        const toastMsg = document.getElementById('toastMsg');
        const remoteConnectingOverlay = document.getElementById('remoteConnectingOverlay');
        const localConnectingOverlay = document.getElementById('localConnectingOverlay');
        
        let isMuted = false;
        let isVideoOff = false;
        
        function showToast(msg, duration = 1500) {
            toastMsg.innerText = msg;
            toastMsg.style.display = 'block';
            setTimeout(() => { toastMsg.style.display = 'none'; }, duration);
        }
        
        function redirectToChat() {
            window.location.href = chatRedirectUrl;
        }
        
        function updateConnectionStatus(status, isError = false, isChecking = false) {
            connectionStatusSpan.innerText = status;
            connectionStatusSpan.classList.remove('connected', 'failed', 'checking');
            if (isError) connectionStatusSpan.classList.add('failed');
            else if (isChecking) connectionStatusSpan.classList.add('checking');
            else if (status === 'Connected') connectionStatusSpan.classList.add('connected');
        }
        
        function updateTimerDisplay(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timerDisplay.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }
        
        // Register user
        callManager.registerUser(currentUserId, currentUserName);
        
        // Setup callbacks
        callManager.on('incomingCall', (data) => {
            DebugLogger.success(`Incoming video call from ${data.callerName}`, 'UI');
            
            callerNameSpan.innerText = data.callerName || 'User';
            incomingPopup.style.display = 'flex';
            
            // Play ringtone sound
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.frequency.value = 440;
                gain.gain.value = 0.1;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                setTimeout(() => osc.stop(), 500);
                ctx.resume();
            } catch(e) {}
            
            const acceptHandler = () => {
                DebugLogger.info('User accepted video call', 'UI');
                incomingPopup.style.display = 'none';
                callManager.acceptCall(data);
                acceptCallBtn.removeEventListener('click', acceptHandler);
                rejectCallBtn.removeEventListener('click', rejectHandler);
            };
            
            const rejectHandler = () => {
                DebugLogger.info('User rejected video call', 'UI');
                incomingPopup.style.display = 'none';
                callManager.rejectCall(data.callerId);
                rejectCallBtn.removeEventListener('click', rejectHandler);
                acceptCallBtn.removeEventListener('click', acceptHandler);
                showToast('Call rejected', 1000);
                setTimeout(redirectToChat, 1000);
            };
            
            acceptCallBtn.onclick = acceptHandler;
            rejectCallBtn.onclick = rejectHandler;
        });
        
        callManager.on('localStreamReady', (stream) => {
            DebugLogger.success('Local stream ready', 'UI');
            localVideo.srcObject = stream;
            localConnectingOverlay.style.display = 'none';
        });
        
        callManager.on('remoteStreamReady', (stream) => {
            DebugLogger.success('Remote stream ready', 'UI');
            remoteVideo.srcObject = stream;
            remoteConnectingOverlay.style.display = 'none';
            showToast('Video call connected!', 1500);
        });
        
        callManager.on('callAccepted', (userId) => {
            DebugLogger.success(`Call accepted by ${userId}`, 'UI');
            updateConnectionStatus('Connected');
            showToast('Call connected!', 1000);
        });
        
        callManager.on('callEnded', () => {
            DebugLogger.info('Call ended', 'UI');
            updateConnectionStatus('Call ended');
            localVideo.srcObject = null;
            remoteVideo.srcObject = null;
            timerDisplay.innerText = '00:00';
            showToast('Call ended', 1000);
            setTimeout(redirectToChat, 1500);
        });
        
        callManager.on('callRejected', () => {
            DebugLogger.warn('Call rejected', 'UI');
            updateConnectionStatus('Call rejected');
            showToast('Call rejected', 1000);
            setTimeout(redirectToChat, 1500);
        });
        
        callManager.on('callError', (error) => {
            DebugLogger.error(`Call error: ${error}`, 'UI');
            updateConnectionStatus(error, true);
            showToast(error, 2000);
            setTimeout(redirectToChat, 2000);
        });
        
        callManager.on('connectionStateChange', (state) => {
            if (state === 'connected') {
                updateConnectionStatus('Connected');
                remoteConnectingOverlay.style.display = 'none';
            } else if (state === 'connecting') {
                updateConnectionStatus('Connecting...', false, true);
                remoteConnectingOverlay.style.display = 'flex';
            } else if (state === 'unstable') {
                updateConnectionStatus('Unstable', true);
            }
        });
        
        callManager.on('iceStateChange', (state) => {
            DebugLogger.info(`ICE state: ${state}`, 'UI');
            if (state === 'checking') {
                updateConnectionStatus('Connecting...', false, true);
                remoteConnectingOverlay.style.display = 'flex';
            } else if (state === 'connected') {
                updateConnectionStatus('Connected');
                remoteConnectingOverlay.style.display = 'none';
            } else if (state === 'failed') {
                updateConnectionStatus('Connection failed', true);
            }
        });
        
        callManager.on('callTimer', (seconds) => {
            updateTimerDisplay(seconds);
        });
        
        // UI Controls
        muteBtn.onclick = () => {
            const result = callManager.toggleMute();
            if (result !== undefined) {
                isMuted = !result;
                muteBtn.classList.toggle('active', !result);
                muteBtn.innerHTML = !result ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
                showToast(!result ? 'Muted 🔇' : 'Unmuted 🎤', 800);
            }
        };
        
        videoToggleBtn.onclick = () => {
            const result = callManager.toggleVideo();
            if (result !== undefined) {
                isVideoOff = !result;
                videoToggleBtn.classList.toggle('active', !result);
                videoToggleBtn.innerHTML = !result ? '<i class="fas fa-video-slash"></i>' : '<i class="fas fa-video"></i>';
                showToast(!result ? 'Camera off' : 'Camera on', 800);
            }
        };
        
        cameraSwitchBtn.onclick = async () => {
            const result = await callManager.switchCamera();
            if (result) {
                showToast('Camera switched', 800);
            } else {
                showToast('Switch failed', 800);
            }
        };
        
        fullscreenBtn.onclick = () => {
            const container = document.querySelector('.video-container');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(e => DebugLogger.warn(`Fullscreen error: ${e.message}`, 'UI'));
            } else {
                document.exitFullscreen();
            }
        };
        
        endCallBtn.onclick = () => {
            callManager.endCall();
        };
        
        // Swap containers
        function swapContainers() {
            DebugLogger.info('Swapping video containers', 'UI');
            const tempStream = localVideo.srcObject;
            localVideo.srcObject = remoteVideo.srcObject;
            remoteVideo.srcObject = tempStream;
            
            const localLabel = localBox.querySelector('.user-label');
            const remoteLabel = remoteBox.querySelector('.user-label');
            const localText = localLabel.innerHTML;
            const remoteText = remoteLabel.innerHTML;
            localLabel.innerHTML = remoteText;
            remoteLabel.innerHTML = localText;
            
            if (localBox.classList.contains('small')) {
                localBox.classList.remove('small');
                localBox.classList.add('large');
                remoteBox.classList.remove('large');
                remoteBox.classList.add('small');
                remoteBox.style.left = '';
                remoteBox.style.top = '';
                remoteBox.style.right = '20px';
                remoteBox.style.top = '20px';
            } else {
                localBox.classList.remove('large');
                localBox.classList.add('small');
                remoteBox.classList.remove('small');
                remoteBox.classList.add('large');
                localBox.style.left = '';
                localBox.style.top = '';
                localBox.style.right = '20px';
                localBox.style.top = '20px';
            }
            showToast('View swapped', 1000);
        }
        
        document.getElementById('swapToRemoteBtn')?.addEventListener('click', swapContainers);
        document.getElementById('swapToLocalBtn')?.addEventListener('click', swapContainers);
        
        // Drag functionality for small video box
        function initDrag() {
            const smallBox = localBox;
            let isDragging = false, dragStartX, dragStartY, boxStartLeft, boxStartTop;
            
            const startDrag = (e) => {
                if (!localBox.classList.contains('small')) return;
                e.preventDefault();
                isDragging = true;
                let clientX, clientY;
                if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
                else { clientX = e.clientX; clientY = e.clientY; }
                const rect = smallBox.getBoundingClientRect();
                const containerRect = videoContainer.getBoundingClientRect();
                boxStartLeft = rect.left - containerRect.left;
                boxStartTop = rect.top - containerRect.top;
                dragStartX = clientX - boxStartLeft;
                dragStartY = clientY - boxStartTop;
                smallBox.classList.add('dragging');
                document.addEventListener('mousemove', onDrag);
                document.addEventListener('mouseup', stopDrag);
                document.addEventListener('touchmove', onDrag, { passive: false });
                document.addEventListener('touchend', stopDrag);
            };
            
            const onDrag = (e) => {
                if (!isDragging) return;
                e.preventDefault();
                let clientX, clientY;
                if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
                else { clientX = e.clientX; clientY = e.clientY; }
                let newLeft = clientX - dragStartX;
                let newTop = clientY - dragStartY;
                const containerRect = videoContainer.getBoundingClientRect();
                const boxRect = smallBox.getBoundingClientRect();
                newLeft = Math.max(5, Math.min(containerRect.width - boxRect.width - 5, newLeft));
                newTop = Math.max(5, Math.min(containerRect.height - boxRect.height - 5, newTop));
                smallBox.style.left = newLeft + 'px';
                smallBox.style.top = newTop + 'px';
                smallBox.style.right = 'auto';
                smallBox.style.bottom = 'auto';
            };
            
            const stopDrag = () => {
                isDragging = false;
                smallBox.classList.remove('dragging');
                document.removeEventListener('mousemove', onDrag);
                document.removeEventListener('mouseup', stopDrag);
                document.removeEventListener('touchmove', onDrag);
                document.removeEventListener('touchend', stopDrag);
            };
            
            smallBox.addEventListener('mousedown', startDrag);
            smallBox.addEventListener('touchstart', startDrag, { passive: false });
        }
        
        initDrag();
        
        // Start call based on role
        if (isCaller) {
            DebugLogger.info('Starting video call as CALLER...', 'APP');
            updateConnectionStatus('Starting...');
            localConnectingOverlay.style.display = 'flex';
            
            setTimeout(() => {
                callManager.startCall(otherUserId, otherUserName);
            }, 500);
        } else {
            DebugLogger.info('Waiting for incoming video calls as RECEIVER...', 'APP');
            updateConnectionStatus('Waiting for call...');
        }
        
        // Update quality badge
        setInterval(() => {
            const status = callManager.getStatus();
            const badge = document.getElementById('qualityBadge');
            if (badge) {
                if (status.isCallActive) {
                    badge.innerHTML = '🎥 Video Call Active';
                    badge.style.color = '#2ecc71';
                } else if (status.socketConnected) {
                    badge.innerHTML = '📡 Connected';
                    badge.style.color = '#60a5fa';
                } else {
                    badge.innerHTML = '📡 Connecting...';
                    badge.style.color = '#fbbf24';
                }
            }
        }, 3000);
        
        DebugLogger.success('Video call application fully initialized!', 'APP');
    </script>
</body>
