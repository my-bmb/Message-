<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Video Call with {{ other_user.username }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .video-container { display: flex; flex: 1; gap: 10px; padding: 10px; background: #1a1a2e; min-height: 0; }
        .video-box { flex: 1; background: #000; border-radius: 12px; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { position: fixed; bottom: 30px; left: 0; right: 0; text-align: center; z-index: 100; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; padding: 10px; }
        .control-btn { background: #2c3e50; border: none; width: 55px; height: 55px; border-radius: 50%; font-size: 1.5rem; color: white; cursor: pointer; transition: transform 0.2s, background 0.2s; }
        .control-btn:hover { transform: scale(1.05); background: #34495e; }
        .control-btn.active { background: #e74c3c; }
        .end-call-btn { background: #e74c3c; border: none; width: 70px; height: 70px; border-radius: 35px; font-size: 2rem; color: white; cursor: pointer; transition: transform 0.2s; }
        .end-call-btn:hover { transform: scale(1.05); background: #c0392b; }
        .user-label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 4px 8px; border-radius: 20px; font-size: 0.8rem; }
        .incoming-popup { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #0f3460; border-radius: 20px; padding: 15px; display: none; align-items: center; justify-content: space-between; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .incoming-popup button { background: none; border: none; font-size: 1.5rem; margin: 0 10px; cursor: pointer; }
        .accept-btn { color: #2ecc71; }
        .reject-btn { color: #e74c3c; }
        @media (max-width: 768px) { .video-container { flex-direction: column; } .video-box { min-height: 40vh; } .control-btn { width: 45px; height: 45px; font-size: 1.2rem; } }
    </style>
</head>
<body>
    <div class="video-container">
        <div class="video-box"><video id="localVideo" autoplay muted playsinline></video><div class="user-label">You</div></div>
        <div class="video-box"><video id="remoteVideo" autoplay playsinline></video><div class="user-label">{{ other_user.username }}</div></div>
    </div>
    <div class="controls">
        <button class="control-btn" id="muteBtn" title="Mute"><i class="fas fa-microphone"></i></button>
        <button class="control-btn" id="videoToggleBtn" title="Turn off camera"><i class="fas fa-video"></i></button>
        <button class="control-btn" id="cameraSwitchBtn" title="Switch camera"><i class="fas fa-sync-alt"></i></button>
        <button class="control-btn" id="fullscreenBtn" title="Fullscreen"><i class="fas fa-expand"></i></button>
        <button class="end-call-btn" id="endCallBtn"><i class="fas fa-phone-slash"></i></button>
    </div>
    <div id="incomingPopup" class="incoming-popup">
        <span><i class="fas fa-video"></i> Incoming video call from <span id="callerName"></span></span>
        <div>
            <button id="acceptCallBtn" class="accept-btn"><i class="fas fa-check-circle"></i></button>
            <button id="rejectCallBtn" class="reject-btn"><i class="fas fa-times-circle"></i></button>
        </div>
    </div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const currentUserId = "{{ current_user.id }}";
        const otherUserId = "{{ other_user.id }}";
        const callType = "video";
        const socket = io();
        const isCaller = new URLSearchParams(window.location.search).get('role') !== 'receiver';

        let peerConnection = null;
        let localStream = null;
        let remoteStream = null;
        let isMuted = false;
        let isVideoOff = false;
        let callStartTime = null;
        let timerInterval = null;

        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const muteBtn = document.getElementById('muteBtn');
        const videoToggleBtn = document.getElementById('videoToggleBtn');
        const cameraSwitchBtn = document.getElementById('cameraSwitchBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const endCallBtn = document.getElementById('endCallBtn');
        const incomingPopup = document.getElementById('incomingPopup');
        const acceptCallBtn = document.getElementById('acceptCallBtn');
        const rejectCallBtn = document.getElementById('rejectCallBtn');
        const callerNameSpan = document.getElementById('callerName');

        const iceServers = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'turn:relay1.metered.ca:80', username: 'your_username', credential: 'your_password' },
                { urls: 'turn:relay1.metered.ca:443?transport=tcp', username: 'your_username', credential: 'your_password' }
            ]
        };

        function updateTimer() {
            if (!callStartTime) return;
            const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            document.getElementById('timer')?.remove(); // optional: display timer somewhere
        }
        function startTimer() { callStartTime = Date.now(); timerInterval = setInterval(updateTimer, 1000); }
        function stopTimer() { if (timerInterval) clearInterval(timerInterval); }

        async function createPeerConnection() {
            if (peerConnection) return peerConnection;
            peerConnection = new RTCPeerConnection(iceServers);
            if (localStream) {
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            }
            peerConnection.ontrack = (event) => {
                remoteStream = event.streams[0];
                remoteVideo.srcObject = remoteStream;
                remoteVideo.play();
                startTimer();
            };
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) socket.emit('ice_candidate', { target_id: otherUserId, candidate: event.candidate });
            };
            peerConnection.oniceconnectionstatechange = () => {
                if (peerConnection.iceConnectionState === 'disconnected' || peerConnection.iceConnectionState === 'failed') endCall();
            };
            return peerConnection;
        }

        async function initiateCall() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: { echoCancellation: true, noiseSuppression: true } });
                localVideo.srcObject = localStream;
                const pc = await createPeerConnection();
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                socket.emit('call_user', { target_id: otherUserId, call_type: callType, offer: pc.localDescription });
                const timeoutId = setTimeout(() => endCall('No answer'), 30000);
                socket.once('call_answered', async (data) => {
                    clearTimeout(timeoutId);
                    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                    startTimer();
                });
                socket.once('call_rejected', () => { clearTimeout(timeoutId); endCall('Call rejected'); });
                socket.once('call_timeout', () => { clearTimeout(timeoutId); endCall('No answer'); });
            } catch (err) { endCall('Camera error'); }
        }

        async function acceptIncomingCall(callerId, offerSdp) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                const pc = await createPeerConnection();
                await pc.setRemoteDescription(new RTCSessionDescription(offerSdp));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.emit('answer_call', { caller_id: callerId, answer: pc.localDescription, call_type: callType });
                incomingPopup.style.display = 'none';
                startTimer();
            } catch (err) { endCall(); }
        }

        function endCall(reason = '') {
            stopTimer();
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (peerConnection) peerConnection.close();
            socket.emit('end_call', { target_id: otherUserId });
            window.location.href = "{{ url_for('chat', user_id=other_user.id) }}";
        }

        function toggleMute() {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
            muteBtn.classList.toggle('active', isMuted);
            muteBtn.innerHTML = isMuted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
        }
        function toggleVideo() {
            if (!localStream) return;
            isVideoOff = !isVideoOff;
            localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
            videoToggleBtn.classList.toggle('active', isVideoOff);
            videoToggleBtn.innerHTML = isVideoOff ? '<i class="fas fa-video-slash"></i>' : '<i class="fas fa-video"></i>';
        }
        async function switchCamera() {
            if (!localStream) return;
            const videoTrack = localStream.getVideoTracks()[0];
            if (!videoTrack) return;
            const capabilities = videoTrack.getCapabilities();
            if (!capabilities.facingMode) return;
            const newMode = videoTrack.getSettings().facingMode === 'user' ? 'environment' : 'user';
            const newStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: newMode } }, audio: true });
            const newVideoTrack = newStream.getVideoTracks()[0];
            const oldVideoTrack = localStream.getVideoTracks()[0];
            localStream.removeTrack(oldVideoTrack);
            localStream.addTrack(newVideoTrack);
            localVideo.srcObject = localStream;
            if (peerConnection) {
                const senders = peerConnection.getSenders();
                const sender = senders.find(s => s.track === oldVideoTrack);
                if (sender) sender.replaceTrack(newVideoTrack);
            }
            oldVideoTrack.stop();
        }
        function toggleFullscreen() {
            const container = document.querySelector('.video-container');
            if (!document.fullscreenElement) container.requestFullscreen();
            else document.exitFullscreen();
        }

        muteBtn.onclick = toggleMute;
        videoToggleBtn.onclick = toggleVideo;
        cameraSwitchBtn.onclick = switchCamera;
        fullscreenBtn.onclick = toggleFullscreen;
        endCallBtn.onclick = () => endCall();

        socket.on('incoming_call', (data) => {
            if (data.caller_id === otherUserId) {
                callerNameSpan.innerText = data.caller_name;
                incomingPopup.style.display = 'flex';
                const ringtone = new Audio('/static/ringtone.mp3');
                ringtone.loop = true;
                ringtone.play();
                acceptCallBtn.onclick = () => { ringtone.pause(); acceptIncomingCall(data.caller_id, data.offer); };
                rejectCallBtn.onclick = () => { ringtone.pause(); socket.emit('reject_call', { caller_id: data.caller_id }); endCall(); };
            }
        });
        socket.on('call_answered', async (data) => {
            if (peerConnection && peerConnection.signalingState === 'have-local-offer')
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
        });
        socket.on('ice_candidate', async (data) => {
            if (peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
        });
        socket.on('call_ended', () => endCall());
        socket.on('call_rejected', () => endCall('Call rejected'));
        socket.on('call_timeout', () => endCall('No answer'));
        socket.on('call_error', (err) => endCall(err.message));

        if (isCaller) initiateCall();
        else document.getElementById('remoteVideo').style.display = 'none'; // wait for call
    </script>
</body>
</html>
