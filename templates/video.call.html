<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Video Call with {{ other_user.username }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .video-container { display: flex; flex: 1; gap: 10px; padding: 10px; background: #1a1a2e; min-height: 0; }
        .video-box { flex: 1; background: #000; border-radius: 12px; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { position: fixed; bottom: 30px; left: 0; right: 0; text-align: center; z-index: 100; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; padding: 10px; }
        .control-btn { background: #2c3e50; border: none; width: 55px; height: 55px; border-radius: 50%; font-size: 1.5rem; color: white; cursor: pointer; transition: transform 0.2s, background 0.2s; }
        .control-btn:hover { transform: scale(1.05); background: #34495e; }
        .control-btn.active { background: #e74c3c; }
        .end-call-btn { background: #e74c3c; border: none; width: 70px; height: 70px; border-radius: 35px; font-size: 2rem; color: white; cursor: pointer; transition: transform 0.2s; }
        .end-call-btn:hover { transform: scale(1.05); background: #c0392b; }
        .user-label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 4px 8px; border-radius: 20px; font-size: 0.8rem; }
        .back-link { position: fixed; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 30px; text-decoration: none; font-size: 0.9rem; backdrop-filter: blur(5px); z-index: 101; }
        .back-link:hover { background: rgba(0,0,0,0.7); color: white; }
        @media (max-width: 768px) { .video-container { flex-direction: column; } .video-box { min-height: 40vh; } .control-btn { width: 45px; height: 45px; font-size: 1.2rem; } }
    </style>
</head>
<body>
    <a href="{{ url_for('chat', user_id=other_user.id) }}" class="back-link"><i class="fas fa-arrow-left"></i> Back to Chat</a>
    <div class="video-container">
        <div class="video-box"><video id="localVideo" autoplay muted playsinline></video><div class="user-label">You</div></div>
        <div class="video-box"><video id="remoteVideo" autoplay playsinline></video><div class="user-label">{{ other_user.username }}</div></div>
    </div>
    <div class="controls">
        <button class="control-btn" id="muteBtn" title="Mute"><i class="fas fa-microphone"></i></button>
        <button class="control-btn" id="videoToggleBtn" title="Turn off camera"><i class="fas fa-video"></i></button>
        <button class="control-btn" id="holdBtn" title="Hold"><i class="fas fa-pause"></i></button>
        <button class="end-call-btn" id="endCallBtn"><i class="fas fa-phone-slash"></i></button>
    </div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        const currentUserId = "{{ current_user.id }}";
        const otherUserId = "{{ other_user.id }}";
        const socket = io();
        let peer = null, currentCall = null, localStream = null;
        let isMuted = false, isVideoOff = false, isOnHold = false;

        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const muteBtn = document.getElementById('muteBtn');
        const videoToggleBtn = document.getElementById('videoToggleBtn');
        const holdBtn = document.getElementById('holdBtn');
        const endCallBtn = document.getElementById('endCallBtn');

        function toggleMute() {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(track => track.enabled = !isMuted);
            muteBtn.classList.toggle('active', isMuted);
            muteBtn.innerHTML = isMuted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
        }
        function toggleVideo() {
            if (!localStream) return;
            isVideoOff = !isVideoOff;
            localStream.getVideoTracks().forEach(track => track.enabled = !isVideoOff);
            videoToggleBtn.classList.toggle('active', isVideoOff);
            videoToggleBtn.innerHTML = isVideoOff ? '<i class="fas fa-video-slash"></i>' : '<i class="fas fa-video"></i>';
        }
        function toggleHold() {
            isOnHold = !isOnHold;
            if (localStream) {
                localStream.getAudioTracks().forEach(track => track.enabled = !isOnHold);
                localStream.getVideoTracks().forEach(track => track.enabled = !isOnHold);
            }
            holdBtn.classList.toggle('active', isOnHold);
            holdBtn.innerHTML = isOnHold ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
        }
        function endCall() {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (currentCall) currentCall.close();
            socket.emit('end_call', { target_id: otherUserId });
            setTimeout(() => window.location.href = "{{ url_for('chat', user_id=other_user.id) }}", 300);
        }

        const peerConfig = { config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }, { urls: 'stun:stun2.l.google.com:19302' }] } };
        peer = new Peer(currentUserId, peerConfig);
        peer.on('open', () => {
            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then(stream => {
                    localStream = stream;
                    localVideo.srcObject = stream;
                    const call = peer.call(otherUserId, stream);
                    setupCall(call);
                    currentCall = call;
                })
                .catch(() => { alert('Cannot access camera/microphone'); endCall(); });
        });
        peer.on('error', () => endCall());
        peer.on('call', call => {
            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then(stream => {
                    localStream = stream;
                    localVideo.srcObject = stream;
                    call.answer(stream);
                    setupCall(call);
                    currentCall = call;
                })
                .catch(() => { call.close(); endCall(); });
        });
        function setupCall(call) {
            call.on('stream', stream => { remoteVideo.srcObject = stream; remoteVideo.play().catch(e => console.log(e)); });
            call.on('close', () => endCall());
            call.on('error', () => endCall());
        }
        muteBtn.onclick = toggleMute;
        videoToggleBtn.onclick = toggleVideo;
        holdBtn.onclick = toggleHold;
        endCallBtn.onclick = endCall;
        socket.on('call_ended', () => endCall());
    </script>
</body>
</html>
