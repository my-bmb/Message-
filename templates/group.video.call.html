<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Group Video Call - Live Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        
        /* Header - Compact */
        .call-header {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
            min-height: 52px;
        }
        
        .call-info h5 {
            margin: 0;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .call-info p {
            margin: 2px 0 0;
            font-size: 0.55rem;
            opacity: 0.7;
        }
        
        .call-timer {
            background: rgba(0,0,0,0.5);
            padding: 3px 8px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.7rem;
        }
        
        .connection-badge {
            background: #f39c12;
            border-radius: 20px;
            padding: 3px 8px;
            font-size: 0.55rem;
            margin-left: 6px;
        }
        
        .connection-badge.connected { background: #2ecc71; }
        .connection-badge.failed { background: #e11d48; }
        
        /* Invite Button */
        .invite-btn {
            background: rgba(46, 204, 113, 0.3);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* Video Grid - Mobile Optimized */
        .video-grid {
            flex: 1;
            padding: 8px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        /* Mobile: Single column, each video takes full width */
        .video-container {
            position: relative;
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            width: 100%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Local video highlight */
        .local-video {
            border: 2px solid #2ecc71;
            order: 0;
        }
        
        .participant-info {
            position: absolute;
            bottom: 6px;
            left: 6px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .participant-status {
            display: flex;
            gap: 4px;
        }
        
        .participant-status i {
            font-size: 0.55rem;
        }
        
        .participant-status .audio-off { color: #e11d48; }
        .participant-status .video-off { color: #e11d48; }
        
        .video-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .video-placeholder i {
            font-size: 2rem;
            margin-bottom: 4px;
        }
        
        .video-placeholder span {
            font-size: 0.7rem;
        }
        
        /* Controls Bar - Bottom Fixed, All Buttons Visible */
        .controls-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            padding: 10px 16px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 200;
            flex-wrap: wrap;
        }
        
        .control-btn {
            background: #2d2d44;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .control-btn:active {
            transform: scale(0.92);
        }
        
        .control-btn.active {
            background: #2ecc71;
        }
        
        .control-btn.muted {
            background: #e11d48;
        }
        
        .end-call-btn {
            background: #e11d48;
            width: 48px;
            height: 48px;
            font-size: 1.1rem;
        }
        
        .end-call-btn:active {
            background: #c82333;
        }
        
        /* Participants Sidebar - Mobile Full Width */
        .participants-sidebar {
            position: fixed;
            right: -100%;
            top: 0;
            width: 100%;
            max-width: 320px;
            height: 100vh;
            background: rgba(20, 20, 35, 0.98);
            backdrop-filter: blur(15px);
            box-shadow: -2px 0 10px rgba(0,0,0,0.5);
            z-index: 1000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255,255,255,0.1);
        }
        
        .participants-sidebar.show {
            right: 0;
        }
        
        .sidebar-header {
            padding: 16px;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .sidebar-header h6 {
            margin: 0;
            color: white;
            font-size: 0.9rem;
        }
        
        .close-sidebar {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px;
        }
        
        .participants-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        
        .participant-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .participant-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1rem;
        }
        
        .participant-name {
            flex: 1;
            font-size: 0.8rem;
            color: white;
            font-weight: 500;
        }
        
        .participant-badge {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ecc71;
        }
        
        .participant-badge.muted {
            background: #e11d48;
        }
        
        .host-badge {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            font-size: 0.55rem;
            padding: 2px 6px;
            border-radius: 12px;
            margin-left: 6px;
        }
        
        /* Toast Message */
        .toast-msg {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: white;
            z-index: 1100;
            display: none;
            white-space: nowrap;
            pointer-events: none;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            flex-direction: column;
            gap: 12px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #2ecc71;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: white;
            font-size: 0.8rem;
        }
        
        /* Copy Tooltip */
        .copy-tooltip {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: white;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            z-index: 1100;
            animation: fadeOut 2s ease forwards;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-15px); visibility: hidden; }
        }
        
        /* Scrollbar */
        .participants-list::-webkit-scrollbar,
        .video-grid::-webkit-scrollbar {
            width: 3px;
        }
        
        .participants-list::-webkit-scrollbar-track,
        .video-grid::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
        }
        
        .participants-list::-webkit-scrollbar-thumb,
        .video-grid::-webkit-scrollbar-thumb {
            background: #2ecc71;
            border-radius: 3px;
        }
        
        /* Landscape mode adjustment */
        @media (orientation: landscape) and (max-height: 500px) {
            .controls-bar {
                padding: 6px 12px;
            }
            .control-btn {
                width: 38px;
                height: 38px;
                font-size: 0.9rem;
            }
            .end-call-btn {
                width: 42px;
                height: 42px;
            }
            .call-header {
                padding: 4px 10px;
                min-height: 44px;
            }
            .video-grid {
                padding: 4px;
                gap: 4px;
            }
            .video-container {
                border-radius: 8px;
            }
        }
        
        /* Very small devices */
        @media (max-width: 380px) {
            .control-btn {
                width: 40px;
                height: 40px;
                font-size: 0.9rem;
            }
            .end-call-btn {
                width: 44px;
                height: 44px;
            }
            .controls-bar {
                padding: 8px 12px;
                gap: 6px;
            }
            .invite-btn span {
                display: none;
            }
            .invite-btn {
                padding: 5px 8px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="call-header">
        <div class="call-info">
            <h5><i class="fas fa-video"></i> Group Call</h5>
            <p id="participantCount">Connecting...</p>
        </div>
        <button class="invite-btn" id="inviteBtn">
            <i class="fas fa-share-alt"></i> <span>Invite</span>
        </button>
        <div>
            <span class="call-timer" id="timerDisplay">00:00</span>
            <span class="connection-badge" id="connectionStatus">Init</span>
        </div>
    </div>

    <!-- Video Grid -->
    <div class="video-grid" id="videoGrid"></div>

    <!-- Controls Bar - All Buttons Visible -->
    <div class="controls-bar">
        <button class="control-btn" id="toggleAudioBtn" title="Mute">
            <i class="fas fa-microphone"></i>
        </button>
        <button class="control-btn" id="toggleVideoBtn" title="Camera">
            <i class="fas fa-video"></i>
        </button>
        <button class="control-btn" id="screenShareBtn" title="Screen">
            <i class="fas fa-desktop"></i>
        </button>
        <button class="control-btn" id="showParticipantsBtn" title="Members">
            <i class="fas fa-users"></i>
        </button>
        <button class="control-btn end-call-btn" id="leaveCallBtn" title="Leave">
            <i class="fas fa-phone-slash"></i>
        </button>
    </div>

    <!-- Participants Sidebar -->
    <div id="participantsSidebar" class="participants-sidebar">
        <div class="sidebar-header">
            <h6><i class="fas fa-users"></i> Participants</h6>
            <button class="close-sidebar" id="closeSidebarBtn">&times;</button>
        </div>
        <div class="participants-list" id="participantsList"></div>
    </div>

    <!-- Toast Message -->
    <div id="toastMsg" class="toast-msg"></div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner"></div>
        <div class="loading-text">Joining call...</div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // ICE Servers Configuration
        const ICE_SERVERS = [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' },
            { urls: 'stun:stun4.l.google.com:19302' },
            { urls: 'stun:stun.cloudflare.com:3478' },
            { urls: 'stun:stun.stunprotocol.org:3478' },
            { 
                urls: [
                    'turn:openrelay.metered.ca:80?transport=tcp',
                    'turn:openrelay.metered.ca:443?transport=tcp',
                    'turn:openrelay.metered.ca:80?transport=udp'
                ],
                username: 'openrelayproject',
                credential: 'openrelayproject'
            }
        ];

        // User info from server
        const currentUserId = "{{ current_user.id }}";
        const currentUserName = "{{ current_user.username }}";
        let callId = "{{ call_id or '' }}";
        
        let isHost = !callId;
        
        // WebRTC state
        let localStream = null;
        let peerConnections = {};
        let screenStream = null;
        let isAudioMuted = false;
        let isVideoMuted = false;
        let isScreenSharing = false;
        let callStartTime = null;
        let timerInterval = null;
        
        // DOM Elements
        const videoGrid = document.getElementById('videoGrid');
        const toggleAudioBtn = document.getElementById('toggleAudioBtn');
        const toggleVideoBtn = document.getElementById('toggleVideoBtn');
        const screenShareBtn = document.getElementById('screenShareBtn');
        const leaveCallBtn = document.getElementById('leaveCallBtn');
        const showParticipantsBtn = document.getElementById('showParticipantsBtn');
        const participantsSidebar = document.getElementById('participantsSidebar');
        const closeSidebarBtn = document.getElementById('closeSidebarBtn');
        const participantsList = document.getElementById('participantsList');
        const participantCountSpan = document.getElementById('participantCount');
        const timerDisplay = document.getElementById('timerDisplay');
        const connectionStatusSpan = document.getElementById('connectionStatus');
        const toastMsg = document.getElementById('toastMsg');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const inviteBtn = document.getElementById('inviteBtn');
        
        // Socket connection
        const socket = io({
            reconnection: true,
            reconnectionAttempts: 10,
            reconnectionDelay: 1000,
            timeout: 20000
        });
        
        function showToast(message, duration = 2000) {
            toastMsg.innerText = message;
            toastMsg.style.display = 'block';
            setTimeout(() => {
                toastMsg.style.display = 'none';
            }, duration);
        }
        
        function updateConnectionStatus(status, isError = false) {
            connectionStatusSpan.innerText = status;
            connectionStatusSpan.classList.remove('connected', 'failed');
            if (isError) connectionStatusSpan.classList.add('failed');
            else if (status === 'Connected') connectionStatusSpan.classList.add('connected');
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            callStartTime = Date.now();
            timerInterval = setInterval(() => {
                if (!callStartTime) return;
                const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
                const mins = Math.floor(elapsed / 60);
                const secs = elapsed % 60;
                timerDisplay.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            }, 1000);
        }
        
        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = null;
            callStartTime = null;
            timerDisplay.innerText = '00:00';
        }
        
        function addLocalVideo() {
            const container = document.createElement('div');
            container.className = 'video-container local-video';
            container.id = 'localVideoContainer';
            
            const video = document.createElement('video');
            video.id = 'localVideo';
            video.autoplay = true;
            video.playsInline = true;
            video.muted = true;
            if (localStream) video.srcObject = localStream;
            
            const info = document.createElement('div');
            info.className = 'participant-info';
            info.innerHTML = `
                <strong>You</strong>
                <div class="participant-status">
                    <i class="fas fa-microphone" id="localAudioIcon"></i>
                    <i class="fas fa-video" id="localVideoIcon"></i>
                </div>
            `;
            
            container.appendChild(video);
            container.appendChild(info);
            videoGrid.appendChild(container);
        }
        
        function addRemoteVideo(userId, userName) {
            if (document.getElementById(`video_${userId}`)) return;
            
            const container = document.createElement('div');
            container.className = 'video-container';
            container.id = `video_${userId}`;
            
            const video = document.createElement('video');
            video.id = `video_${userId}_element`;
            video.autoplay = true;
            video.playsInline = true;
            
            const placeholder = document.createElement('div');
            placeholder.className = 'video-placeholder';
            placeholder.id = `placeholder_${userId}`;
            placeholder.innerHTML = `
                <i class="fas fa-user-circle"></i>
                <span>${userName}</span>
            `;
            
            const info = document.createElement('div');
            info.className = 'participant-info';
            info.innerHTML = `
                <strong>${userName}</strong>
                <div class="participant-status">
                    <i class="fas fa-microphone" id="remoteAudioIcon_${userId}"></i>
                    <i class="fas fa-video" id="remoteVideoIcon_${userId}"></i>
                </div>
            `;
            
            container.appendChild(placeholder);
            container.appendChild(video);
            container.appendChild(info);
            videoGrid.appendChild(container);
            
            return { video, placeholder };
        }
        
        function removeRemoteVideo(userId) {
            const container = document.getElementById(`video_${userId}`);
            if (container) container.remove();
        }
        
        function updateRemoteVideoElement(userId, stream) {
            const videoElement = document.getElementById(`video_${userId}_element`);
            const placeholder = document.getElementById(`placeholder_${userId}`);
            
            if (videoElement && stream) {
                videoElement.srcObject = stream;
                if (placeholder) placeholder.style.display = 'none';
            }
        }
        
        async function createPeerConnection(userId, userName) {
            const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
            peerConnections[userId] = { pc, userName };
            
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    pc.addTrack(track, localStream);
                });
            }
            
            pc.ontrack = (event) => {
                if (event.streams && event.streams[0]) {
                    updateRemoteVideoElement(userId, event.streams[0]);
                }
            };
            
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('group_call_ice_candidate', {
                        target_id: userId,
                        call_id: callId,
                        candidate: event.candidate
                    });
                }
            };
            
            pc.onconnectionstatechange = () => {
                if (pc.connectionState === 'connected') {
                    showToast(`${userName} connected`, 1000);
                } else if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                    removeRemoteVideo(userId);
                    delete peerConnections[userId];
                    updateParticipantsList();
                }
            };
            
            return pc;
        }
        
        async function initLocalStream() {
            loadingOverlay.style.display = 'flex';
            
            try {
                // Mobile-friendly constraints
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        width: { ideal: 640 }, 
                        height: { ideal: 480 }, 
                        frameRate: { ideal: 24 }
                    },
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                });
                
                addLocalVideo();
                updateConnectionStatus('Connected');
                startTimer();
                loadingOverlay.style.display = 'none';
                return true;
            } catch (err) {
                console.error('Error accessing media:', err);
                loadingOverlay.style.display = 'none';
                showToast('Cannot access camera/microphone', 3000);
                updateConnectionStatus('Camera Error', true);
                return false;
            }
        }
        
        async function initCall() {
            const streamReady = await initLocalStream();
            if (!streamReady) return;
            
            socket.emit('join_group_call_room', { call_id: callId });
        }
        
        // Socket Events
        socket.on('connect', () => {
            console.log('Socket connected');
            updateConnectionStatus('Connected');
            initCall();
        });
        
        socket.on('user_joined_call', async (data) => {
            console.log('User joined:', data.user_name);
            
            if (data.user_id !== currentUserId && !peerConnections[data.user_id]) {
                const pc = await createPeerConnection(data.user_id, data.user_name);
                addRemoteVideo(data.user_id, data.user_name);
                
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                
                socket.emit('group_call_offer', {
                    target_id: data.user_id,
                    call_id: callId,
                    offer: offer
                });
            }
            
            updateParticipantsList();
        });
        
        socket.on('user_left_call', (data) => {
            console.log('User left:', data.user_name);
            removeRemoteVideo(data.user_id);
            if (peerConnections[data.user_id]) {
                peerConnections[data.user_id].pc.close();
                delete peerConnections[data.user_id];
            }
            updateParticipantsList();
        });
        
        socket.on('group_call_offer_received', async (data) => {
            if (data.from_id !== currentUserId && !peerConnections[data.from_id]) {
                const pc = await createPeerConnection(data.from_id, data.from_name);
                addRemoteVideo(data.from_id, data.from_name);
                
                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                
                socket.emit('group_call_answer', {
                    target_id: data.from_id,
                    call_id: callId,
                    answer: answer
                });
            }
        });
        
        socket.on('group_call_answer_received', async (data) => {
            if (peerConnections[data.from_id]) {
                await peerConnections[data.from_id].pc.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
        });
        
        socket.on('group_call_ice_received', async (data) => {
            if (peerConnections[data.from_id] && data.candidate) {
                try {
                    await peerConnections[data.from_id].pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                } catch(e) {
                    console.log('ICE candidate error:', e);
                }
            }
        });
        
        socket.on('participant_left', (data) => {
            removeRemoteVideo(data.user_id);
            if (peerConnections[data.user_id]) {
                peerConnections[data.user_id].pc.close();
                delete peerConnections[data.user_id];
            }
            updateParticipantsList();
        });
        
        socket.on('group_call_ended', () => {
            showToast('Call ended', 2000);
            endCall();
        });
        
        socket.on('participant_video_toggle', (data) => {
            const icon = document.getElementById(`remoteVideoIcon_${data.user_id}`);
            if (icon) {
                icon.style.opacity = data.video_enabled ? '1' : '0.5';
                icon.style.color = data.video_enabled ? 'white' : '#e11d48';
            }
        });
        
        socket.on('participant_audio_toggle', (data) => {
            const icon = document.getElementById(`remoteAudioIcon_${data.user_id}`);
            if (icon) {
                icon.style.opacity = data.audio_enabled ? '1' : '0.5';
                icon.style.color = data.audio_enabled ? 'white' : '#e11d48';
            }
        });
        
        // Control functions
        function toggleAudio() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    isAudioMuted = !isAudioMuted;
                    audioTrack.enabled = !isAudioMuted;
                    
                    const icon = toggleAudioBtn.querySelector('i');
                    if (isAudioMuted) {
                        icon.className = 'fas fa-microphone-slash';
                        toggleAudioBtn.classList.add('muted');
                    } else {
                        icon.className = 'fas fa-microphone';
                        toggleAudioBtn.classList.remove('muted');
                    }
                    
                    const localAudioIcon = document.getElementById('localAudioIcon');
                    if (localAudioIcon) {
                        localAudioIcon.style.opacity = isAudioMuted ? '0.5' : '1';
                        localAudioIcon.style.color = isAudioMuted ? '#e11d48' : 'white';
                    }
                    
                    socket.emit('toggle_audio', { call_id: callId, enabled: !isAudioMuted });
                    showToast(isAudioMuted ? 'Muted' : 'Unmuted', 800);
                }
            }
        }
        
        function toggleVideo() {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    isVideoMuted = !isVideoMuted;
                    videoTrack.enabled = !isVideoMuted;
                    
                    const icon = toggleVideoBtn.querySelector('i');
                    if (isVideoMuted) {
                        icon.className = 'fas fa-video-slash';
                        toggleVideoBtn.classList.add('muted');
                    } else {
                        icon.className = 'fas fa-video';
                        toggleVideoBtn.classList.remove('muted');
                    }
                    
                    const localVideoIcon = document.getElementById('localVideoIcon');
                    if (localVideoIcon) {
                        localVideoIcon.style.opacity = isVideoMuted ? '0.5' : '1';
                        localVideoIcon.style.color = isVideoMuted ? '#e11d48' : 'white';
                    }
                    
                    socket.emit('toggle_video', { call_id: callId, enabled: !isVideoMuted });
                    showToast(isVideoMuted ? 'Camera off' : 'Camera on', 800);
                }
            }
        }
        
        async function toggleScreenShare() {
            if (!isScreenSharing) {
                try {
                    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const videoTrack = screenStream.getVideoTracks()[0];
                    
                    for (const [userId, { pc }] of Object.entries(peerConnections)) {
                        const sender = pc.getSenders().find(s => s.track?.kind === 'video');
                        if (sender) sender.replaceTrack(videoTrack);
                    }
                    
                    videoTrack.onended = () => stopScreenShare();
                    isScreenSharing = true;
                    screenShareBtn.classList.add('active');
                    screenShareBtn.innerHTML = '<i class="fas fa-stop"></i>';
                    socket.emit('screen_share', { call_id: callId, enabled: true });
                    showToast('Screen sharing started', 1500);
                } catch (err) {
                    showToast('Screen share cancelled', 1000);
                }
            } else {
                stopScreenShare();
            }
        }
        
        function stopScreenShare() {
            if (screenStream) {
                screenStream.getTracks().forEach(track => track.stop());
                screenStream = null;
            }
            
            const videoTrack = localStream.getVideoTracks()[0];
            for (const [userId, { pc }] of Object.entries(peerConnections)) {
                const sender = pc.getSenders().find(s => s.track?.kind === 'video');
                if (sender) sender.replaceTrack(videoTrack);
            }
            
            isScreenSharing = false;
            screenShareBtn.classList.remove('active');
            screenShareBtn.innerHTML = '<i class="fas fa-desktop"></i>';
            socket.emit('screen_share', { call_id: callId, enabled: false });
            showToast('Screen sharing stopped', 1000);
        }
        
        async function leaveCall() {
            if (confirm('Leave the call?')) {
                await fetch('/api/group-call/leave', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ call_id: callId })
                });
                socket.emit('leave_group_call_room', { call_id: callId });
                endCall();
            }
        }
        
        async function endCall() {
            stopTimer();
            
            for (const [userId, { pc }] of Object.entries(peerConnections)) {
                pc.close();
            }
            peerConnections = {};
            
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            if (screenStream) {
                screenStream.getTracks().forEach(track => track.stop());
                screenStream = null;
            }
            
            window.location.href = '/live-chat';
        }
        
        function updateParticipantsList() {
            const participants = [
                { user_id: currentUserId, user_name: currentUserName, is_host: isHost }
            ];
            
            for (const [userId, { userName }] of Object.entries(peerConnections)) {
                if (!participants.find(p => p.user_id === userId)) {
                    participants.push({ user_id: userId, user_name: userName, is_host: false });
                }
            }
            
            participantsList.innerHTML = participants.map(p => `
                <div class="participant-item">
                    <div class="participant-avatar">${p.user_name[0].toUpperCase()}</div>
                    <div class="participant-name">
                        ${p.user_name} ${p.user_id === currentUserId ? '(You)' : ''}
                        ${p.is_host ? '<span class="host-badge">Host</span>' : ''}
                    </div>
                    <div class="participant-badge"></div>
                </div>
            `).join('');
            
            const count = participants.length;
            participantCountSpan.innerHTML = `${count} participant${count !== 1 ? 's' : ''}`;
        }
        
        function copyInviteLink() {
            const inviteLink = `${window.location.origin}/group-video-call/join/${callId}`;
            navigator.clipboard.writeText(inviteLink);
            
            const tooltip = document.createElement('div');
            tooltip.className = 'copy-tooltip';
            tooltip.innerHTML = '<i class="fas fa-check"></i> Link copied!';
            document.body.appendChild(tooltip);
            setTimeout(() => tooltip.remove(), 2000);
        }
        
        // Event listeners
        toggleAudioBtn.addEventListener('click', toggleAudio);
        toggleVideoBtn.addEventListener('click', toggleVideo);
        screenShareBtn.addEventListener('click', toggleScreenShare);
        leaveCallBtn.addEventListener('click', leaveCall);
        showParticipantsBtn.addEventListener('click', () => {
            participantsSidebar.classList.add('show');
            updateParticipantsList();
        });
        closeSidebarBtn.addEventListener('click', () => {
            participantsSidebar.classList.remove('show');
        });
        inviteBtn.addEventListener('click', copyInviteLink);
        
        // Close sidebar on outside click
        document.addEventListener('click', (e) => {
            if (!participantsSidebar.contains(e.target) && e.target !== showParticipantsBtn && e.target !== inviteBtn) {
                participantsSidebar.classList.remove('show');
            }
        });
        
        // Initialize
        if (!callId) {
            fetch('/api/group-call/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            }).then(res => res.json()).then(data => {
                if (data.success) {
                    callId = data.call_id;
                    window.history.pushState({}, '', `/group-video-call/join/${callId}`);
                    socket.emit('join_group_call_room', { call_id: callId });
                    initCall();
                }
            });
        } else {
            socket.on('connect', () => {
                socket.emit('join_group_call_room', { call_id: callId });
            });
            initCall();
        }
    </script>
</body>
</html>
