<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat with {{ other_user.username }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #e5ddd5; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            height: 100vh; 
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        
        /* Main Container */
        .chat-container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            width: 100%;
            background: white; 
            position: relative;
        }
        
        /* Fixed Header - Never Scrolls */
        .chat-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: #075e54;
            color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            height: 60px;
        }
        
        /* Content Area - Scrolls but header and footer stay fixed */
        .chat-content {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-top: 60px;
            margin-bottom: 60px;
            height: calc(100vh - 120px);
            overflow: hidden;
        }
        
        /* Messages Area - Scrollable */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background-image: url('https://www.transparenttextures.com/patterns/brilliant.png');
            background-color: #e5ddd5;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Load More Button Container */
        .load-more-container {
            display: flex;
            justify-content: center;
            padding: 12px;
            margin-bottom: 8px;
        }
        
        .load-more-btn {
            background: #075e54;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .load-more-btn:active {
            transform: scale(0.96);
            background: #054a42;
        }
        
        .load-more-btn:disabled {
            background: #999;
            cursor: not-allowed;
            transform: none;
        }
        
        .no-more-messages {
            text-align: center;
            padding: 12px;
            color: #999;
            font-size: 0.7rem;
            font-style: italic;
        }
        
        /* Typing Indicator - Fixed above footer */
        .typing-indicator { 
            padding: 6px 12px; 
            font-size: 0.7rem; 
            color: #666; 
            font-style: italic; 
            background: white; 
            border-top: 1px solid #eee; 
            position: absolute;
            bottom: 60px;
            left: 0;
            right: 0;
            z-index: 99;
            display: none;
        }
        
        /* Fixed Footer - Never Scrolls */
        .chat-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 8px 12px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 8px;
            align-items: center;
            z-index: 100;
            height: 60px;
        }
        
        .left-buttons {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }
        
        .action-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            color: #075e54;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .action-btn:active {
            background: rgba(7, 94, 84, 0.1);
            transform: scale(0.95);
        }
        
        #messageInput {
            flex: 1;
            border-radius: 24px;
            border: 1px solid #ddd;
            padding: 10px 14px;
            outline: none;
            font-size: 16px;
            background: white;
            min-width: 0;
        }
        
        #messageInput:focus {
            border-color: #075e54;
        }
        
        .send-btn {
            background: #075e54;
            border: none;
            font-size: 1.2rem;
            color: white;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .send-btn:active {
            transform: scale(0.95);
            background: #054a42;
        }
        
        /* Message Styles */
        .message { 
            margin-bottom: 12px; 
            display: flex; 
            position: relative;
        }
        .my-message { justify-content: flex-end; }
        .other-message { justify-content: flex-start; }
        
        .message-bubble {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
            position: relative;
            display: inline-block;
        }
        
        .my-message .message-bubble { 
            background: #dcf8c5; 
            border-bottom-right-radius: 4px; 
        }
        .other-message .message-bubble { 
            background: white; 
            border-bottom-left-radius: 4px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
        }
        
        /* Media */
        .media-image {
            max-width: 100%;
            max-height: 400px;
            width: auto;
            height: auto;
            border-radius: 12px;
            margin-top: 4px;
            cursor: pointer;
            object-fit: contain;
        }
        
        .media-video {
            max-width: 100%;
            max-height: 400px;
            width: auto;
            height: auto;
            border-radius: 12px;
            margin-top: 4px;
        }
        
        .media-audio {
            width: 220px;
            margin-top: 4px;
        }
        
        .media-file {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(7, 94, 84, 0.1);
            padding: 6px 10px;
            border-radius: 8px;
            text-decoration: none;
            color: #075e54;
            margin-top: 4px;
            font-size: 0.75rem;
        }
        
        .message-time {
            font-size: 0.6rem;
            opacity: 0.7;
            text-align: right;
            margin-top: 4px;
        }
        
        .fa-check-double { color: #34b7f1; }
        
        .reply-preview { 
            background: #f0f0f0; 
            padding: 3px 6px; 
            border-radius: 10px; 
            font-size: 0.65rem; 
            margin-bottom: 4px; 
            border-left: 2px solid #075e54; 
        }
        
        .message-actions {
            position: absolute;
            right: 0;
            top: -28px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: none;
            gap: 6px;
            padding: 4px 10px;
            z-index: 10;
        }
        
        .message:hover .message-actions { display: flex; }
        .message-actions button { 
            background: none; 
            border: none; 
            cursor: pointer; 
            font-size: 0.7rem; 
            color: #666;
        }
        .message-actions button:active { color: #075e54; }
        
        .reactions { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        .reaction {
            background: rgba(0,0,0,0.05);
            border-radius: 20px;
            padding: 2px 6px;
            font-size: 0.7rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        .reaction:active { background: rgba(0,0,0,0.1); }
        
        .back-btn { 
            color: white; 
            text-decoration: none; 
            font-size: 1.2rem;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .back-btn:active { background: rgba(255,255,255,0.2); }
        
        .user-info {
            flex: 1;
            min-width: 0;
        }
        
        .user-name {
            font-weight: bold;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .user-status {
            font-size: 0.65rem;
            opacity: 0.9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .call-buttons { 
            display: flex; 
            gap: 6px; 
            align-items: center; 
            margin-left: auto;
        }
        
        .call-buttons button { 
            background: rgba(255,255,255,0.2); 
            border: none; 
            color: white; 
            font-size: 1rem; 
            cursor: pointer; 
            padding: 6px;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .call-buttons button:active { background: rgba(255,255,255,0.3); transform: scale(0.95); }
        
        /* Search - Desktop Only */
        .search-container { 
            margin-left: auto; 
            margin-right: 8px;
            display: block;
        }
        .search-container input { 
            border-radius: 20px; 
            border: none; 
            padding: 5px 10px; 
            font-size: 0.75rem; 
            width: 130px;
            outline: none;
        }
        .search-results {
            position: absolute;
            top: 55px;
            right: 10px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            max-width: 280px;
            z-index: 1000;
            display: none;
        }
        .search-result-item { padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; }
        .edited-badge { font-size: 0.55rem; opacity: 0.6; margin-left: 5px; }
        
        /* Image Modal */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        .image-modal .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 32px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
        }
        
        /* Hide file input */
        #fileInput {
            display: none;
        }
        
        /* Reaction picker */
        .reaction-picker {
            position: fixed;
            background: white;
            border: 1px solid #ccc;
            border-radius: 30px;
            padding: 6px 12px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }
        .reaction-picker button {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
        }
        
        /* ========== MOBILE SPECIFIC FIXES ========== */
        @media (max-width: 768px) {
            .chat-header {
                padding: 10px 12px;
                height: 55px;
            }
            .chat-content {
                margin-top: 55px;
                margin-bottom: 55px;
                height: calc(100vh - 110px);
            }
            .chat-footer {
                height: 55px;
                padding: 6px 10px;
            }
            .typing-indicator {
                bottom: 55px;
            }
            .back-btn {
                width: 32px;
                height: 32px;
                font-size: 1rem;
            }
            .user-name {
                font-size: 0.9rem;
            }
            .call-buttons button {
                width: 32px;
                height: 32px;
                font-size: 0.9rem;
            }
            .search-container {
                display: none !important;
            }
            .action-btn {
                width: 36px;
                height: 36px;
                font-size: 1.1rem;
            }
            .send-btn {
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }
            .media-image, .media-video {
                max-height: 300px;
            }
        }
        
        @media (max-width: 480px) {
            .chat-header {
                padding: 8px 10px;
                height: 50px;
            }
            .chat-content {
                margin-top: 50px;
                margin-bottom: 50px;
                height: calc(100vh - 100px);
            }
            .chat-footer {
                height: 50px;
                padding: 5px 8px;
            }
            .typing-indicator {
                bottom: 50px;
            }
            .back-btn {
                width: 28px;
                height: 28px;
                font-size: 0.9rem;
            }
            .user-name {
                font-size: 0.8rem;
            }
            .call-buttons button {
                width: 28px;
                height: 28px;
                font-size: 0.8rem;
            }
            .action-btn {
                width: 32px;
                height: 32px;
                font-size: 1rem;
            }
            .send-btn {
                width: 34px;
                height: 34px;
                font-size: 0.9rem;
            }
            .media-image, .media-video {
                max-height: 250px;
            }
            .message-bubble {
                max-width: 90%;
            }
        }
        
        /* Landscape mode */
        @media (orientation: landscape) and (max-height: 500px) {
            .chat-header, .chat-footer {
                height: 45px;
            }
            .chat-content {
                margin-top: 45px;
                margin-bottom: 45px;
                height: calc(100vh - 90px);
            }
            .typing-indicator {
                bottom: 45px;
            }
            .action-btn, .send-btn, .call-buttons button {
                width: 30px;
                height: 30px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <!-- Fixed Header - Never Scrolls -->
    <div class="chat-header">
        <a href="{{ url_for('users') }}" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="user-info">
            <div class="user-name">{{ other_user.username }}</div>
            <div class="user-status" id="onlineStatus">
                {% if other_user.is_online %}Online{% else %}Last seen: {{ other_user.last_seen|default("never") }}{% endif %}
            </div>
        </div>
        <!-- Search - Desktop Only -->
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search...">
            <div id="searchResults" class="search-results"></div>
        </div>
        <!-- Call Buttons -->
        <div class="call-buttons">
            <button id="audioCallBtn" title="Audio Call"><i class="fas fa-phone-alt"></i></button>
            <button id="videoCallBtn" title="Video Call"><i class="fas fa-video"></i></button>
        </div>
    </div>
    
    <!-- Chat Content - Scrolls but header/footer stay fixed -->
    <div class="chat-content">
        <div class="chat-box" id="chatBox">
            <!-- Messages will appear here -->
        </div>
        
        <div id="typingIndicator" class="typing-indicator">
            <i class="fas fa-ellipsis-h"></i> Typing...
        </div>
    </div>
    
    <!-- Fixed Footer - Never Scrolls -->
    <div class="chat-footer">
        <div class="left-buttons">
            <button class="action-btn" id="attachBtn" title="Attach file">
                <i class="fas fa-paperclip"></i>
            </button>
            <button class="action-btn" id="micBtn" title="Voice message">
                <i class="fas fa-microphone"></i>
            </button>
        </div>
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        <input type="file" id="fileInput" accept="image/*,video/*,audio/*">
    </div>
</div>

<!-- Image Modal -->
<div id="imageModal" class="image-modal">
    <span class="close-modal">&times;</span>
    <img id="modalImage" src="" alt="">
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    // ========== INDIAN TIME FORMAT FUNCTION (12-hour AM/PM) ==========
    function formatIndianTime(timestamp) {
        if (!timestamp) return '';
        
        let date;
        if (typeof timestamp === 'string') {
            date = new Date(timestamp);
        } else {
            date = timestamp;
        }
        
        if (isNaN(date.getTime())) return '';
        
        // Convert to Indian timezone (IST - UTC+5:30)
        const options = {
            hour: '2-digit',
            minute: '2-digit',
            hour12: true,
            timeZone: 'Asia/Kolkata'
        };
        
        let timeString = date.toLocaleTimeString('en-IN', options);
        return timeString;
    }
    
    function formatMessageTime(timestamp) {
        if (!timestamp) return '';
        
        let date;
        if (typeof timestamp === 'string') {
            date = new Date(timestamp);
        } else {
            date = timestamp;
        }
        
        if (isNaN(date.getTime())) return '';
        
        // Convert to IST for comparison
        const options = { timeZone: 'Asia/Kolkata' };
        const now = new Date();
        const todayIST = new Date(now.toLocaleString('en-US', options));
        const msgDateIST = new Date(date.toLocaleString('en-US', options));
        
        const isToday = todayIST.toDateString() === msgDateIST.toDateString();
        
        if (isToday) {
            return formatIndianTime(date);
        } else {
            const day = msgDateIST.getDate();
            const month = msgDateIST.toLocaleString('en-IN', { month: 'short', timeZone: 'Asia/Kolkata' });
            const year = msgDateIST.getFullYear();
            const time = formatIndianTime(date);
            return `${day} ${month} ${year}, ${time}`;
        }
    }
    
    function formatLastSeen(timestamp) {
        if (!timestamp) return 'recently';
        
        let date;
        if (typeof timestamp === 'string') {
            date = new Date(timestamp);
        } else {
            date = timestamp;
        }
        
        if (isNaN(date.getTime())) return 'recently';
        
        const options = { timeZone: 'Asia/Kolkata' };
        const now = new Date();
        const todayIST = new Date(now.toLocaleString('en-US', options));
        const msgDateIST = new Date(date.toLocaleString('en-US', options));
        
        const isToday = todayIST.toDateString() === msgDateIST.toDateString();
        
        if (isToday) {
            return `Last seen today at ${formatIndianTime(date)}`;
        } else {
            const day = msgDateIST.getDate();
            const month = msgDateIST.toLocaleString('en-IN', { month: 'short', timeZone: 'Asia/Kolkata' });
            const year = msgDateIST.getFullYear();
            const time = formatIndianTime(date);
            return `Last seen on ${day} ${month} ${year} at ${time}`;
        }
    }
    
    // ========== DOM Elements ==========
    const chatBox = document.getElementById('chatBox');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const attachBtn = document.getElementById('attachBtn');
    const micBtn = document.getElementById('micBtn');
    const fileInput = document.getElementById('fileInput');
    const typingIndicator = document.getElementById('typingIndicator');
    const audioCallBtn = document.getElementById('audioCallBtn');
    const videoCallBtn = document.getElementById('videoCallBtn');
    const searchInput = document.getElementById('searchInput');
    const searchResultsDiv = document.getElementById('searchResults');
    const imageModal = document.getElementById('imageModal');
    const modalImage = document.getElementById('modalImage');
    const currentUserId = "{{ current_user.id }}";
    const otherUserId = "{{ other_user.id }}";
    const socket = io();

    let replyToId = null;
    let isLoadingMore = false;
    let offset = {{ messages|length }};
    let hasMoreMessages = true;
    let mediaRecorder;
    let audioChunks = [];
    
    // Store scroll position before loading
    let scrollPositionBeforeLoad = 0;
    let firstMessageIdBeforeLoad = null;

    function openImageModal(src) {
        modalImage.src = src;
        imageModal.style.display = 'flex';
    }
    
    function closeImageModal() {
        imageModal.style.display = 'none';
    }
    
    window.openImageModal = openImageModal;
    
    document.querySelector('.close-modal').onclick = closeImageModal;
    imageModal.onclick = function(e) {
        if (e.target === imageModal) closeImageModal();
    };

    function scrollToBottom() { 
        chatBox.scrollTop = chatBox.scrollHeight; 
    }

    function escapeHtml(str) { 
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); 
    }

    function createMessageElement(msg, isMe) {
        const div = document.createElement('div');
        div.className = `message ${isMe ? 'my-message' : 'other-message'}`;
        div.setAttribute('data-message-id', msg.id);
        div.setAttribute('data-sender-id', msg.sender_id);
        let contentHtml = '';
        if (msg.message_type === 'text') {
            contentHtml = `<div class="message-text">${escapeHtml(msg.content)}${msg.edited ? '<span class="edited-badge">(edited)</span>' : ''}</div>`;
        } else if (msg.message_type === 'image') {
            contentHtml = `<img src="${msg.content}" class="media-image" alt="Image" onclick="openImageModal('${msg.content}')">`;
        } else if (msg.message_type === 'video') {
            contentHtml = `<video controls class="media-video" src="${msg.content}"></video>`;
        } else if (msg.message_type === 'audio') {
            contentHtml = `<audio controls src="${msg.content}" class="media-audio"></audio>`;
        } else {
            contentHtml = `<a href="${msg.content}" target="_blank" class="media-file">📎 Download file</a>`;
        }
        
        const time = msg.formatted_time || formatMessageTime(msg.created_at);
        
        let reactionsHtml = '';
        if (msg.reactions && msg.reactions.length) {
            const grouped = msg.reactions.reduce((acc, r) => {
                acc[r.reaction] = (acc[r.reaction] || 0) + 1;
                return acc;
            }, {});
            reactionsHtml = `<div class="reactions" id="reactions-${msg.id}">` +
                Object.entries(grouped).map(([reaction, count]) =>
                    `<span class="reaction" data-reaction="${reaction}" onclick="toggleReaction('${msg.id}','${reaction}')">${reaction} <span class="count">${count}</span></span>`
                ).join('') + `</div>`;
        }
        div.innerHTML = `
            <div class="message-bubble">
                ${msg.reply_to_id ? `<div class="reply-preview">↩️ Replying to: ${escapeHtml(msg.reply_to_content || "message")}</div>` : ''}
                ${contentHtml}
                <div class="message-time">${time}${isMe ? (msg.is_read ? '<i class="fas fa-check-double" title="Seen"></i>' : '<i class="fas fa-check" style="opacity:0.6;" title="Sent"></i>') : ''}</div>
                ${reactionsHtml}
            </div>
            <div class="message-actions">
                <button class="reply-btn" title="Reply"><i class="fas fa-reply"></i></button>
                ${isMe ? `<button class="edit-btn" title="Edit"><i class="fas fa-pen"></i></button>
                <button class="delete-btn" title="Delete for me"><i class="fas fa-trash"></i></button>
                <button class="delete-everyone-btn" title="Delete for everyone"><i class="fas fa-trash-alt"></i></button>` : ''}
                <button class="reaction-btn" title="Add reaction">😀</button>
            </div>
        `;
        attachMessageActions(div, msg);
        return div;
    }

    function attachMessageActions(messageDiv, msg) {
        messageDiv.querySelector('.reply-btn')?.addEventListener('click', () => {
            replyToId = msg.id;
            messageInput.placeholder = `Reply to: ${(msg.content || '').substring(0, 30)}...`;
            messageInput.focus();
        });
        messageDiv.querySelector('.edit-btn')?.addEventListener('click', () => editMessage(msg.id, msg.content));
        messageDiv.querySelector('.delete-btn')?.addEventListener('click', () => deleteMessage(msg.id, 'me'));
        messageDiv.querySelector('.delete-everyone-btn')?.addEventListener('click', () => deleteMessage(msg.id, 'everyone'));
        messageDiv.querySelector('.reaction-btn')?.addEventListener('click', (e) => {
            e.stopPropagation();
            showReactionPicker(msg.id, e);
        });
    }

    function addLoadMoreButton() {
        const existingBtn = document.querySelector('.load-more-container');
        if (existingBtn) existingBtn.remove();
        
        if (hasMoreMessages && offset > 0) {
            const container = document.createElement('div');
            container.className = 'load-more-container';
            container.innerHTML = `
                <button class="load-more-btn" id="loadMoreBtn">
                    <i class="fas fa-arrow-up"></i> Load Previous Messages
                </button>
            `;
            if (chatBox.firstChild) {
                chatBox.insertBefore(container, chatBox.firstChild);
            } else {
                chatBox.appendChild(container);
            }
            
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            if (loadMoreBtn) {
                loadMoreBtn.addEventListener('click', loadMoreMessages);
            }
        } else if (!hasMoreMessages && offset > 0) {
            const container = document.createElement('div');
            container.className = 'load-more-container';
            container.innerHTML = `<div class="no-more-messages">✨ No more messages ✨</div>`;
            if (chatBox.firstChild) {
                chatBox.insertBefore(container, chatBox.firstChild);
            } else {
                chatBox.appendChild(container);
            }
        }
    }

    async function loadMoreMessages() {
        if (isLoadingMore || !hasMoreMessages) return;
        
        isLoadingMore = true;
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        if (loadMoreBtn) {
            loadMoreBtn.disabled = true;
            loadMoreBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
        }
        
        // Save the current first message ID to maintain position
        const firstMessage = chatBox.querySelector('.message');
        if (firstMessage) {
            firstMessageIdBeforeLoad = firstMessage.getAttribute('data-message-id');
        }
        
        // Save current scroll position
        scrollPositionBeforeLoad = chatBox.scrollTop;
        
        try {
            const res = await fetch(`/load_more_messages?other_user_id=${otherUserId}&offset=${offset}`);
            const olderMessages = await res.json();
            
            if (olderMessages && olderMessages.length > 0) {
                // Remove load more button temporarily
                const loadMoreContainerElem = document.querySelector('.load-more-container');
                if (loadMoreContainerElem) loadMoreContainerElem.remove();
                
                // Get the first child to insert before
                const firstChild = chatBox.firstChild;
                
                // Add older messages at the top (reverse to maintain order)
                olderMessages.reverse().forEach(msg => {
                    const isMe = msg.sender_id === currentUserId;
                    const msgElement = createMessageElement(msg, isMe);
                    if (firstChild) {
                        chatBox.insertBefore(msgElement, firstChild);
                    } else {
                        chatBox.appendChild(msgElement);
                    }
                });
                
                offset += olderMessages.length;
                hasMoreMessages = olderMessages.length === 20;
                
                // Re-add load more button
                addLoadMoreButton();
                
                // Restore scroll position - NO AUTO SCROLLING
                // User will stay at the same position (near the load more button)
                setTimeout(() => {
                    if (firstMessageIdBeforeLoad) {
                        // Try to find the message that was previously first
                        const targetMessage = document.querySelector(`.message[data-message-id="${firstMessageIdBeforeLoad}"]`);
                        if (targetMessage) {
                            targetMessage.scrollIntoView({ block: 'start', behavior: 'auto' });
                        } else if (scrollPositionBeforeLoad > 0) {
                            chatBox.scrollTop = scrollPositionBeforeLoad;
                        }
                    } else if (scrollPositionBeforeLoad > 0) {
                        chatBox.scrollTop = scrollPositionBeforeLoad;
                    }
                }, 50);
                
            } else {
                hasMoreMessages = false;
                addLoadMoreButton();
            }
        } catch (error) {
            console.error('Error loading messages:', error);
        }
        
        isLoadingMore = false;
    }

    function appendMessage(msg, isMe = null) {
        const isMy = (isMe !== null) ? isMe : (msg.sender_id === currentUserId);
        const div = createMessageElement(msg, isMy);
        chatBox.appendChild(div);
        scrollToBottom();
    }

    function loadInitialMessages() {
        const initialMessages = {{ messages | tojson | safe }};
        if (initialMessages && initialMessages.length > 0) {
            initialMessages.forEach(msg => {
                const isMe = msg.sender_id === currentUserId;
                const div = createMessageElement(msg, isMe);
                chatBox.appendChild(div);
            });
            scrollToBottom();
        }
        addLoadMoreButton();
    }

    async function editMessage(messageId, oldContent) {
        const newContent = prompt("Edit your message:", oldContent);
        if (newContent && newContent !== oldContent) {
            const res = await fetch('/edit_message', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message_id: messageId, content: newContent, receiver_id: otherUserId})
            });
            if (res.ok) {
                const msgDiv = document.querySelector(`.message[data-message-id="${messageId}"] .message-text`);
                if (msgDiv) msgDiv.innerHTML = escapeHtml(newContent) + '<span class="edited-badge">(edited)</span>';
            }
        }
    }

    async function deleteMessage(messageId, deleteFor) {
        const res = await fetch(`/delete_message/${messageId}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({delete_for: deleteFor})
        });
        if (res.ok) {
            if (deleteFor === 'everyone') {
                const msgDiv = document.querySelector(`.message[data-message-id="${messageId}"] .message-bubble`);
                if (msgDiv) msgDiv.innerHTML = '<div class="message-text">⚠️ This message was deleted</div><div class="message-time"></div>';
            } else {
                document.querySelector(`.message[data-message-id="${messageId}"]`)?.remove();
            }
        }
    }

    window.toggleReaction = async function(messageId, reaction) {
        const res = await fetch('/react_to_message', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message_id: messageId, reaction, receiver_id: otherUserId})
        });
        const data = await res.json();
        if (data.success) updateReactionsUI(messageId, data.reactions);
    };

    function updateReactionsUI(messageId, reactions) {
        const container = document.getElementById(`reactions-${messageId}`);
        if (!container) return;
        const grouped = reactions.reduce((acc, r) => {
            acc[r.reaction] = (acc[r.reaction] || 0) + 1;
            return acc;
        }, {});
        container.innerHTML = Object.entries(grouped).map(([reaction, count]) =>
            `<span class="reaction" data-reaction="${reaction}" onclick="toggleReaction('${messageId}','${reaction}')">${reaction} <span class="count">${count}</span></span>`
        ).join('');
    }

    function showReactionPicker(messageId, event) {
        const reactions = ['👍', '❤️', '😂', '😮', '😢', '😡'];
        const picker = document.createElement('div');
        picker.className = 'reaction-picker';
        reactions.forEach(r => {
            const btn = document.createElement('button');
            btn.textContent = r;
            btn.onclick = () => { toggleReaction(messageId, r); picker.remove(); };
            picker.appendChild(btn);
        });
        document.body.appendChild(picker);
        const rect = event.target.getBoundingClientRect();
        picker.style.top = (rect.top - 50) + 'px';
        picker.style.left = rect.left + 'px';
        setTimeout(() => picker.remove(), 5000);
    }

    function sendTextMessage() {
        const content = messageInput.value.trim();
        if (!content) return;
        socket.emit('send_message', { receiver_id: otherUserId, content, message_type: 'text', reply_to_id: replyToId });
        messageInput.value = '';
        replyToId = null;
        messageInput.placeholder = 'Type a message...';
    }
    
    sendBtn.onclick = sendTextMessage;
    messageInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendTextMessage(); });

    let typingTimeout;
    messageInput.addEventListener('input', () => {
        socket.emit('typing', { receiver_id: otherUserId, is_typing: true });
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => socket.emit('typing', { receiver_id: otherUserId, is_typing: false }), 1000);
    });
    socket.on('user_typing', data => { typingIndicator.style.display = (data.user_id === otherUserId && data.is_typing) ? 'flex' : 'none'; });

    attachBtn.onclick = () => fileInput.click();
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('file', file);
        formData.append('receiver_id', otherUserId);
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const result = await res.json();
        if (!result.success) alert('Upload failed');
        fileInput.value = '';
    });

    micBtn.onclick = async () => {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            micBtn.innerHTML = '<i class="fas fa-microphone"></i>';
        } else {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const formData = new FormData();
                    formData.append('audio', audioBlob, 'voice.wav');
                    formData.append('receiver_id', otherUserId);
                    await fetch('/upload_audio', { method: 'POST', body: formData });
                    stream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start();
                micBtn.innerHTML = '<i class="fas fa-stop"></i>';
                setTimeout(() => { if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop(); }, 60000);
            } catch (error) {
                alert('Microphone access denied');
            }
        }
    };

    if (searchInput) {
        searchInput.addEventListener('input', async () => {
            const q = searchInput.value.trim();
            if (q.length < 2) { searchResultsDiv.style.display = 'none'; return; }
            const res = await fetch(`/search_messages?q=${encodeURIComponent(q)}&other_user_id=${otherUserId}`);
            const results = await res.json();
            if (results.length) {
                searchResultsDiv.innerHTML = results.map(r => `<div class="search-result-item" data-mid="${r.id}">${escapeHtml(r.content)}<br><small>${r.formatted_time || formatMessageTime(r.created_at)}</small></div>`).join('');
                searchResultsDiv.style.display = 'block';
                document.querySelectorAll('.search-result-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const msgDiv = document.querySelector(`.message[data-message-id="${el.dataset.mid}"]`);
                        if (msgDiv) msgDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        searchResultsDiv.style.display = 'none';
                    });
                });
            } else {
                searchResultsDiv.style.display = 'none';
            }
        });
        document.addEventListener('click', (e) => { if (!searchInput.contains(e.target)) searchResultsDiv.style.display = 'none'; });
    }

    if (Notification.permission === 'default') Notification.requestPermission();
    
    socket.on('new_message', (msg) => {
        if (msg.sender_id === otherUserId || msg.receiver_id === otherUserId) {
            if (!msg.formatted_time) {
                msg.formatted_time = formatMessageTime(msg.created_at);
            }
            appendMessage(msg);
            if (msg.sender_id === otherUserId) {
                socket.emit('mark_read', { sender_id: otherUserId });
                if (Notification.permission === 'granted' && document.hidden) {
                    new Notification(`New message from ${otherUserId}`, { body: msg.message_type === 'text' ? msg.content : 'Media' });
                }
            }
        }
    });
    
    socket.on('message_edited', (data) => {
        const msgDiv = document.querySelector(`.message[data-message-id="${data.message_id}"] .message-text`);
        if (msgDiv) msgDiv.innerHTML = escapeHtml(data.new_content) + '<span class="edited-badge">(edited)</span>';
    });
    
    socket.on('reaction_updated', (data) => { updateReactionsUI(data.message_id, data.reactions); });
    
    socket.on('user_status', data => {
        if (data.user_id === otherUserId) {
            const statusDiv = document.getElementById('onlineStatus');
            if (data.is_online) {
                statusDiv.innerHTML = '<span style="color: #2E7D32;">● Online</span>';
            } else {
                const lastSeenText = formatLastSeen(data.last_seen);
                statusDiv.innerHTML = lastSeenText;
            }
        }
    });
    
    socket.on('messages_read', data => {
        if (data.sender_id === otherUserId) {
            document.querySelectorAll('.message.my-message .fa-check').forEach(icon => {
                icon.classList.remove('fa-check');
                icon.classList.add('fa-check-double');
                icon.style.opacity = '1';
            });
        }
    });
    
    socket.on('message_deleted', (data) => {
        if (data.for_everyone) {
            const msgDiv = document.querySelector(`.message[data-message-id="${data.message_id}"] .message-bubble`);
            if (msgDiv) msgDiv.innerHTML = '<div class="message-text">⚠️ This message was deleted</div><div class="message-time"></div>';
        } else {
            document.querySelector(`.message[data-message-id="${data.message_id}"]`)?.remove();
        }
    });

    function sendReadReceipt() { socket.emit('mark_read', { sender_id: otherUserId }); }
    sendReadReceipt();
    chatBox.addEventListener('scroll', () => { 
        if (chatBox.scrollHeight - chatBox.scrollTop <= chatBox.clientHeight + 100) {
            sendReadReceipt();
        }
    });

    audioCallBtn.onclick = () => window.location.href = `/audio-call/${otherUserId}`;
    videoCallBtn.onclick = () => window.location.href = `/video-call/${otherUserId}`;

    // Load initial messages
    loadInitialMessages();
</script>
</body>
</html>
