<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp - Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            padding-top: 2rem;
        }
        .card {
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
            font-size: 1.25rem;
            padding: 1rem;
        }
        .list-group-item {
            transition: all 0.2s;
            border-left: none;
            border-right: none;
        }
        .list-group-item:hover {
            background-color: #f8f9fa;
            transform: translateX(5px);
        }
        .online-badge {
            color: #28a745;
            font-size: 0.8rem;
        }
        .offline-badge {
            color: #6c757d;
            font-size: 0.8rem;
        }
        .logout-btn {
            background-color: rgba(255,255,255,0.2);
            border: none;
            color: white;
        }
        .logout-btn:hover {
            background-color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="fas fa-comments me-2"></i> ChatApp</span>
                <a href="{{ url_for('logout') }}" class="btn logout-btn btn-sm">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
            <div class="card-body p-0">
                <div class="list-group list-group-flush">
                    {% for user in users %}
                    <a href="{{ url_for('chat', user_id=user.id) }}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                        <div>
                            <i class="fas fa-user-circle me-2 fa-lg"></i>
                            {{ user.username }}
                        </div>
                        <div>
                            {% if user.is_online %}
                                <span class="online-badge"><i class="fas fa-circle"></i> Online</span>
                            {% else %}
                                <span class="offline-badge"><i class="fas fa-circle"></i> Offline</span>
                            {% endif %}
                        </div>
                    </a>
                    {% else %}
                    <div class="text-center p-4 text-muted">
                        <i class="fas fa-users fa-2x mb-2"></i>
                        <p>No other users found.</p>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        var socket = io();
        // Auto-refresh user list when online status changes (simple reload)
        socket.on('user_status', function(data) {
            // Only reload if the status change affects the list
            location.reload();
        });
    </script>
</body>
</html>
