<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp - Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container { padding-top: 2rem; }
        .card {
            border-radius: 1.5rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.95);
        }
        .card-header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            font-weight: bold;
            font-size: 1.3rem;
            border: none;
            padding: 1rem 1.5rem;
        }
        .list-group-item {
            transition: all 0.2s ease;
            border-left: none;
            border-right: none;
            padding: 1rem 1.5rem;
            cursor: pointer;
        }
        .list-group-item:hover {
            background-color: #f8f9ff;
            transform: translateX(5px);
        }
        .user-info { flex-grow: 1; }
        .online-badge { color: #28a745; font-weight: 500; }
        .offline-badge { color: #6c757d; font-size: 0.85rem; }
        .call-icons a {
            color: #075e54;
            margin-left: 12px;
            text-decoration: none;
            font-size: 1.2rem;
            transition: color 0.2s;
        }
        .call-icons a:hover { color: #128c7e; }
        .unread-badge {
            background-color: #dc3545;
            color: white;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 8px;
        }
        .search-box { margin-bottom: 1rem; padding: 0 1rem; }
        .search-box input {
            border-radius: 30px;
            border: 1px solid #ddd;
            padding: 10px 20px;
            font-size: 0.9rem;
        }
        .fa-circle { font-size: 0.55rem; vertical-align: middle; }
        .status-text { font-size: 0.85rem; margin-left: 4px; }
        .avatar-icon { font-size: 1.8rem; margin-right: 12px; color: #4facfe; }
        .user-name { font-weight: 600; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="fas fa-comments me-2"></i> ChatApp</span>
                <a href="{{ url_for('logout') }}" class="btn btn-sm btn-light rounded-pill px-3">Logout</a>
            </div>
            <div class="card-body p-0">
                <div class="search-box mt-3">
                    <input type="text" id="searchInput" class="form-control" placeholder="🔍 Search users...">
                </div>
                <div class="list-group list-group-flush" id="usersList">
                    {% for user in users %}
                    <div class="list-group-item" data-user-id="{{ user.id }}" data-username="{{ user.username }}">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="user-info d-flex align-items-center">
                                <i class="fas fa-user-circle avatar-icon"></i>
                                <div>
                                    <div class="user-name">
                                        {{ user.username }}
                                        {% if unread_counts.get(user.id) %}
                                        <span class="unread-badge">{{ unread_counts[user.id] }}</span>
                                        {% endif %}
                                    </div>
                                    <div class="status-container" id="status-{{ user.id }}">
                                        {% if user.is_online %}
                                            <span class="online-badge"><i class="fas fa-circle"></i> <span class="status-text">Online</span></span>
                                        {% else %}
                                            <span class="offline-badge">
                                                <i class="fas fa-circle"></i>
                                                <span class="status-text">Last seen: {{ user.last_seen_formatted }}</span>
                                            </span>
                                        {% endif %}
                                    </div>
                                </div>
                            </div>
                            <div class="call-icons">
                                <a href="{{ url_for('chat', user_id=user.id) }}" class="chat-link" title="Chat"><i class="fas fa-comment"></i></a>
                                <a href="{{ url_for('audio_call', user_id=user.id) }}" class="audio-call-link" title="Audio Call"><i class="fas fa-phone"></i></a>
                                <a href="{{ url_for('video_call', user_id=user.id) }}" class="video-call-link" title="Video Call"><i class="fas fa-video"></i></a>
                            </div>
                        </div>
                    </div>
                    {% else %}
                    <div class="text-center p-4 text-muted">No other users found.</div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();
        const currentUserId = "{{ current_user.id }}";

        socket.on('user_status', (data) => {
            const statusDiv = document.getElementById(`status-${data.user_id}`);
            if (!statusDiv) return;
            if (data.is_online) {
                statusDiv.innerHTML = `<span class="online-badge"><i class="fas fa-circle"></i> <span class="status-text">Online</span></span>`;
            } else {
                let lastSeenText = "recently";
                if (data.last_seen) {
                    const date = new Date(data.last_seen);
                    lastSeenText = date.toLocaleString('en-IN', { hour12: true });
                }
                statusDiv.innerHTML = `<span class="offline-badge"><i class="fas fa-circle"></i> <span class="status-text">Last seen: ${lastSeenText}</span></span>`;
            }
        });

        socket.on('unread_update', (data) => {
            const userRow = document.querySelector(`.list-group-item[data-user-id="${data.sender_id}"]`);
            if (userRow) {
                let badge = userRow.querySelector('.unread-badge');
                if (data.count > 0) {
                    if (badge) badge.textContent = data.count;
                    else {
                        const nameSpan = userRow.querySelector('.user-name');
                        const newBadge = document.createElement('span');
                        newBadge.className = 'unread-badge';
                        newBadge.textContent = data.count;
                        nameSpan.appendChild(newBadge);
                    }
                } else {
                    if (badge) badge.remove();
                }
            }
        });

        // Search filter
        const searchInput = document.getElementById('searchInput');
        const userItems = document.querySelectorAll('.list-group-item');
        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase();
            userItems.forEach(item => {
                const username = item.getAttribute('data-username').toLowerCase();
                item.style.display = username.includes(query) ? '' : 'none';
            });
        });

        // Online first sorting
        const usersContainer = document.getElementById('usersList');
        const items = Array.from(userItems);
        items.sort((a, b) => {
            const aOnline = a.querySelector('.online-badge') !== null;
            const bOnline = b.querySelector('.online-badge') !== null;
            if (aOnline && !bOnline) return -1;
            if (!aOnline && bOnline) return 1;
            return 0;
        });
        items.forEach(item => usersContainer.appendChild(item));

        // Click on card redirects to chat (except call icons)
        document.querySelectorAll('.list-group-item').forEach(card => {
            const userId = card.getAttribute('data-user-id');
            const chatUrl = `/chat/${userId}`;
            card.addEventListener('click', (e) => {
                if (e.target.closest('.call-icons')) {
                    e.stopPropagation();
                    return;
                }
                window.location.href = chatUrl;
            });
        });
    </script>
    <script src="{{ url_for('static', filename='js/call-notification.js') }}"></script>
</body>
</html>
