<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp - Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { padding-top: 2rem; }
        .card { border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-weight: bold; }
        .list-group-item { transition: all 0.2s; }
        .list-group-item:hover { background-color: #f8f9fa; transform: translateX(5px); }
        .online-badge { color: #28a745; }
        .offline-badge { color: #6c757d; }
        .call-icons a { color: #075e54; margin-left: 8px; text-decoration: none; }
        .call-icons a:hover { color: #128c7e; }
        .last-seen { font-size: 0.75rem; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="fas fa-comments me-2"></i> ChatApp</span>
                <a href="{{ url_for('logout') }}" class="btn btn-sm btn-light">Logout</a>
            </div>
            <div class="card-body p-0">
                <div class="list-group list-group-flush">
                    {% for user in users %}
                    <div class="list-group-item d-flex justify-content-between align-items-center">
                        <div><i class="fas fa-user-circle me-2 fa-lg"></i> {{ user.username }}</div>
                        <div>
                            {% if user.is_online %}
                                <span class="online-badge"><i class="fas fa-circle"></i> Online</span>
                            {% else %}
                                <span class="offline-badge">
                                    <i class="fas fa-circle"></i> 
                                    Last seen: 
                                    {% if user.last_seen %}
                                        {{ user.last_seen[:16].replace('T', ' ') }}
                                    {% else %}
                                        recently
                                    {% endif %}
                                </span>
                            {% endif %}
                            <span class="call-icons">
                                <a href="{{ url_for('chat', user_id=user.id) }}" title="Chat"><i class="fas fa-comment"></i></a>
                                <a href="{{ url_for('audio_call', user_id=user.id) }}" title="Audio Call"><i class="fas fa-phone"></i></a>
                                <a href="{{ url_for('video_call', user_id=user.id) }}" title="Video Call"><i class="fas fa-video"></i></a>
                            </span>
                        </div>
                    </div>
                    {% else %}
                    <div class="text-center p-4 text-muted">No other users found.</div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();
        socket.on('user_status', () => location.reload());
    </script>
</body>
</html>
