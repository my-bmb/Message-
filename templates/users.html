<!DOCTYPE html>
<html>
<head>
    <title>Users - ChatApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">ChatApp</span>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-light">Logout</a>
        </div>
    </nav>
    <div class="container mt-4">
        <h4>Users Online</h4>
        <div class="list-group">
            {% for user in users %}
            <a href="{{ url_for('chat', user_id=user.id) }}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                {{ user.username }}
                <span class="badge {% if user.is_online %}bg-success{% else %}bg-secondary{% endif %}">
                    {% if user.is_online %}Online{% else %}Offline{% endif %}
                </span>
            </a>
            {% endfor %}
        </div>
    </div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        var socket = io();
        socket.on('user_status', function(data) {
            location.reload(); // simple refresh on status change
        });
    </script>
</body>
</html>
