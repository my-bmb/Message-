<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Audio Call with {{ other_user.username }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter + Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1c, #03060c);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
            position: relative;
            overflow: hidden;
        }

        /* Animated background blobs */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.3), transparent 70%);
            top: -100px;
            left: -100px;
            border-radius: 50%;
            filter: blur(60px);
            animation: floatBlob 20s infinite alternate;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.2), transparent 70%);
            bottom: -150px;
            right: -100px;
            border-radius: 50%;
            filter: blur(80px);
            animation: floatBlob 25s infinite alternate-reverse;
        }

        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            100% { transform: translate(30px, 40px) scale(1.2); opacity: 0.8; }
        }

        /* Main card */
        .call-card {
            background: rgba(18, 22, 35, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 2rem 2rem 2rem 2rem;
            width: 100%;
            max-width: 520px;
            margin: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Avatar */
        .avatar-wrapper {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .avatar-ring {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #2a2f4b, #1a1f33);
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .avatar-ring i {
            font-size: 3.8rem;
            color: #cbd5e6;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .user-name {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #ffffff, #b9c3e6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 12px;
        }

        /* Status + timer */
        .call-status {
            font-size: 0.9rem;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.5);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
            margin-bottom: 16px;
            color: #a0b3d9;
        }

        .timer {
            font-family: 'Space Grotesk', monospace;
            font-size: 2.8rem;
            font-weight: 500;
            letter-spacing: 3px;
            background: linear-gradient(120deg, #eef2ff, #9aa9cf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 28px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Control buttons */
        .controls {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .ctrl-btn {
            background: rgba(30, 35, 55, 0.8);
            backdrop-filter: blur(8px);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.6rem;
            color: #eef2ff;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .ctrl-btn:hover {
            transform: translateY(-3px) scale(1.02);
            background: rgba(50, 58, 85, 0.9);
            color: white;
        }
        .ctrl-btn.active {
            background: #e11d48;
            color: white;
            box-shadow: 0 0 12px rgba(225, 29, 72, 0.6);
        }

        /* Call action buttons */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 8px;
        }
        .end-btn, .recall-btn {
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50px;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        .end-btn {
            background: #dc2626;
            color: white;
        }
        .end-btn:hover {
            background: #b91c1c;
            transform: scale(1.05);
        }
        .recall-btn {
            background: #10b981;
            color: white;
        }
        .recall-btn:hover {
            background: #059669;
            transform: scale(1.05);
        }

        /* Incoming call popup (glassmorphic) */
        .incoming-popup {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            background: rgba(25, 30, 45, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 14px 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            font-weight: 500;
        }
        .incoming-popup span i {
            margin-right: 12px;
            color: #34d399;
        }
        .incoming-popup button {
            background: none;
            border: none;
            font-size: 1.8rem;
            margin: 0 6px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .accept-btn { color: #34d399; }
        .reject-btn { color: #f87171; }
        .accept-btn:hover, .reject-btn:hover { transform: scale(1.1); }

        /* Toast message */
        .toast-msg {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #e2e8f0;
            z-index: 2000;
            display: none;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.15);
            letter-spacing: 0.3px;
        }

        /* Responsive */
        @media (max-width: 550px) {
            .call-card { padding: 1.5rem; border-radius: 40px; }
            .avatar-ring { width: 90px; height: 90px; }
            .avatar-ring i { font-size: 2.8rem; }
            .user-name { font-size: 1.5rem; }
            .timer { font-size: 2rem; }
            .ctrl-btn { width: 50px; height: 50px; font-size: 1.3rem; }
            .end-btn, .recall-btn { width: 60px; height: 60px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <audio id="remoteAudio" autoplay style="display: none;"></audio>
    <div class="call-card">
        <div class="avatar-wrapper">
            <div class="avatar-ring">
                <i class="fas fa-user-circle"></i>
            </div>
            <div class="user-name">{{ other_user.username }}</div>
        </div>
        <div style="text-align: center;">
            <div class="call-status" id="callStatus">Initializing...</div>
            <div class="timer" id="timer">00:00</div>
        </div>
        <div class="controls">
            <button class="ctrl-btn" id="muteBtn" title="Mute"><i class="fas fa-microphone"></i></button>
            <button class="ctrl-btn" id="speakerBtn" title="Speaker"><i class="fas fa-volume-up"></i></button>
            <button class="ctrl-btn" id="holdBtn" title="Hold"><i class="fas fa-pause"></i></button>
        </div>
        <div class="action-buttons">
            <button class="end-btn" id="endCallBtn"><i class="fas fa-phone-slash"></i></button>
            <button class="recall-btn" id="callAgainBtn" style="display: none;"><i class="fas fa-phone-alt"></i></button>
        </div>
    </div>

    <div id="incomingPopup" class="incoming-popup">
        <span><i class="fas fa-phone-alt fa-shake"></i> Incoming call from <strong id="callerName"></strong></span>
        <div>
            <button id="acceptCallBtn" class="accept-btn"><i class="fas fa-check-circle"></i></button>
            <button id="rejectCallBtn" class="reject-btn"><i class="fas fa-times-circle"></i></button>
        </div>
    </div>
    <div id="toastMsg" class="toast-msg"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // -------------------- User & call info --------------------
        const currentUserId = "{{ current_user.id }}";
        const otherUserId = "{{ other_user.id }}";
        const callType = "audio";
        const socket = io();

        const urlParams = new URLSearchParams(window.location.search);
        let isCaller = urlParams.get('role') !== 'receiver';

        const pendingOfferJson = sessionStorage.getItem('pendingOffer');
        if (pendingOfferJson) {
            sessionStorage.removeItem('pendingOffer');
            const pending = JSON.parse(pendingOfferJson);
            isCaller = false;
            window.pendingCall = pending;
        }

        // -------------------- DOM elements --------------------
        const remoteAudio = document.getElementById('remoteAudio');
        const callStatusDiv = document.getElementById('callStatus');
        const timerDiv = document.getElementById('timer');
        const muteBtn = document.getElementById('muteBtn');
        const speakerBtn = document.getElementById('speakerBtn');
        const holdBtn = document.getElementById('holdBtn');
        const endCallBtn = document.getElementById('endCallBtn');
        const callAgainBtn = document.getElementById('callAgainBtn');
        const incomingPopup = document.getElementById('incomingPopup');
        const acceptCallBtn = document.getElementById('acceptCallBtn');
        const rejectCallBtn = document.getElementById('rejectCallBtn');
        const callerNameSpan = document.getElementById('callerName');
        const toastMsg = document.getElementById('toastMsg');

        // -------------------- State --------------------
        let peerConnection = null;
        let localStream = null;
        let callStartTime = null;
        let timerInterval = null;
        let isMuted = false;
        let isOnHold = false;
        let ringtoneContext = null;
        let audioEnabledByUser = false;

        // -------------------- FAST ICE: only STUN --------------------
        const iceServers = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun.voipbuster.com' }
            ],
            iceCandidatePoolSize: 10
        };

        function showToast(msg, duration = 2000) {
            toastMsg.innerText = msg;
            toastMsg.style.display = 'block';
            setTimeout(() => { toastMsg.style.display = 'none'; }, duration);
        }

        // Timer functions
        function updateTimer() {
            if (!callStartTime) return;
            const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            timerDiv.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }
        function startTimer() { callStartTime = Date.now(); if (timerInterval) clearInterval(timerInterval); timerInterval = setInterval(updateTimer, 1000); }
        function stopTimer() { if (timerInterval) clearInterval(timerInterval); timerInterval = null; callStartTime = null; timerDiv.innerText = '00:00'; }

        // Ringtone (modern, gentle)
        function playRingtone() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            ringtoneContext = ctx;
            const gainNode = ctx.createGain();
            gainNode.gain.value = 0.25;
            gainNode.connect(ctx.destination);
            const playTone = (freq, duration) => new Promise(resolve => {
                const osc = ctx.createOscillator();
                osc.frequency.value = freq;
                osc.type = 'sine';
                osc.connect(gainNode);
                osc.start();
                setTimeout(() => { osc.stop(); resolve(); }, duration);
            });
            const ringPattern = async () => {
                if (!ringtoneContext) return;
                await playTone(440, 400);
                await new Promise(r => setTimeout(r, 200));
                if (!ringtoneContext) return;
                await playTone(440, 400);
                await new Promise(r => setTimeout(r, 200));
                if (!ringtoneContext) return;
                await playTone(440, 400);
                await new Promise(r => setTimeout(r, 800));
                if (ringtoneContext) ringPattern();
            };
            ringPattern();
        }
        function stopRingtone() { if (ringtoneContext) { ringtoneContext.close(); ringtoneContext = null; } }

        function ensureAudioPlay() {
            if (remoteAudio.srcObject && !audioEnabledByUser) {
                remoteAudio.play().catch(e => {
                    console.warn('Autoplay blocked:', e);
                    showToast('Tap anywhere to enable audio');
                    const enableHandler = () => {
                        remoteAudio.play().then(() => {
                            audioEnabledByUser = true;
                            showToast('Audio enabled');
                        }).catch(err => console.log);
                        document.removeEventListener('click', enableHandler);
                    };
                    document.addEventListener('click', enableHandler);
                });
            }
        }

        async function createPeerConnection() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            peerConnection = new RTCPeerConnection(iceServers);
            if (localStream) {
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                const sender = peerConnection.getSenders().find(s => s.track?.kind === 'audio');
                if (sender) {
                    const params = sender.getParameters();
                    if (params.encodings) {
                        params.encodings[0].maxBitrate = 24000;
                        await sender.setParameters(params).catch(e => console.log);
                    }
                }
            }
            peerConnection.ontrack = (event) => {
                remoteAudio.srcObject = event.streams[0];
                ensureAudioPlay();
            };
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice_candidate', { target_id: otherUserId, candidate: event.candidate });
                }
            };
            peerConnection.oniceconnectionstatechange = () => {
                const state = peerConnection.iceConnectionState;
                if (state === 'connected' || state === 'completed') {
                    callStatusDiv.innerText = 'Connected';
                    if (!callStartTime) startTimer();
                    callAgainBtn.style.display = 'none';
                } else if (state === 'failed') {
                    callStatusDiv.innerText = 'Connection failed';
                    showToast('Connection failed. Tap "Call again" to retry.');
                    endCallInternal(false);
                    callAgainBtn.style.display = 'inline-flex';
                } else if (state === 'disconnected') {
                    showToast('Connection unstable...');
                }
            };
            return peerConnection;
        }

        function endCallInternal(notifyServer = true) {
            stopTimer();
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            if (notifyServer) {
                socket.emit('end_call', { target_id: otherUserId });
            }
            stopRingtone();
            isMuted = false;
            isOnHold = false;
            muteBtn.classList.remove('active');
            muteBtn.innerHTML = '<i class="fas fa-microphone"></i>';
            holdBtn.classList.remove('active');
            holdBtn.innerHTML = '<i class="fas fa-pause"></i>';
            callStatusDiv.innerText = 'Call ended';
            callAgainBtn.style.display = 'inline-flex';
        }

        function endCallWithRedirect(reason = '') {
            endCallInternal(true);
            if (reason) callStatusDiv.innerText = reason;
            showToast(reason || 'Call ended');
        }

        async function initiateCall() {
            endCallInternal(true);
            callAgainBtn.style.display = 'none';
            callStatusDiv.innerText = 'Starting call...';
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
                const pc = await createPeerConnection();
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                const emitCall = () => {
                    socket.emit('call_user', { target_id: otherUserId, call_type: callType, offer: pc.localDescription });
                };
                if (socket.connected) emitCall(); else socket.once('connect', emitCall);
                callStatusDiv.innerText = 'Ringing...';
                const timeoutId = setTimeout(() => {
                    if (peerConnection?.iceConnectionState !== 'connected') {
                        endCallWithRedirect('No answer');
                        callAgainBtn.style.display = 'inline-flex';
                    }
                }, 30000);
                socket.once('call_answered', async (data) => {
                    clearTimeout(timeoutId);
                    if (pc.signalingState === 'have-local-offer') {
                        await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                    }
                });
                socket.once('call_rejected', () => { clearTimeout(timeoutId); endCallWithRedirect('Call rejected'); });
                socket.once('call_timeout', () => { clearTimeout(timeoutId); endCallWithRedirect('No answer'); });
            } catch (err) {
                console.error(err);
                endCallWithRedirect('Microphone error');
                callAgainBtn.style.display = 'inline-flex';
            }
        }

        async function acceptIncomingCall(callerId, offerSdp) {
            stopRingtone();
            incomingPopup.style.display = 'none';
            callStatusDiv.innerText = 'Connecting...';
            callAgainBtn.style.display = 'none';
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
                const pc = await createPeerConnection();
                await pc.setRemoteDescription(new RTCSessionDescription(offerSdp));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.emit('answer_call', { caller_id: callerId, answer: pc.localDescription, call_type: callType });
            } catch (err) {
                console.error(err);
                endCallWithRedirect('Failed to accept call');
                callAgainBtn.style.display = 'inline-flex';
            }
        }

        function toggleMute() {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(track => track.enabled = !isMuted);
            muteBtn.classList.toggle('active', isMuted);
            muteBtn.innerHTML = isMuted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
        }
        function toggleSpeaker() { showToast('Adjust system volume'); }
        function toggleHold() {
            if (!localStream) return;
            isOnHold = !isOnHold;
            localStream.getAudioTracks().forEach(track => track.enabled = !isOnHold);
            holdBtn.classList.toggle('active', isOnHold);
            holdBtn.innerHTML = isOnHold ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
            callStatusDiv.innerText = isOnHold ? 'Call on hold' : (peerConnection?.iceConnectionState === 'connected' ? 'Connected' : 'Connecting...');
        }

        muteBtn.onclick = toggleMute;
        speakerBtn.onclick = toggleSpeaker;
        holdBtn.onclick = toggleHold;
        endCallBtn.onclick = () => endCallWithRedirect('Call ended by you');
        callAgainBtn.onclick = () => initiateCall();

        // Socket events
        socket.on('incoming_call', (data) => {
            if (data.caller_id === otherUserId) {
                callerNameSpan.innerText = data.caller_name;
                incomingPopup.style.display = 'flex';
                playRingtone();
                acceptCallBtn.onclick = () => { acceptIncomingCall(data.caller_id, data.offer); };
                rejectCallBtn.onclick = () => { stopRingtone(); socket.emit('reject_call', { caller_id: data.caller_id }); endCallWithRedirect('Call rejected'); };
            }
        });
        socket.on('call_answered', async (data) => {
            if (peerConnection && peerConnection.signalingState === 'have-local-offer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
        });
        socket.on('ice_candidate', async (data) => {
            if (peerConnection) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                } catch (e) { console.warn('ICE candidate error', e); }
            }
        });
        socket.on('call_ended', () => endCallWithRedirect('Call ended'));
        socket.on('call_rejected', () => endCallWithRedirect('Call rejected'));
        socket.on('call_timeout', () => endCallWithRedirect('No answer'));
        socket.on('call_error', (err) => endCallWithRedirect(err.message));

        socket.on('renegotiate', async (data) => {
            if (peerConnection && data.offer) {
                try {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    socket.emit('renegotiate_answer', { target_id: data.caller_id || otherUserId, answer });
                } catch (e) { console.log('renegotiate error', e); }
            }
        });
        socket.on('renegotiate_answer', async (data) => {
            if (peerConnection && peerConnection.signalingState === 'have-local-offer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
        });

        if (window.pendingCall) {
            const pending = window.pendingCall;
            const doAccept = () => { acceptIncomingCall(pending.callerId, pending.offer); };
            if (socket.connected) doAccept(); else socket.once('connect', doAccept);
        } else if (isCaller) {
            initiateCall();
        } else {
            callStatusDiv.innerText = 'Waiting for call...';
            callAgainBtn.style.display = 'none';
        }
    </script>
</body>
</html>
