<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Audio Call with {{ other_user.username }} - Professional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1c, #03060c);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .call-card {
            background: rgba(18, 22, 35, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 2rem;
            width: 100%;
            max-width: 520px;
            margin: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .avatar-wrapper { text-align: center; margin-bottom: 1.5rem; position: relative; }
        .avatar-ring {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #2a2f4b, #1a1f33);
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.3s ease;
        }
        .avatar-ring.active-ring {
            box-shadow: 0 0 20px rgba(52, 211, 153, 0.5);
            border-color: #34d399;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .avatar-ring i { font-size: 3.8rem; color: #cbd5e6; }
        .user-name {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #b9c3e6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 12px;
        }
        .user-id-badge {
            font-size: 10px;
            color: #888;
            margin-top: 4px;
            font-family: monospace;
        }
        .call-status {
            font-size: 0.9rem;
            font-weight: 500;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            margin-bottom: 16px;
            color: #a0b3d9;
        }
        .timer {
            font-family: monospace;
            font-size: 2.8rem;
            font-weight: 500;
            letter-spacing: 3px;
            background: linear-gradient(120deg, #eef2ff, #9aa9cf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 28px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 32px;
        }
        .ctrl-btn {
            background: rgba(30,35,55,0.8);
            backdrop-filter: blur(8px);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.6rem;
            color: #eef2ff;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .ctrl-btn:hover { transform: translateY(-3px); background: rgba(50,58,85,0.9); }
        .ctrl-btn.active { background: #e11d48; color: white; }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 8px;
        }
        .end-btn {
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50px;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            background: #dc2626;
            color: white;
        }
        .end-btn:hover { background: #b91c1c; transform: scale(1.05); }
        .incoming-popup {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            background: rgba(25,30,45,0.98);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 14px 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            border: 2px solid #34d399;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .incoming-popup span i { margin-right: 12px; color: #34d399; animation: ring 1s infinite; }
        @keyframes ring {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(15deg); }
            75% { transform: rotate(-15deg); }
        }
        .incoming-popup button {
            background: none;
            border: none;
            font-size: 1.8rem;
            margin: 0 6px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .incoming-popup button:hover { transform: scale(1.1); }
        .accept-btn { color: #34d399; }
        .reject-btn { color: #f87171; }
        .toast-msg {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #e2e8f0;
            z-index: 2000;
            display: none;
            white-space: nowrap;
        }
        .quality-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-family: monospace;
            z-index: 1000;
        }
        .quality-excellent { color: #34d399; }
        .quality-good { color: #60a5fa; }
        .quality-poor { color: #fbbf24; }
        .quality-bad { color: #f87171; }
        
        .volume-meter {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        .volume-level {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #34d399, #10b981);
            transition: width 0.05s;
        }
        
        .debug-panel {
            position: fixed;
            bottom: 10px;
            left: 10px;
            width: 400px;
            max-height: 250px;
            background: rgba(0, 0, 0, 0.95);
            border-radius: 12px;
            border-left: 3px solid #34d399;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            z-index: 500;
            overflow-y: auto;
            padding: 8px;
            color: #0f0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .debug-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            margin-bottom: 6px;
            padding-bottom: 4px;
            font-weight: bold;
            font-size: 11px;
            color: #fff;
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.95);
        }
        .debug-panel-header button {
            background: #dc2626;
            border: none;
            color: white;
            border-radius: 4px;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 9px;
        }
        .debug-entry {
            border-bottom: 1px solid #222;
            padding: 3px 0;
            font-size: 9px;
            word-break: break-word;
        }
        .debug-time { color: #888; margin-right: 6px; }
        .debug-error { color: #f87171; }
        .debug-warn { color: #fbbf24; }
        .debug-success { color: #34d399; }
        .debug-info { color: #60a5fa; }
        .debug-critical { color: #ff6b6b; background: #330000; font-weight: bold; }
        
        @media (max-width: 550px) {
            .call-card { padding: 1.5rem; border-radius: 40px; }
            .avatar-ring { width: 90px; height: 90px; }
            .avatar-ring i { font-size: 2.8rem; }
            .user-name { font-size: 1.5rem; }
            .timer { font-size: 2rem; }
            .ctrl-btn { width: 50px; height: 50px; font-size: 1.3rem; }
            .end-btn { width: 65px; height: 65px; font-size: 1.6rem; }
            .debug-panel { width: 300px; max-height: 200px; font-size: 8px; }
        }
    </style>
</head>
<body>
    <audio id="remoteAudio" autoplay style="display: none;"></audio>
    
    <div class="call-card">
        <div class="avatar-wrapper">
            <div class="avatar-ring" id="avatarRing">
                <i class="fas fa-user-circle"></i>
            </div>
            <div class="volume-meter">
                <div class="volume-level" id="volumeLevel"></div>
            </div>
            <div class="user-name">{{ other_user.username }}</div>
            <div class="user-id-badge" id="otherUserIdDisplay"></div>
        </div>
        <div style="text-align: center;">
            <div class="call-status" id="callStatus">Initializing...</div>
            <div class="timer" id="timer">00:00</div>
        </div>
        <div class="controls">
            <button class="ctrl-btn" id="muteBtn" title="Mute"><i class="fas fa-microphone"></i></button>
            <button class="ctrl-btn" id="speakerBtn" title="Speaker"><i class="fas fa-volume-up"></i></button>
            <button class="ctrl-btn" id="holdBtn" title="Hold"><i class="fas fa-pause"></i></button>
        </div>
        <div class="action-buttons">
            <button class="end-btn" id="endCallBtn"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <div id="incomingPopup" class="incoming-popup">
        <span><i class="fas fa-phone-alt"></i> 📞 Incoming call from <strong id="callerName"></strong></span>
        <div>
            <button id="acceptCallBtn" class="accept-btn"><i class="fas fa-check-circle"></i> Accept</button>
            <button id="rejectCallBtn" class="reject-btn"><i class="fas fa-times-circle"></i> Reject</button>
        </div>
    </div>
    
    <div id="toastMsg" class="toast-msg"></div>
    <div id="qualityBadge" class="quality-badge quality-good">📡 Connecting...</div>
    
    <div class="debug-panel" id="debugPanel">
        <div class="debug-panel-header">
            <span>🔊 AUDIO CALL - CALL MANAGER ACTIVE</span>
            <button id="clearDebugBtn">Clear</button>
        </div>
        <div id="debugLogs">
            <div class="debug-entry"><span class="debug-time">[Init]</span> <span class="debug-success">CallManager v3.0 initialized</span></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // ==================== DEBUG LOGGER ====================
        const DebugLogger = {
            logs: [],
            
            log: function(message, type = 'info', category = 'general') {
                const timestamp = new Date().toLocaleTimeString();
                const logEntry = { timestamp, message, type, category };
                this.logs.unshift(logEntry);
                if (this.logs.length > 200) this.logs.pop();
                
                const styles = {
                    error: 'background: #e11d48; color: white; padding: 2px 4px; border-radius: 3px;',
                    warn: 'background: #f39c12; color: black; padding: 2px 4px; border-radius: 3px;',
                    success: 'background: #2ecc71; color: black; padding: 2px 4px; border-radius: 3px;',
                    info: 'background: #3498db; color: white; padding: 2px 4px; border-radius: 3px;',
                    critical: 'background: #ff0000; color: white; padding: 2px 4px; border-radius: 3px; font-weight: bold;'
                };
                const style = styles[type] || styles.info;
                console.log(`%c[${timestamp}] [${category}] ${message}`, style);
                this.updateUI(logEntry);
            },
            
            error: function(msg, cat) { this.log(msg, 'error', cat); },
            warn: function(msg, cat) { this.log(msg, 'warn', cat); },
            success: function(msg, cat) { this.log(msg, 'success', cat); },
            info: function(msg, cat) { this.log(msg, 'info', cat); },
            critical: function(msg, cat) { this.log(msg, 'critical', cat); },
            
            updateUI: function(entry) {
                const container = document.getElementById('debugLogs');
                if (!container) return;
                
                const typeClass = {
                    error: 'debug-error', warn: 'debug-warn', success: 'debug-success',
                    info: 'debug-info', critical: 'debug-critical'
                }[entry.type] || 'debug-info';
                
                const div = document.createElement('div');
                div.className = 'debug-entry';
                div.innerHTML = `<span class="debug-time">[${entry.timestamp}]</span> <span class="${typeClass}">[${entry.category.toUpperCase()}]</span> ${this.escapeHtml(entry.message)}`;
                container.insertBefore(div, container.firstChild);
                
                while (container.children.length > 150) {
                    container.removeChild(container.lastChild);
                }
            },
            
            escapeHtml: function(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        };
        
        document.getElementById('clearDebugBtn')?.addEventListener('click', () => {
            const container = document.getElementById('debugLogs');
            if (container) {
                container.innerHTML = '<div class="debug-entry"><span class="debug-time">[Cleared]</span> <span class="debug-info">Logs cleared</span></div>';
            }
            DebugLogger.logs = [];
        });
        
        // ==================== CALL MANAGER CLASS ====================
        class CallManager {
            constructor(config = {}) {
                this.config = {
                    callTimeout: config.callTimeout || 35000,
                    iceTimeout: config.iceTimeout || 12000,
                    reconnectAttempts: config.reconnectAttempts || 10,
                    reconnectDelay: config.reconnectDelay || 1000,
                    debug: config.debug !== false,
                    enableTURN: config.enableTURN !== false,
                    ...config
                };
                
                this.socket = null;
                this.peerConnection = null;
                this.localStream = null;
                this.remoteStream = null;
                this.pendingIceCandidates = [];
                this.isCallActive = false;
                this.isCaller = false;
                this.callStartTime = null;
                this.callTimer = null;
                this.iceCandidateCount = 0;
                this.currentUserId = null;
                this.currentUserName = null;
                this.targetUserId = null;
                this.targetUserName = null;
                this.callType = 'audio';
                this.callTimeoutId = null;
                this.reconnectAttempt = 0;
                
                this.callbacks = {
                    onIncomingCall: null,
                    onCallAccepted: null,
                    onCallRejected: null,
                    onCallEnded: null,
                    onCallError: null,
                    onLocalStreamReady: null,
                    onRemoteStreamReady: null,
                    onConnectionStateChange: null,
                    onIceStateChange: null,
                    onCallTimer: null
                };
                
                this.audioConstraints = {
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                };
                
                this.iceServers = this.getIceServers();
                this.init();
            }
            
            getIceServers() {
                const servers = [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'stun:stun3.l.google.com:19302' },
                    { urls: 'stun:stun4.l.google.com:19302' },
                    { urls: 'stun:stun.stunprotocol.org:3478' }
                ];
                
                if (this.config.enableTURN) {
                    servers.push(
                        { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                        { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
                    );
                }
                return servers;
            }
            
            init() {
                this.debug('success', 'CallManager initialized');
                this.setupSocket();
                this.setupBeforeUnload();
            }
            
            setupSocket() {
                this.socket = io({
                    reconnection: true,
                    reconnectionAttempts: this.config.reconnectAttempts,
                    reconnectionDelay: this.config.reconnectDelay,
                    timeout: 20000
                });
                
                this.socket.on('connect', () => {
                    this.debug('success', `Socket connected! ID: ${this.socket.id}`);
                    this.reconnectAttempt = 0;
                    
                    if (this.currentUserId) {
                        this.registerUser(this.currentUserId, this.currentUserName);
                    }
                    
                    this.checkPendingCalls();
                });
                
                this.socket.on('disconnect', () => {
                    this.debug('warn', 'Socket disconnected!');
                    if (this.isCallActive) {
                        this.handleCallError('Connection lost');
                    }
                });
                
                this.socket.on('connect_error', (err) => {
                    this.debug('error', `Socket error: ${err.message}`);
                    this.reconnectAttempt++;
                });
                
                this.socket.on('incoming_call', (data) => this.handleIncomingCall(data));
                this.socket.on('call_answered', (data) => this.handleCallAnswered(data));
                this.socket.on('ice_candidate', (data) => this.handleIceCandidate(data));
                this.socket.on('call_ended', () => this.handleCallEnded());
                this.socket.on('call_rejected', () => this.handleCallRejected());
                this.socket.on('call_timeout', () => this.handleCallTimeout());
                this.socket.on('call_error', (err) => this.handleCallError(err.message));
                this.socket.on('user_registered', (data) => {
                    this.debug('success', `User registered: ${data.user_id}`);
                });
            }
            
            registerUser(userId, userName = null) {
                this.currentUserId = userId;
                this.currentUserName = userName;
                
                if (this.socket && this.socket.connected) {
                    this.socket.emit('register_user', { user_id: userId, user_name: userName });
                    this.debug('info', `Registered user: ${userId}`);
                    return true;
                }
                return false;
            }
            
            async startCall(targetUserId, targetUserName) {
                this.debug('critical', `========== STARTING AUDIO CALL to ${targetUserId} ==========`);
                
                if (!targetUserId) {
                    this.debug('error', 'No target user');
                    return false;
                }
                
                if (this.isCallActive) {
                    await this.endCall();
                }
                
                this.targetUserId = targetUserId;
                this.targetUserName = targetUserName;
                this.isCaller = true;
                
                if (!this.socket || !this.socket.connected) {
                    this.debug('info', 'Waiting for socket...');
                    await this.waitForSocket();
                }
                
                try {
                    this.debug('info', 'Requesting microphone...');
                    this.localStream = await navigator.mediaDevices.getUserMedia(this.audioConstraints);
                    this.debug('success', `Microphone: ${this.localStream.getAudioTracks()[0]?.label || 'active'}`);
                    
                    if (this.callbacks.onLocalStreamReady) {
                        this.callbacks.onLocalStreamReady(this.localStream);
                    }
                    
                    await this.createPeerConnection();
                    
                    this.localStream.getTracks().forEach(track => {
                        this.peerConnection.addTrack(track, this.localStream);
                        this.debug('info', `Added ${track.kind} track`);
                    });
                    
                    this.debug('info', 'Creating offer...');
                    const offer = await this.peerConnection.createOffer({ offerToReceiveAudio: true });
                    await this.peerConnection.setLocalDescription(offer);
                    this.debug('success', 'Offer created');
                    
                    this.socket.emit('call_user', {
                        target_id: targetUserId,
                        caller_id: this.currentUserId,
                        caller_name: this.currentUserName,
                        call_type: 'audio',
                        offer: this.peerConnection.localDescription
                    });
                    this.debug('socket', `Call offer sent to ${targetUserId}`);
                    
                    this.setCallTimeout();
                    this.isCallActive = true;
                    this.saveCallState();
                    
                    return true;
                    
                } catch (err) {
                    this.debug('error', `Start call failed: ${err.message}`);
                    this.cleanupCall();
                    
                    let msg = 'Microphone access denied';
                    if (err.name === 'NotAllowedError') msg = 'Please allow microphone access';
                    if (this.callbacks.onCallError) this.callbacks.onCallError(msg);
                    return false;
                }
            }
            
            async acceptCall(callData) {
                this.debug('critical', `========== ACCEPTING CALL from ${callData.caller_id} ==========`);
                
                this.targetUserId = callData.caller_id;
                this.targetUserName = callData.caller_name;
                this.isCaller = false;
                
                try {
                    this.debug('info', 'Requesting microphone...');
                    this.localStream = await navigator.mediaDevices.getUserMedia(this.audioConstraints);
                    this.debug('success', 'Microphone ready');
                    
                    if (this.callbacks.onLocalStreamReady) {
                        this.callbacks.onLocalStreamReady(this.localStream);
                    }
                    
                    await this.createPeerConnection();
                    
                    this.localStream.getTracks().forEach(track => {
                        this.peerConnection.addTrack(track, this.localStream);
                        this.debug('info', `Added ${track.kind} track`);
                    });
                    
                    this.debug('info', 'Setting remote description...');
                    await this.peerConnection.setRemoteDescription(new RTCSessionDescription(callData.offer));
                    this.debug('success', 'Remote description set');
                    
                    this.debug('info', 'Creating answer...');
                    const answer = await this.peerConnection.createAnswer();
                    await this.peerConnection.setLocalDescription(answer);
                    this.debug('success', 'Answer created');
                    
                    this.socket.emit('answer_call', {
                        caller_id: callData.caller_id,
                        answer: this.peerConnection.localDescription,
                        call_type: 'audio'
                    });
                    this.debug('socket', `Answer sent to ${callData.caller_id}`);
                    
                    this.isCallActive = true;
                    this.saveCallState();
                    
                    if (this.callbacks.onCallAccepted) {
                        this.callbacks.onCallAccepted(callData.caller_id);
                    }
                    
                    return true;
                    
                } catch (err) {
                    this.debug('error', `Accept failed: ${err.message}`);
                    this.cleanupCall();
                    if (this.callbacks.onCallError) this.callbacks.onCallError('Failed to accept call');
                    return false;
                }
            }
            
            rejectCall(callerId) {
                this.debug('info', `Rejecting call from ${callerId}`);
                if (this.socket && this.socket.connected) {
                    this.socket.emit('reject_call', { caller_id: callerId });
                }
                if (this.callbacks.onCallRejected) {
                    this.callbacks.onCallRejected(callerId);
                }
            }
            
            async endCall() {
                this.debug('info', 'Ending call...');
                
                if (this.socket && this.socket.connected && this.targetUserId) {
                    this.socket.emit('end_call', { target_id: this.targetUserId });
                }
                
                this.cleanupCall();
                
                if (this.callbacks.onCallEnded) {
                    this.callbacks.onCallEnded();
                }
            }
            
            async createPeerConnection() {
                if (this.peerConnection) {
                    this.peerConnection.close();
                    this.peerConnection = null;
                }
                
                const config = {
                    iceServers: this.iceServers,
                    iceCandidatePoolSize: 10,
                    bundlePolicy: 'max-bundle',
                    rtcpMuxPolicy: 'require'
                };
                
                this.peerConnection = new RTCPeerConnection(config);
                this.debug('success', 'PeerConnection created');
                
                this.peerConnection.ontrack = (event) => {
                    this.debug('success', `Received ${event.track.kind} track`);
                    if (event.streams && event.streams[0]) {
                        this.remoteStream = event.streams[0];
                        if (this.callbacks.onRemoteStreamReady) {
                            this.callbacks.onRemoteStreamReady(this.remoteStream);
                        }
                    }
                };
                
                this.peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        this.iceCandidateCount++;
                        this.debug('ice', `Sending ICE #${this.iceCandidateCount} (${event.candidate.type})`);
                        
                        if (this.socket && this.socket.connected && this.targetUserId) {
                            this.socket.emit('ice_candidate', {
                                target_id: this.targetUserId,
                                candidate: event.candidate
                            });
                        }
                    } else {
                        this.debug('success', `ICE gathering complete - ${this.iceCandidateCount} candidates`);
                    }
                };
                
                this.peerConnection.oniceconnectionstatechange = () => {
                    const state = this.peerConnection.iceConnectionState;
                    this.debug('ice', `ICE state: ${state}`);
                    
                    if (this.callbacks.onIceStateChange) {
                        this.callbacks.onIceStateChange(state);
                    }
                    
                    if (state === 'connected' || state === 'completed') {
                        this.debug('success', '🎉 ICE connected!');
                        this.clearCallTimeout();
                        this.startCallTimer();
                        if (this.callbacks.onConnectionStateChange) {
                            this.callbacks.onConnectionStateChange('connected');
                        }
                    } else if (state === 'failed') {
                        this.debug('error', '❌ ICE failed!');
                        this.handleCallError('Connection failed');
                    } else if (state === 'checking') {
                        this.debug('info', 'ICE checking...');
                        if (this.callbacks.onConnectionStateChange) {
                            this.callbacks.onConnectionStateChange('connecting');
                        }
                    }
                };
                
                // Fix for queued ICE candidates
                const originalSetRemoteDesc = this.peerConnection.setRemoteDescription;
                this.peerConnection.setRemoteDescription = async (desc) => {
                    this.debug('info', `Setting remote description: ${desc.type}`);
                    const result = await originalSetRemoteDesc.call(this.peerConnection, desc);
                    
                    if (this.pendingIceCandidates.length > 0) {
                        this.debug('ice', `Processing ${this.pendingIceCandidates.length} queued candidates`);
                        for (const candidate of this.pendingIceCandidates) {
                            try {
                                await this.peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                            } catch(e) {}
                        }
                        this.pendingIceCandidates = [];
                    }
                    return result;
                };
            }
            
            handleIncomingCall(data) {
                this.debug('critical', `🔔 INCOMING CALL from ${data.caller_id} (${data.caller_name})`);
                
                // Save to sessionStorage
                sessionStorage.setItem('pending_call', JSON.stringify({
                    callerId: data.caller_id,
                    callerName: data.caller_name,
                    offer: data.offer,
                    timestamp: Date.now()
                }));
                
                if (this.callbacks.onIncomingCall) {
                    this.callbacks.onIncomingCall({
                        callerId: data.caller_id,
                        callerName: data.caller_name,
                        callType: data.call_type,
                        offer: data.offer
                    });
                }
            }
            
            handleCallAnswered(data) {
                this.debug('success', `Call answered!`);
                this.clearCallTimeout();
                this.startCallTimer();
                
                if (this.peerConnection && this.peerConnection.signalingState === 'have-local-offer') {
                    this.peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer))
                        .then(() => {
                            this.debug('success', 'Remote description set');
                            if (this.callbacks.onCallAccepted) {
                                this.callbacks.onCallAccepted(this.targetUserId);
                            }
                        })
                        .catch(err => this.debug('error', `Set answer failed: ${err.message}`));
                }
            }
            
            handleIceCandidate(data) {
                if (!this.peerConnection || !data.candidate) return;
                
                if (!this.peerConnection.remoteDescription) {
                    this.debug('ice', 'Queuing ICE candidate');
                    this.pendingIceCandidates.push(data.candidate);
                } else {
                    this.peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate))
                        .then(() => this.debug('success', 'ICE candidate added'))
                        .catch(err => this.debug('warn', `ICE error: ${err.message}`));
                }
            }
            
            handleCallEnded() {
                this.debug('info', 'Remote ended call');
                this.cleanupCall();
                if (this.callbacks.onCallEnded) this.callbacks.onCallEnded();
            }
            
            handleCallRejected() {
                this.debug('warn', 'Call rejected');
                this.cleanupCall();
                if (this.callbacks.onCallRejected) this.callbacks.onCallRejected(this.targetUserId);
            }
            
            handleCallTimeout() {
                this.debug('warn', 'Call timeout');
                this.cleanupCall();
                if (this.callbacks.onCallError) this.callbacks.onCallError('No answer');
            }
            
            handleCallError(message) {
                this.debug('error', `Call error: ${message}`);
                this.cleanupCall();
                if (this.callbacks.onCallError) this.callbacks.onCallError(message);
            }
            
            setCallTimeout() {
                this.callTimeoutId = setTimeout(() => {
                    if (!this.isCallActive) {
                        this.handleCallTimeout();
                    }
                }, this.config.callTimeout);
            }
            
            clearCallTimeout() {
                if (this.callTimeoutId) {
                    clearTimeout(this.callTimeoutId);
                    this.callTimeoutId = null;
                }
            }
            
            startCallTimer() {
                this.callStartTime = Date.now();
                if (this.callTimer) clearInterval(this.callTimer);
                
                this.callTimer = setInterval(() => {
                    if (!this.callStartTime) return;
                    const elapsed = Math.floor((Date.now() - this.callStartTime) / 1000);
                    if (this.callbacks.onCallTimer) {
                        this.callbacks.onCallTimer(elapsed);
                    }
                }, 1000);
            }
            
            stopCallTimer() {
                if (this.callTimer) {
                    clearInterval(this.callTimer);
                    this.callTimer = null;
                }
                this.callStartTime = null;
            }
            
            cleanupCall() {
                this.debug('info', 'Cleaning up call...');
                this.clearCallTimeout();
                this.stopCallTimer();
                
                this.isCallActive = false;
                this.isCaller = false;
                this.iceCandidateCount = 0;
                this.pendingIceCandidates = [];
                
                if (this.localStream) {
                    this.localStream.getTracks().forEach(track => track.stop());
                    this.localStream = null;
                }
                
                if (this.peerConnection) {
                    this.peerConnection.close();
                    this.peerConnection = null;
                }
                
                this.remoteStream = null;
                sessionStorage.removeItem('call_state');
            }
            
            saveCallState() {
                sessionStorage.setItem('call_state', JSON.stringify({
                    targetUserId: this.targetUserId,
                    targetUserName: this.targetUserName,
                    isCaller: this.isCaller,
                    timestamp: Date.now()
                }));
            }
            
            checkPendingCalls() {
                const pending = sessionStorage.getItem('pending_call');
                if (pending && !this.isCallActive) {
                    try {
                        const data = JSON.parse(pending);
                        if (Date.now() - data.timestamp < 30000) {
                            this.debug('info', `Found pending call from ${data.callerId}`);
                            if (this.callbacks.onIncomingCall) {
                                this.callbacks.onIncomingCall({
                                    callerId: data.callerId,
                                    callerName: data.callerName,
                                    offer: data.offer,
                                    isPending: true
                                });
                            }
                        } else {
                            sessionStorage.removeItem('pending_call');
                        }
                    } catch(e) {}
                }
            }
            
            waitForSocket() {
                return new Promise((resolve) => {
                    if (this.socket && this.socket.connected) {
                        resolve();
                    } else {
                        this.socket.once('connect', () => resolve());
                    }
                });
            }
            
            setupBeforeUnload() {
                window.addEventListener('beforeunload', () => {
                    if (this.isCallActive) {
                        this.endCall();
                    }
                });
            }
            
            toggleMute() {
                if (!this.localStream || !this.isCallActive) return false;
                const audioTrack = this.localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    this.debug('info', `Microphone ${audioTrack.enabled ? 'unmuted' : 'muted'}`);
                    return audioTrack.enabled;
                }
                return false;
            }
            
            on(event, callback) {
                const callbackKey = `on${event.charAt(0).toUpperCase()}${event.slice(1)}`;
                if (this.callbacks.hasOwnProperty(callbackKey)) {
                    this.callbacks[callbackKey] = callback;
                }
            }
            
            getStatus() {
                return {
                    isCallActive: this.isCallActive,
                    socketConnected: this.socket ? this.socket.connected : false,
                    currentUserId: this.currentUserId,
                    targetUserId: this.targetUserId,
                    iceCandidates: this.iceCandidateCount
                };
            }
            
            debug(level, message) {
                if (!this.config.debug) return;
                const logger = {
                    error: () => DebugLogger.error(message, 'CALLMGR'),
                    warn: () => DebugLogger.warn(message, 'CALLMGR'),
                    success: () => DebugLogger.success(message, 'CALLMGR'),
                    info: () => DebugLogger.info(message, 'CALLMGR'),
                    critical: () => DebugLogger.critical(message, 'CALLMGR'),
                    ice: () => DebugLogger.info(message, 'ICE')
                };
                (logger[level] || logger.info)();
            }
        }
        
        // ==================== MAIN APPLICATION ====================
        
        // Get user info from server
        const currentUserId = "{{ current_user.id }}";
        const currentUserName = "{{ current_user.username }}";
        const otherUserId = "{{ other_user.id }}";
        const otherUserName = "{{ other_user.username }}";
        const chatUrl = "{{ url_for('chat', user_id=other_user.id) }}";
        
        // Check role
        const urlParams = new URLSearchParams(window.location.search);
        const isCaller = urlParams.get('role') !== 'receiver';
        
        DebugLogger.success(`========================================`, 'APP');
        DebugLogger.success(`AUDIO CALL APPLICATION`, 'APP');
        DebugLogger.info(`Current User: ${currentUserId} (${currentUserName})`, 'APP');
        DebugLogger.info(`Target User: ${otherUserId} (${otherUserName})`, 'APP');
        DebugLogger.info(`Role: ${isCaller ? 'CALLER' : 'RECEIVER'}`, 'APP');
        
        // Display user ID
        document.getElementById('otherUserIdDisplay').innerHTML = `ID: ${otherUserId.slice(0,12)}...`;
        
        // Initialize CallManager
        const callManager = new CallManager({
            debug: true,
            callTimeout: 35000,
            enableTURN: true
        });
        
        // DOM elements
        const remoteAudio = document.getElementById('remoteAudio');
        const callStatusDiv = document.getElementById('callStatus');
        const timerDiv = document.getElementById('timer');
        const muteBtn = document.getElementById('muteBtn');
        const holdBtn = document.getElementById('holdBtn');
        const endCallBtn = document.getElementById('endCallBtn');
        const incomingPopup = document.getElementById('incomingPopup');
        const acceptCallBtn = document.getElementById('acceptCallBtn');
        const rejectCallBtn = document.getElementById('rejectCallBtn');
        const callerNameSpan = document.getElementById('callerName');
        const toastMsg = document.getElementById('toastMsg');
        const avatarRing = document.getElementById('avatarRing');
        const volumeLevel = document.getElementById('volumeLevel');
        
        let isMuted = false;
        let isOnHold = false;
        let audioContext = null;
        let volumeInterval = null;
        
        function showToast(msg, duration = 2500) {
            toastMsg.innerText = msg;
            toastMsg.style.display = 'block';
            setTimeout(() => { toastMsg.style.display = 'none'; }, duration);
        }
        
        function redirectToChat() {
            window.location.href = chatUrl;
        }
        
        function updateTimerDisplay(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timerDiv.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }
        
        function setupVolumeMeter(stream) {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            try {
                const source = audioContext.createMediaStreamSource(stream);
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                if (volumeInterval) clearInterval(volumeInterval);
                volumeInterval = setInterval(() => {
                    if (!callManager.isCallActive) return;
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                    let percent = Math.min(100, (sum / dataArray.length / 255) * 100);
                    if (volumeLevel) volumeLevel.style.width = percent + '%';
                }, 100);
                
                if (audioContext.state === 'suspended') audioContext.resume();
            } catch(e) {
                DebugLogger.warn(`Volume meter error: ${e.message}`, 'MEDIA');
            }
        }
        
        // Register user
        callManager.registerUser(currentUserId, currentUserName);
        
        // Setup callbacks
        callManager.on('incomingCall', (data) => {
            DebugLogger.success(`Incoming call from ${data.callerName}`, 'UI');
            
            callerNameSpan.innerText = data.callerName || 'User';
            incomingPopup.style.display = 'flex';
            
            // Play ringtone
            const audio = new Audio();
            // Simple beep using Web Audio
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.frequency.value = 440;
                gain.gain.value = 0.1;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                setTimeout(() => osc.stop(), 300);
                ctx.resume();
            } catch(e) {}
            
            // Accept button
            const acceptHandler = () => {
                DebugLogger.info('User accepted call', 'UI');
                incomingPopup.style.display = 'none';
                callManager.acceptCall(data);
                acceptCallBtn.removeEventListener('click', acceptHandler);
                rejectCallBtn.removeEventListener('click', rejectHandler);
            };
            
            // Reject button
            const rejectHandler = () => {
                DebugLogger.info('User rejected call', 'UI');
                incomingPopup.style.display = 'none';
                callManager.rejectCall(data.callerId);
                rejectCallBtn.removeEventListener('click', rejectHandler);
                acceptCallBtn.removeEventListener('click', acceptHandler);
                showToast('Call rejected', 1000);
                setTimeout(redirectToChat, 1000);
            };
            
            acceptCallBtn.onclick = acceptHandler;
            rejectCallBtn.onclick = rejectHandler;
        });
        
        callManager.on('localStreamReady', (stream) => {
            DebugLogger.success('Local stream ready', 'UI');
            setupVolumeMeter(stream);
        });
        
        callManager.on('remoteStreamReady', (stream) => {
            DebugLogger.success('Remote stream ready', 'UI');
            remoteAudio.srcObject = stream;
            remoteAudio.play().catch(e => DebugLogger.warn(`Play error: ${e.message}`, 'UI'));
            avatarRing.classList.add('active-ring');
            showToast('Call connected!', 1500);
        });
        
        callManager.on('callAccepted', (userId) => {
            DebugLogger.success(`Call accepted by ${userId}`, 'UI');
            callStatusDiv.innerText = 'Connected ✅';
            showToast('Call connected!', 1000);
        });
        
        callManager.on('callEnded', () => {
            DebugLogger.info('Call ended', 'UI');
            callStatusDiv.innerText = 'Call ended';
            avatarRing.classList.remove('active-ring');
            remoteAudio.srcObject = null;
            timerDiv.innerText = '00:00';
            showToast('Call ended', 1000);
            setTimeout(redirectToChat, 1500);
        });
        
        callManager.on('callRejected', () => {
            DebugLogger.warn('Call rejected', 'UI');
            callStatusDiv.innerText = 'Call rejected';
            showToast('Call rejected', 1000);
            setTimeout(redirectToChat, 1500);
        });
        
        callManager.on('callError', (error) => {
            DebugLogger.error(`Call error: ${error}`, 'UI');
            callStatusDiv.innerText = error;
            showToast(error, 2000);
            setTimeout(redirectToChat, 2000);
        });
        
        callManager.on('connectionStateChange', (state) => {
            if (state === 'connected') {
                callStatusDiv.innerText = 'Connected ✅';
                avatarRing.classList.add('active-ring');
            } else if (state === 'connecting') {
                callStatusDiv.innerText = 'Connecting... 🔄';
            }
        });
        
        callManager.on('iceStateChange', (state) => {
            DebugLogger.info(`ICE state: ${state}`, 'UI');
        });
        
        callManager.on('callTimer', (seconds) => {
            updateTimerDisplay(seconds);
        });
        
        // UI Controls
        muteBtn.onclick = () => {
            const result = callManager.toggleMute();
            if (result !== undefined) {
                isMuted = !result;
                muteBtn.classList.toggle('active', !result);
                muteBtn.innerHTML = !result ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
                showToast(!result ? 'Muted 🔇' : 'Unmuted 🎤', 800);
            }
        };
        
        holdBtn.onclick = () => {
            isOnHold = !isOnHold;
            holdBtn.classList.toggle('active', isOnHold);
            holdBtn.innerHTML = isOnHold ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
            callStatusDiv.innerText = isOnHold ? 'Call on hold ⏸️' : 'Connected ✅';
            showToast(isOnHold ? 'Call on hold' : 'Resumed', 800);
        };
        
        endCallBtn.onclick = () => {
            callManager.endCall();
        };
        
        // Speaker button (system volume hint)
        document.getElementById('speakerBtn').onclick = () => {
            showToast('Adjust system volume 🔊', 1000);
        };
        
        // Start call based on role
        if (isCaller) {
            DebugLogger.info('Starting call as CALLER...', 'APP');
            callStatusDiv.innerText = 'Starting call...';
            
            // Small delay to ensure socket is ready
            setTimeout(() => {
                callManager.startCall(otherUserId, otherUserName);
            }, 500);
        } else {
            DebugLogger.info('Waiting for incoming calls as RECEIVER...', 'APP');
            callStatusDiv.innerText = 'Waiting for call... 📞';
        }
        
        // Resume audio context on user interaction
        document.body.addEventListener('click', () => {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
                DebugLogger.info('AudioContext resumed', 'MEDIA');
            }
        });
        
        // Update quality badge
        setInterval(() => {
            const status = callManager.getStatus();
            const badge = document.getElementById('qualityBadge');
            if (badge) {
                if (status.isCallActive) {
                    badge.innerHTML = '🎙️ Call Active';
                    badge.className = 'quality-badge quality-good';
                } else if (status.socketConnected) {
                    badge.innerHTML = '📡 Connected';
                    badge.className = 'quality-badge quality-good';
                } else {
                    badge.innerHTML = '📡 Connecting...';
                    badge.className = 'quality-badge quality-poor';
                }
            }
        }, 3000);
        
        DebugLogger.success('Application fully initialized!', 'APP');
    </script>
</body>
</html>
