<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Audio Call with {{ other_user.username }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1c, #03060c);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .call-card {
            background: rgba(18, 22, 35, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 2rem;
            width: 100%;
            max-width: 520px;
            margin: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .avatar-wrapper { text-align: center; margin-bottom: 1.5rem; position: relative; }
        .avatar-ring {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #2a2f4b, #1a1f33);
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.3s ease;
        }
        .avatar-ring.active-ring {
            box-shadow: 0 0 20px rgba(52, 211, 153, 0.5);
            border-color: #34d399;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .avatar-ring i { font-size: 3.8rem; color: #cbd5e6; }
        .user-name {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #b9c3e6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 12px;
        }
        .call-status {
            font-size: 0.9rem;
            font-weight: 500;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            margin-bottom: 16px;
            color: #a0b3d9;
        }
        .timer {
            font-family: monospace;
            font-size: 2.8rem;
            font-weight: 500;
            letter-spacing: 3px;
            background: linear-gradient(120deg, #eef2ff, #9aa9cf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 28px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 32px;
        }
        .ctrl-btn {
            background: rgba(30,35,55,0.8);
            backdrop-filter: blur(8px);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.6rem;
            color: #eef2ff;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .ctrl-btn:hover { transform: translateY(-3px); background: rgba(50,58,85,0.9); }
        .ctrl-btn.active { background: #e11d48; color: white; }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 8px;
        }
        .end-btn {
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50px;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            background: #dc2626;
            color: white;
        }
        .end-btn:hover { background: #b91c1c; transform: scale(1.05); }
        .incoming-popup {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            background: rgba(25,30,45,0.98);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 14px 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            border: 2px solid #34d399;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .incoming-popup span i { margin-right: 12px; color: #34d399; animation: ring 1s infinite; }
        @keyframes ring {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(15deg); }
            75% { transform: rotate(-15deg); }
        }
        .incoming-popup button {
            background: none;
            border: none;
            font-size: 1.8rem;
            margin: 0 6px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .incoming-popup button:hover { transform: scale(1.1); }
        .accept-btn { color: #34d399; }
        .reject-btn { color: #f87171; }
        .toast-msg {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #e2e8f0;
            z-index: 2000;
            display: none;
            white-space: nowrap;
        }
        .volume-meter {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        .volume-level {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #34d399, #10b981);
            transition: width 0.05s;
        }
        @media (max-width: 550px) {
            .call-card { padding: 1.5rem; border-radius: 40px; }
            .avatar-ring { width: 90px; height: 90px; }
            .avatar-ring i { font-size: 2.8rem; }
            .user-name { font-size: 1.5rem; }
            .timer { font-size: 2rem; }
            .ctrl-btn { width: 50px; height: 50px; font-size: 1.3rem; }
            .end-btn { width: 65px; height: 65px; font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <audio id="remoteAudio" autoplay></audio>
    
    <div class="call-card">
        <div class="avatar-wrapper">
            <div class="avatar-ring" id="avatarRing">
                <i class="fas fa-user-circle"></i>
            </div>
            <div class="volume-meter">
                <div class="volume-level" id="volumeLevel"></div>
            </div>
            <div class="user-name">{{ other_user.username }}</div>
        </div>
        <div style="text-align: center;">
            <div class="call-status" id="callStatus">Initializing...</div>
            <div class="timer" id="timer">00:00</div>
        </div>
        <div class="controls">
            <button class="ctrl-btn" id="muteBtn" title="Mute"><i class="fas fa-microphone"></i></button>
            <button class="ctrl-btn" id="speakerBtn" title="Speaker"><i class="fas fa-volume-up"></i></button>
            <button class="ctrl-btn" id="holdBtn" title="Hold"><i class="fas fa-pause"></i></button>
        </div>
        <div class="action-buttons">
            <button class="end-btn" id="endCallBtn"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <div id="incomingPopup" class="incoming-popup">
        <span><i class="fas fa-phone-alt"></i> 📞 Incoming call from <strong id="callerName"></strong></span>
        <div>
            <button id="acceptCallBtn" class="accept-btn"><i class="fas fa-check-circle"></i> Accept</button>
            <button id="rejectCallBtn" class="reject-btn"><i class="fas fa-times-circle"></i> Reject</button>
        </div>
    </div>
    
    <div id="toastMsg" class="toast-msg"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // ==================== WEBRTC FIXES ====================
        (function() {
            'use strict';
            
            function silentLog(msg) { console.log(`[WebRTC] ${new Date().toLocaleTimeString()} - ${msg}`); }
            
            const ICE_SERVERS = [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' },
                { urls: 'stun:stun.stunprotocol.org:3478' },
                { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
            ];
            
            const OriginalRTCPeerConnection = window.RTCPeerConnection;
            
            class FixedRTCPeerConnection extends OriginalRTCPeerConnection {
                constructor(config) {
                    const enhancedConfig = { ...config, iceServers: ICE_SERVERS, iceCandidatePoolSize: 10 };
                    super(enhancedConfig);
                    this._pendingCandidates = [];
                    this._iceTimeout = setTimeout(() => {
                        if (this.iceConnectionState === 'checking') {
                            silentLog('ICE timeout - restarting');
                            this.restartIce();
                        }
                    }, 10000);
                }
                async restartIce() {
                    try {
                        const offer = await this.createOffer({ iceRestart: true });
                        await this.setLocalDescription(offer);
                        return offer;
                    } catch(e) {}
                }
                close() { if (this._iceTimeout) clearTimeout(this._iceTimeout); super.close(); }
            }
            window.RTCPeerConnection = FixedRTCPeerConnection;
            
            const originalAddIce = RTCPeerConnection.prototype.addIceCandidate;
            RTCPeerConnection.prototype.addIceCandidate = function(candidate) {
                if (!candidate) return Promise.resolve();
                if (!this.remoteDescription && candidate.candidate) {
                    this._pendingCandidates = this._pendingCandidates || [];
                    this._pendingCandidates.push(candidate);
                    return Promise.resolve();
                }
                return originalAddIce.call(this, candidate).catch(e => {});
            };
            
            const originalSetRemote = RTCPeerConnection.prototype.setRemoteDescription;
            RTCPeerConnection.prototype.setRemoteDescription = async function(desc) {
                const result = await originalSetRemote.call(this, desc);
                if (this._pendingCandidates && this._pendingCandidates.length) {
                    for (const c of this._pendingCandidates) {
                        try { await originalAddIce.call(this, c); } catch(e) {}
                    }
                    this._pendingCandidates = [];
                }
                return result;
            };
            
            silentLog('WebRTC fixes applied');
        })();
        
        // ==================== USER INFO ====================
        const currentUserId = "{{ current_user.id }}";
        const otherUserId = "{{ other_user.id }}";
        const currentUserName = "{{ current_user.username }}";
        const chatUrl = "{{ url_for('chat', user_id=other_user.id) }}";
        
        const urlParams = new URLSearchParams(window.location.search);
        let isCaller = urlParams.get('role') !== 'receiver';
        
        // ==================== DOM ELEMENTS ====================
        const remoteAudio = document.getElementById('remoteAudio');
        const callStatusDiv = document.getElementById('callStatus');
        const timerDiv = document.getElementById('timer');
        const muteBtn = document.getElementById('muteBtn');
        const holdBtn = document.getElementById('holdBtn');
        const endCallBtn = document.getElementById('endCallBtn');
        const incomingPopup = document.getElementById('incomingPopup');
        const acceptCallBtn = document.getElementById('acceptCallBtn');
        const rejectCallBtn = document.getElementById('rejectCallBtn');
        const callerNameSpan = document.getElementById('callerName');
        const toastMsg = document.getElementById('toastMsg');
        const avatarRing = document.getElementById('avatarRing');
        const volumeLevel = document.getElementById('volumeLevel');
        
        // ==================== STATE ====================
        let socket = null;
        let peerConnection = null;
        let localStream = null;
        let isCallActive = false;
        let callStartTime = null;
        let timerInterval = null;
        let isMuted = false;
        let isOnHold = false;
        let callTimeout = null;
        let audioContext = null;
        let volumeInterval = null;
        let answerReceived = false;
        let callInitiated = false;
        let isRegistered = false;
        let healthInterval = null;
        
        // ==================== HELPER FUNCTIONS ====================
        function showToast(msg, duration = 2500) {
            toastMsg.innerText = msg;
            toastMsg.style.display = 'block';
            setTimeout(() => { toastMsg.style.display = 'none'; }, duration);
        }
        
        function redirectToChat() { window.location.href = chatUrl; }
        
        function updateTimer() {
            if (!callStartTime) return;
            const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
            timerDiv.innerText = `${Math.floor(elapsed/60).toString().padStart(2,'0')}:${(elapsed%60).toString().padStart(2,'0')}`;
        }
        
        function startTimer() { callStartTime = Date.now(); if (timerInterval) clearInterval(timerInterval); timerInterval = setInterval(updateTimer, 1000); }
        function stopTimer() { if (timerInterval) clearInterval(timerInterval); timerInterval = null; callStartTime = null; timerDiv.innerText = '00:00'; }
        
        function setupVolumeMeter(stream) {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            try {
                const source = audioContext.createMediaStreamSource(stream);
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                if (volumeInterval) clearInterval(volumeInterval);
                volumeInterval = setInterval(() => {
                    if (!isCallActive) return;
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                    let percent = Math.min(100, (sum / dataArray.length / 255) * 100);
                    if (volumeLevel) volumeLevel.style.width = percent + '%';
                }, 100);
                if (audioContext.state === 'suspended') audioContext.resume();
            } catch(e) {}
        }
        
        // Ringtone
        let ringtoneCtx = null;
        function playRingtone() {
            try {
                if (ringtoneCtx) ringtoneCtx.close();
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                if (!AudioCtx) return;
                ringtoneCtx = new AudioCtx();
                const gain = ringtoneCtx.createGain();
                gain.gain.value = 0.15;
                gain.connect(ringtoneCtx.destination);
                const playTone = (freq, duration) => new Promise(resolve => {
                    const osc = ringtoneCtx.createOscillator();
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    osc.connect(gain);
                    osc.start();
                    setTimeout(() => { osc.stop(); resolve(); }, duration);
                });
                const ringPattern = async () => {
                    if (!ringtoneCtx) return;
                    if (ringtoneCtx.state === 'suspended') await ringtoneCtx.resume();
                    await playTone(440, 400);
                    await new Promise(r => setTimeout(r, 200));
                    if (!ringtoneCtx) return;
                    await playTone(440, 400);
                    await new Promise(r => setTimeout(r, 200));
                    if (!ringtoneCtx) return;
                    await playTone(440, 400);
                    await new Promise(r => setTimeout(r, 800));
                    if (ringtoneCtx) ringPattern();
                };
                ringPattern();
                ringtoneCtx.resume();
            } catch(e) {}
        }
        function stopRingtone() { if (ringtoneCtx) { try { ringtoneCtx.close(); } catch(e){} ringtoneCtx = null; } }
        
        // ==================== PEER CONNECTION ====================
        async function createPeerConnection() {
            if (peerConnection) { try { peerConnection.close(); } catch(e){} peerConnection = null; }
            
            peerConnection = new RTCPeerConnection();
            console.log('[Call] PeerConnection created');
            
            if (localStream && localStream.getTracks) {
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            }
            
            peerConnection.ontrack = (event) => {
                console.log('[Call] Remote track received:', event.track.kind);
                if (event.streams && event.streams[0]) {
                    remoteAudio.srcObject = event.streams[0];
                    remoteAudio.play().catch(() => {});
                    avatarRing.classList.add('active-ring');
                }
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    console.log('[Call] Sending ICE candidate:', event.candidate.type);
                    socket.emit('ice_candidate', { target_id: otherUserId, candidate: event.candidate });
                }
            };
            
            peerConnection.oniceconnectionstatechange = () => {
                const state = peerConnection.iceConnectionState;
                console.log('[Call] ICE state:', state);
                
                if (state === 'connected' || state === 'completed') {
                    callStatusDiv.innerText = 'Connected ✅';
                    if (!callStartTime) startTimer();
                    isCallActive = true;
                    if (callTimeout) clearTimeout(callTimeout);
                    avatarRing.classList.add('active-ring');
                    showToast('Call connected!', 1500);
                } else if (state === 'failed') {
                    callStatusDiv.innerText = 'Connection failed ❌';
                    showToast('Connection failed!', 2000);
                    endCallInternal(false);
                } else if (state === 'disconnected') {
                    callStatusDiv.innerText = 'Reconnecting... 🔄';
                    avatarRing.classList.remove('active-ring');
                } else if (state === 'checking') {
                    callStatusDiv.innerText = 'Connecting... 🔄';
                }
            };
            
            return peerConnection;
        }
        
        // ==================== CALL FUNCTIONS ====================
        async function initiateCall() {
            if (callInitiated) return;
            callInitiated = true;
            
            console.log('[Call] Initiating call to:', otherUserId);
            callStatusDiv.innerText = 'Starting call... 🚀';
            
            if (!socket || !socket.connected) {
                console.log('[Call] Waiting for socket...');
                setTimeout(() => initiateCall(), 500);
                return;
            }
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
                });
                console.log('[Call] Microphone access granted');
                setupVolumeMeter(localStream);
                
                await createPeerConnection();
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                console.log('[Call] Offer created');
                
                socket.emit('call_user', { 
                    target_id: otherUserId, 
                    call_type: 'audio', 
                    offer: peerConnection.localDescription,
                    caller_name: currentUserName,
                    caller_id: currentUserId
                });
                
                callStatusDiv.innerText = 'Ringing... 🔔';
                isCallActive = true;
                
                callTimeout = setTimeout(() => {
                    if (!isCallActive && !answerReceived) {
                        console.log('[Call] Timeout - no answer');
                        endCallWithMessage('No answer ⏰');
                    }
                }, 35000);
                
                socket.once('call_answered', async (data) => {
                    console.log('[Call] Call answered!');
                    answerReceived = true;
                    if (callTimeout) clearTimeout(callTimeout);
                    if (peerConnection && peerConnection.signalingState === 'have-local-offer') {
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                    }
                });
                
                socket.once('call_rejected', () => { endCallWithMessage('Call rejected ❌'); });
                socket.once('call_timeout', () => { endCallWithMessage('No answer ⏰'); });
                
            } catch (err) {
                console.error('[Call] Error:', err);
                let msg = 'Microphone access denied';
                if (err.name === 'NotAllowedError') msg = 'Please allow microphone access';
                if (err.name === 'NotFoundError') msg = 'No microphone found';
                endCallWithMessage(msg);
            }
        }
        
        async function acceptIncomingCall(callerId, offerSdp) {
            console.log('[Call] Accepting call from:', callerId);
            stopRingtone();
            incomingPopup.style.display = 'none';
            callStatusDiv.innerText = 'Connecting... 🔄';
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
                });
                console.log('[Call] Microphone access granted');
                setupVolumeMeter(localStream);
                
                await createPeerConnection();
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offerSdp));
                console.log('[Call] Remote description set');
                
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                console.log('[Call] Answer created');
                
                socket.emit('answer_call', { caller_id: callerId, answer: peerConnection.localDescription, call_type: 'audio' });
                
                callStatusDiv.innerText = 'Connected ✅';
                startTimer();
                isCallActive = true;
                showToast('Call connected!', 1500);
                
            } catch (err) {
                console.error('[Call] Accept error:', err);
                endCallWithMessage('Failed to accept call');
            }
        }
        
        function rejectCall(callerId) {
            console.log('[Call] Rejecting call from:', callerId);
            if (socket && socket.connected) socket.emit('reject_call', { caller_id: callerId });
            incomingPopup.style.display = 'none';
            stopRingtone();
            showToast('Call rejected', 1000);
            setTimeout(redirectToChat, 1000);
        }
        
        function endCallInternal(notifyServer = true) {
            console.log('[Call] Ending call');
            stopTimer();
            isCallActive = false;
            answerReceived = false;
            callInitiated = false;
            
            if (volumeInterval) clearInterval(volumeInterval);
            if (callTimeout) clearTimeout(callTimeout);
            
            if (localStream && localStream.getTracks) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            if (peerConnection) {
                try { peerConnection.close(); } catch(e) {}
                peerConnection = null;
            }
            if (notifyServer && socket && socket.connected) {
                socket.emit('end_call', { target_id: otherUserId });
            }
            
            stopRingtone();
            isMuted = false;
            isOnHold = false;
            muteBtn.classList.remove('active');
            muteBtn.innerHTML = '<i class="fas fa-microphone"></i>';
            holdBtn.classList.remove('active');
            holdBtn.innerHTML = '<i class="fas fa-pause"></i>';
            avatarRing.classList.remove('active-ring');
            callStatusDiv.innerText = 'Call ended 📞';
            if (remoteAudio.srcObject) remoteAudio.srcObject = null;
        }
        
        function endCallWithMessage(msg) {
            callStatusDiv.innerText = msg;
            showToast(msg, 1500);
            endCallInternal(true);
            setTimeout(redirectToChat, 1500);
        }
        
        function endCallAndRedirect() { endCallInternal(true); redirectToChat(); }
        
        // ==================== UI CONTROLS ====================
        muteBtn.onclick = () => {
            if (!localStream || !isCallActive) { showToast('No active call'); return; }
            isMuted = !isMuted;
            if (localStream.getAudioTracks()[0]) localStream.getAudioTracks()[0].enabled = !isMuted;
            muteBtn.classList.toggle('active', isMuted);
            muteBtn.innerHTML = isMuted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
            showToast(isMuted ? 'Muted 🔇' : 'Unmuted 🎤', 1000);
        };
        
        holdBtn.onclick = () => {
            if (!localStream || !isCallActive) { showToast('No active call'); return; }
            isOnHold = !isOnHold;
            if (localStream.getAudioTracks()[0]) localStream.getAudioTracks()[0].enabled = !isOnHold;
            holdBtn.classList.toggle('active', isOnHold);
            holdBtn.innerHTML = isOnHold ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
            callStatusDiv.innerText = isOnHold ? 'Call on hold ⏸️' : 'Connected ✅';
            showToast(isOnHold ? 'Call on hold' : 'Resumed', 1000);
        };
        
        document.getElementById('speakerBtn').onclick = () => showToast('Adjust system volume', 1000);
        endCallBtn.onclick = endCallAndRedirect;
        
        // ==================== HEALTH MONITORING ====================
        function startHealthMonitoring() {
            if (healthInterval) clearInterval(healthInterval);
            healthInterval = setInterval(() => {
                if (socket && !socket.connected && !isCallActive) {
                    console.log('[Monitor] Socket disconnected, reconnecting...');
                    socket.connect();
                }
                if (socket && socket.connected && currentUserId && !isRegistered) {
                    console.log('[Monitor] Re-registering user...');
                    socket.emit('register_user', { user_id: currentUserId, user_name: currentUserName });
                }
                if (socket && socket.connected && isCallActive) {
                    socket.emit('call_heartbeat', { user_id: currentUserId, timestamp: Date.now() });
                }
            }, 15000);
        }
        
        // ==================== SOCKET SETUP ====================
        function setupSocket() {
            socket = io({ reconnection: true, reconnectionAttempts: 10, reconnectionDelay: 1000 });
            
            socket.on('connect', () => {
                console.log('[Socket] Connected:', socket.id);
                callStatusDiv.innerText = isCaller ? 'Ready to call' : 'Waiting for call...';
                
                // CRITICAL: Register user with server
                socket.emit('register_user', { user_id: currentUserId, user_name: currentUserName });
                console.log('[Socket] User registration sent:', currentUserId);
                
                // Check pending call
                const pending = sessionStorage.getItem('pending_audio_call');
                if (pending && !isCallActive) {
                    try {
                        const data = JSON.parse(pending);
                        console.log('[Socket] Found pending call, accepting...');
                        sessionStorage.removeItem('pending_audio_call');
                        acceptIncomingCall(data.callerId, data.offer);
                    } catch(e) {}
                } else if (isCaller && !callInitiated && !isCallActive) {
                    setTimeout(() => initiateCall(), 500);
                }
            });
            
            socket.on('user_registered', (data) => {
                if (data.status === 'ok') {
                    isRegistered = true;
                    console.log('[Socket] User registered successfully:', data.user_id);
                }
            });
            
            socket.on('disconnect', () => {
                console.log('[Socket] Disconnected');
                if (isCallActive) endCallWithMessage('Connection lost');
            });
            
            socket.on('incoming_call', (data) => {
                console.log('[Socket] Incoming call from:', data.caller_id);
                
                if (data.caller_id === otherUserId) {
                    // Store pending call for recovery
                    sessionStorage.setItem('pending_audio_call', JSON.stringify({
                        callerId: data.caller_id,
                        offer: data.offer,
                        callerName: data.caller_name
                    }));
                    
                    callerNameSpan.innerText = data.caller_name || 'User';
                    incomingPopup.style.display = 'flex';
                    playRingtone();
                    
                    // Remove old listeners and add new ones
                    const newAccept = acceptCallBtn.cloneNode(true);
                    const newReject = rejectCallBtn.cloneNode(true);
                    acceptCallBtn.parentNode.replaceChild(newAccept, acceptCallBtn);
                    rejectCallBtn.parentNode.replaceChild(newReject, rejectCallBtn);
                    
                    newAccept.onclick = () => {
                        console.log('[UI] User accepted call');
                        sessionStorage.removeItem('pending_audio_call');
                        acceptIncomingCall(data.caller_id, data.offer);
                    };
                    newReject.onclick = () => {
                        console.log('[UI] User rejected call');
                        sessionStorage.removeItem('pending_audio_call');
                        stopRingtone();
                        socket.emit('reject_call', { caller_id: data.caller_id });
                        incomingPopup.style.display = 'none';
                        showToast('Call rejected', 1000);
                        setTimeout(redirectToChat, 1000);
                    };
                }
            });
            
            socket.on('call_answered', async (data) => {
                console.log('[Socket] Call answered');
                if (peerConnection && peerConnection.signalingState === 'have-local-offer') {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                    startTimer();
                }
            });
            
            socket.on('ice_candidate', async (data) => {
                if (peerConnection && data.candidate) {
                    try {
                        await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                    } catch(e) {}
                }
            });
            
            socket.on('call_ended', () => {
                console.log('[Socket] Call ended by remote');
                if (isCallActive) showToast('Call ended', 1000);
                endCallInternal(false);
                setTimeout(redirectToChat, 1500);
            });
            
            socket.on('call_rejected', () => {
                console.log('[Socket] Call rejected');
                endCallWithMessage('Call rejected');
            });
            
            socket.on('call_timeout', () => {
                console.log('[Socket] Call timeout');
                endCallWithMessage('No answer');
            });
            
            socket.on('call_error', (err) => {
                console.error('[Socket] Call error:', err);
                endCallWithMessage(err.message || 'Call error');
            });
            
            socket.on('call_heartbeat_ack', () => {
                console.log('[Socket] Heartbeat acknowledged');
            });
        }
        
        // ==================== INITIALIZE ====================
        document.body.addEventListener('click', () => {
            if (audioContext && audioContext.state === 'suspended') audioContext.resume();
        });
        
        setupSocket();
        startHealthMonitoring();
        
        if (!isCaller) callStatusDiv.innerText = 'Waiting for call... 📞';
        
        console.log('[App] Audio call page loaded - User:', currentUserId, 'Caller:', isCaller);
    </script>
</body>
</html>
