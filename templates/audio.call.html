<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Audio Call with {{ other_user.username }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1c, #03060c);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .call-card {
            background: rgba(18, 22, 35, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 2rem;
            width: 100%;
            max-width: 520px;
            margin: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
            animation: fadeIn 0.3s ease;
            position: relative;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .avatar-wrapper { text-align: center; margin-bottom: 1.5rem; }
        .avatar-ring {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #2a2f4b, #1a1f33);
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            position: relative;
        }
        .avatar-ring i { font-size: 3.8rem; color: #cbd5e6; }
        
        /* Speaking animation */
        .avatar-ring.speaking {
            animation: pulse 0.5s ease-in-out infinite;
            border-color: #2ecc71;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .user-name {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #b9c3e6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 12px;
        }
        .call-status {
            font-size: 0.9rem;
            font-weight: 500;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            margin-bottom: 16px;
            color: #a0b3d9;
        }
        .timer {
            font-family: monospace;
            font-size: 2.8rem;
            font-weight: 500;
            letter-spacing: 3px;
            background: linear-gradient(120deg, #eef2ff, #9aa9cf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 28px;
        }
        
        /* Audio Level Meter */
        .audio-meter-container {
            margin: 20px 0;
            text-align: center;
        }
        .audio-meter {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .audio-meter-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2ecc71, #f39c12, #e11d48);
            transition: width 0.05s linear;
            border-radius: 3px;
        }
        .meter-label {
            font-size: 0.7rem;
            color: #8a99b9;
            display: flex;
            justify-content: space-between;
        }
        .meter-label span:first-child { text-align: left; }
        .meter-label span:last-child { text-align: right; }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 32px;
        }
        .ctrl-btn {
            background: rgba(30,35,55,0.8);
            backdrop-filter: blur(8px);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.6rem;
            color: #eef2ff;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .ctrl-btn:hover { transform: translateY(-3px); background: rgba(50,58,85,0.9); }
        .ctrl-btn.active { background: #e11d48; color: white; }
        .ctrl-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 8px;
        }
        .end-btn {
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50px;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            background: #dc2626;
            color: white;
        }
        .end-btn:hover { background: #b91c1c; transform: scale(1.05); }
        
        .incoming-popup {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            background: rgba(25,30,45,0.95);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 14px 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .incoming-popup span i { margin-right: 12px; color: #34d399; animation: ring 1s infinite; }
        @keyframes ring {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
            100% { transform: rotate(0deg); }
        }
        .incoming-popup button {
            background: none;
            border: none;
            font-size: 1.8rem;
            margin: 0 6px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .incoming-popup button:hover { transform: scale(1.1); }
        .accept-btn { color: #34d399; }
        .reject-btn { color: #f87171; }
        
        .toast-msg {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #e2e8f0;
            z-index: 2000;
            display: none;
            white-space: nowrap;
            animation: fadeInUp 0.2s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        /* Volume slider */
        .volume-control {
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .volume-control i {
            color: #8a99b9;
            font-size: 1rem;
        }
        input[type="range"] {
            width: 120px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #2ecc71;
            cursor: pointer;
        }
        
        @media (max-width: 550px) {
            .call-card { padding: 1.5rem; border-radius: 40px; }
            .avatar-ring { width: 90px; height: 90px; }
            .avatar-ring i { font-size: 2.8rem; }
            .user-name { font-size: 1.5rem; }
            .timer { font-size: 2rem; }
            .ctrl-btn { width: 50px; height: 50px; font-size: 1.3rem; }
            .end-btn { width: 65px; height: 65px; font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <audio id="remoteAudio" autoplay style="display: none;"></audio>
    
    <div class="call-card">
        <div class="avatar-wrapper">
            <div class="avatar-ring" id="avatarRing">
                <i class="fas fa-user-circle"></i>
            </div>
            <div class="user-name">{{ other_user.username }}</div>
        </div>
        
        <div style="text-align: center;">
            <div class="call-status" id="callStatus">Initializing...</div>
            <div class="timer" id="timer">00:00</div>
        </div>
        
        <!-- Audio Level Meter -->
        <div class="audio-meter-container">
            <div class="audio-meter">
                <div class="audio-meter-fill" id="audioMeterFill"></div>
            </div>
            <div class="meter-label">
                <span><i class="fas fa-microphone"></i> Your voice</span>
                <span id="audioLevelText">0%</span>
            </div>
        </div>
        
        <div class="controls">
            <button class="ctrl-btn" id="muteBtn" title="Mute"><i class="fas fa-microphone"></i></button>
            <button class="ctrl-btn" id="speakerBtn" title="Speaker"><i class="fas fa-volume-up"></i></button>
            <button class="ctrl-btn" id="holdBtn" title="Hold"><i class="fas fa-pause"></i></button>
        </div>
        
        <div class="volume-control">
            <i class="fas fa-volume-down"></i>
            <input type="range" id="volumeSlider" min="0" max="100" value="80">
            <i class="fas fa-volume-up"></i>
        </div>
        
        <div class="action-buttons">
            <button class="end-btn" id="endCallBtn"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <div id="incomingPopup" class="incoming-popup">
        <span><i class="fas fa-phone-alt"></i> Incoming call from <strong id="callerName"></strong></span>
        <div>
            <button id="acceptCallBtn" class="accept-btn"><i class="fas fa-check-circle"></i></button>
            <button id="rejectCallBtn" class="reject-btn"><i class="fas fa-times-circle"></i></button>
        </div>
    </div>
    
    <div id="toastMsg" class="toast-msg"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // -------------------- User info --------------------
        const currentUserId = "{{ current_user.id }}";
        const otherUserId = "{{ other_user.id }}";
        const currentUserName = "{{ current_user.username }}";
        const chatUrl = "{{ url_for('chat', user_id=other_user.id) }}";
        const callType = "audio";
        
        // Socket connection with better config
        const socket = io({
            transports: ['websocket', 'polling'],
            reconnection: true,
            reconnectionAttempts: 10,
            reconnectionDelay: 500,
            reconnectionDelayMax: 5000,
            timeout: 10000
        });

        // Check if caller or receiver
        const urlParams = new URLSearchParams(window.location.search);
        let isCaller = urlParams.get('role') !== 'receiver';
        
        // Check for pending call
        let pendingCallData = null;
        const pendingOfferJson = sessionStorage.getItem('pendingOffer');
        if (pendingOfferJson) {
            try {
                pendingCallData = JSON.parse(pendingOfferJson);
                sessionStorage.removeItem('pendingOffer');
                isCaller = false;
                console.log('📦 Found pending call');
            } catch(e) { console.error('Failed to parse pending offer', e); }
        }

        // -------------------- DOM elements --------------------
        const remoteAudio = document.getElementById('remoteAudio');
        const callStatusDiv = document.getElementById('callStatus');
        const timerDiv = document.getElementById('timer');
        const muteBtn = document.getElementById('muteBtn');
        const speakerBtn = document.getElementById('speakerBtn');
        const holdBtn = document.getElementById('holdBtn');
        const endCallBtn = document.getElementById('endCallBtn');
        const incomingPopup = document.getElementById('incomingPopup');
        const acceptCallBtn = document.getElementById('acceptCallBtn');
        const rejectCallBtn = document.getElementById('rejectCallBtn');
        const callerNameSpan = document.getElementById('callerName');
        const toastMsg = document.getElementById('toastMsg');
        const audioMeterFill = document.getElementById('audioMeterFill');
        const audioLevelText = document.getElementById('audioLevelText');
        const volumeSlider = document.getElementById('volumeSlider');
        const avatarRing = document.getElementById('avatarRing');

        // -------------------- State --------------------
        let peerConnection = null;
        let localStream = null;
        let callStartTime = null;
        let timerInterval = null;
        let isMuted = false;
        let isOnHold = false;
        let ringtoneContext = null;
        let isCallActive = false;
        let callTimeout = null;
        let audioContext = null;
        let localAnalyser = null;
        let animationId = null;
        let remoteStream = null;

        // -------------------- ICE Servers with TURN --------------------
        const iceServers = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun.cloudflare.com:3478' },
                { urls: 'stun:stun.voipbuster.com' },
                // Public TURN servers for better NAT traversal
                { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
            ],
            iceCandidatePoolSize: 10,
            iceTransportPolicy: 'all',
            bundlePolicy: 'max-bundle',
            rtcpMuxPolicy: 'require'
        };

        // -------------------- Helper Functions --------------------
        function showToast(msg, duration = 2500) {
            toastMsg.innerText = msg;
            toastMsg.style.display = 'block';
            setTimeout(() => { toastMsg.style.display = 'none'; }, duration);
        }

        function redirectToChat() {
            console.log('🚀 Redirecting to chat:', chatUrl);
            window.location.href = chatUrl;
        }

        function updateTimer() {
            if (!callStartTime) return;
            const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            timerDiv.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }
        
        function startTimer() { 
            callStartTime = Date.now(); 
            if (timerInterval) clearInterval(timerInterval); 
            timerInterval = setInterval(updateTimer, 1000); 
        }
        
        function stopTimer() { 
            if (timerInterval) clearInterval(timerInterval); 
            timerInterval = null; 
            callStartTime = null; 
            timerDiv.innerText = '00:00'; 
        }

        // Setup audio level meter
        function setupAudioMeter(stream) {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                // Resume audio context on user interaction
                if (audioContext.state === 'suspended') {
                    document.addEventListener('click', () => {
                        audioContext.resume();
                    }, { once: true });
                }
            }
            
            try {
                const source = audioContext.createMediaStreamSource(stream);
                localAnalyser = audioContext.createAnalyser();
                localAnalyser.fftSize = 256;
                source.connect(localAnalyser);
                
                if (animationId) cancelAnimationFrame(animationId);
                updateAudioLevel();
            } catch(e) {
                console.log('Audio meter error:', e);
            }
        }
        
        function updateAudioLevel() {
            if (!localAnalyser || !isCallActive) {
                animationId = requestAnimationFrame(updateAudioLevel);
                return;
            }
            
            const dataArray = new Uint8Array(localAnalyser.frequencyBinCount);
            localAnalyser.getByteFrequencyData(dataArray);
            
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            let average = sum / dataArray.length;
            let level = Math.min(100, (average / 255) * 100);
            
            audioMeterFill.style.width = level + '%';
            audioLevelText.innerText = Math.round(level) + '%';
            
            // Change color based on level
            if (level > 60) {
                audioMeterFill.style.background = 'linear-gradient(90deg, #f39c12, #e11d48)';
            } else if (level > 25) {
                audioMeterFill.style.background = 'linear-gradient(90deg, #2ecc71, #f39c12)';
            } else {
                audioMeterFill.style.background = 'linear-gradient(90deg, #2ecc71, #2ecc71)';
            }
            
            animationId = requestAnimationFrame(updateAudioLevel);
        }

        // Setup remote audio visual feedback
        function setupRemoteAudioMeter(stream) {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            try {
                const source = audioContext.createMediaStreamSource(stream);
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                
                let speaking = false;
                const checkSpeaking = () => {
                    if (!isCallActive) return;
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        sum += dataArray[i];
                    }
                    let average = sum / dataArray.length;
                    let isSpeakingNow = average > 20;
                    
                    if (isSpeakingNow && !speaking) {
                        speaking = true;
                        avatarRing.classList.add('speaking');
                    } else if (!isSpeakingNow && speaking) {
                        speaking = false;
                        avatarRing.classList.remove('speaking');
                    }
                    
                    requestAnimationFrame(checkSpeaking);
                };
                checkSpeaking();
            } catch(e) {
                console.log('Remote audio meter error:', e);
            }
        }

        function playRingtone() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                ringtoneContext = ctx;
                const gainNode = ctx.createGain();
                gainNode.gain.value = 0.15;
                gainNode.connect(ctx.destination);
                
                const playTone = (freq, duration) => new Promise(resolve => {
                    const osc = ctx.createOscillator();
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    osc.connect(gainNode);
                    osc.start();
                    setTimeout(() => { osc.stop(); resolve(); }, duration);
                });
                
                const ringPattern = async () => {
                    if (!ringtoneContext) return;
                    await playTone(440, 400);
                    await new Promise(r => setTimeout(r, 200));
                    if (!ringtoneContext) return;
                    await playTone(440, 400);
                    await new Promise(r => setTimeout(r, 200));
                    if (!ringtoneContext) return;
                    await playTone(440, 400);
                    await new Promise(r => setTimeout(r, 800));
                    if (ringtoneContext) ringPattern();
                };
                ringPattern();
                ctx.resume();
            } catch(e) { console.log('Ringtone error:', e); }
        }
        
        function stopRingtone() { 
            if (ringtoneContext) { 
                try { ringtoneContext.close(); } catch(e) {}
                ringtoneContext = null; 
            } 
        }

        // Create PeerConnection
        async function createPeerConnection() {
            if (peerConnection) {
                try { peerConnection.close(); } catch(e) {}
                peerConnection = null;
            }
            
            peerConnection = new RTCPeerConnection(iceServers);
            
            if (localStream && localStream.getTracks) {
                localStream.getTracks().forEach(track => {
                    if (track) peerConnection.addTrack(track, localStream);
                });
                
                // Optimize audio settings
                const sender = peerConnection.getSenders().find(s => s.track?.kind === 'audio');
                if (sender) {
                    const params = sender.getParameters();
                    if (params.encodings && params.encodings[0]) {
                        params.encodings[0].maxBitrate = 32000;
                        params.encodings[0].priority = 'high';
                        await sender.setParameters(params).catch(e => console.log);
                    }
                }
            }
            
            peerConnection.ontrack = (event) => {
                console.log('✅ Received remote audio track');
                if (event.streams && event.streams[0]) {
                    remoteStream = event.streams[0];
                    remoteAudio.srcObject = remoteStream;
                    
                    // Resume audio context and play
                    if (audioContext && audioContext.state === 'suspended') {
                        audioContext.resume();
                    }
                    
                    remoteAudio.play().catch(e => {
                        console.log('Autoplay blocked, waiting for user interaction');
                        const playHandler = () => {
                            remoteAudio.play().catch(err => console.log);
                            document.removeEventListener('click', playHandler);
                        };
                        document.addEventListener('click', playHandler);
                    });
                    
                    // Setup visual feedback for remote audio
                    setupRemoteAudioMeter(remoteStream);
                }
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    console.log('📡 Sending ICE candidate');
                    socket.emit('ice_candidate', { target_id: otherUserId, candidate: event.candidate });
                }
            };
            
            peerConnection.oniceconnectionstatechange = () => {
                const state = peerConnection.iceConnectionState;
                console.log('🔌 ICE state:', state);
                
                if (state === 'connected' || state === 'completed') {
                    callStatusDiv.innerText = 'Connected ✅';
                    callStatusDiv.style.color = '#2ecc71';
                    if (!callStartTime) startTimer();
                    isCallActive = true;
                    if (callTimeout) clearTimeout(callTimeout);
                    showToast('Call connected!', 1500);
                } 
                else if (state === 'failed') {
                    callStatusDiv.innerText = 'Connection failed ❌';
                    callStatusDiv.style.color = '#f87171';
                    showToast('Connection lost!', 2000);
                    endCallInternal(false);
                } 
                else if (state === 'disconnected') {
                    showToast('Connection unstable...', 2000);
                    callStatusDiv.innerText = 'Reconnecting... 🔄';
                    callStatusDiv.style.color = '#f39c12';
                }
                else if (state === 'checking') {
                    callStatusDiv.innerText = 'Connecting... 🔄';
                    callStatusDiv.style.color = '#a0b3d9';
                }
            };
            
            peerConnection.onconnectionstatechange = () => {
                console.log('Connection state:', peerConnection.connectionState);
                if (peerConnection.connectionState === 'failed') {
                    endCallInternal(true);
                }
            };
            
            return peerConnection;
        }

        // Clean end call - NO REDIRECT HERE
        function endCallInternal(notifyServer = true) {
            console.log('🔚 Ending call - cleanup only, no redirect');
            stopTimer();
            isCallActive = false;
            
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            
            if (callTimeout) clearTimeout(callTimeout);
            
            if (localStream && localStream.getTracks) {
                localStream.getTracks().forEach(track => {
                    if (track && track.stop) track.stop();
                });
                localStream = null;
            }
            
            if (peerConnection) {
                try { peerConnection.close(); } catch(e) {}
                peerConnection = null;
            }
            
            if (notifyServer) {
                socket.emit('end_call', { target_id: otherUserId });
            }
            
            stopRingtone();
            avatarRing.classList.remove('speaking');
            
            isMuted = false;
            isOnHold = false;
            muteBtn.classList.remove('active');
            muteBtn.innerHTML = '<i class="fas fa-microphone"></i>';
            holdBtn.classList.remove('active');
            holdBtn.innerHTML = '<i class="fas fa-pause"></i>';
            muteBtn.disabled = false;
            holdBtn.disabled = false;
            
            callStatusDiv.innerText = 'Call ended 📞';
            callStatusDiv.style.color = '#a0b3d9';
            
            if (remoteAudio.srcObject) {
                remoteAudio.srcObject = null;
            }
            remoteStream = null;
            
            // Reset audio meter
            audioMeterFill.style.width = '0%';
            audioLevelText.innerText = '0%';
        }

        // End call by user clicking red button - THIS WILL REDIRECT
        function endCallAndRedirect() {
            console.log('🔴 User clicked end call button - redirecting to chat');
            endCallInternal(true);
            redirectToChat();
        }

        // Initiate call (Caller)
        async function initiateCall() {
            console.log('📞 Initiating call to user:', otherUserId);
            
            endCallInternal(false);
            callStatusDiv.innerText = 'Starting call... 🚀';
            callStatusDiv.style.color = '#a0b3d9';
            
            try {
                // Better audio constraints for quality
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { 
                        echoCancellation: true, 
                        noiseSuppression: true, 
                        autoGainControl: true,
                        sampleRate: 48000,
                        channelCount: 1,
                        latency: 0.01
                    } 
                });
                
                console.log('🎤 Microphone ready');
                
                // Setup audio meter
                setupAudioMeter(localStream);
                
                const pc = await createPeerConnection();
                const offer = await pc.createOffer({
                    offerToReceiveAudio: true,
                    iceRestart: false
                });
                await pc.setLocalDescription(offer);
                
                const sendCallSignal = () => {
                    console.log('📤 Sending call offer');
                    socket.emit('call_user', { 
                        target_id: otherUserId, 
                        call_type: callType, 
                        offer: pc.localDescription,
                        caller_name: currentUserName
                    });
                };
                
                if (socket.connected) {
                    sendCallSignal();
                } else {
                    showToast('Connecting to server...', 1000);
                    socket.once('connect', sendCallSignal);
                }
                
                callStatusDiv.innerText = 'Ringing... 🔔';
                callStatusDiv.style.color = '#f39c12';
                
                callTimeout = setTimeout(() => {
                    if (peerConnection?.iceConnectionState !== 'connected' && 
                        peerConnection?.iceConnectionState !== 'completed') {
                        console.log('⏰ Call timeout - no answer');
                        endCallWithMessage('No answer ⏰');
                    }
                }, 35000);
                
                socket.once('call_answered', async (data) => {
                    console.log('📞 Got answer from remote');
                    if (callTimeout) clearTimeout(callTimeout);
                    if (pc && pc.signalingState === 'have-local-offer') {
                        await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                        console.log('✅ Remote description set');
                        isCallActive = true;
                    }
                });
                
                socket.once('call_rejected', () => { 
                    if (callTimeout) clearTimeout(callTimeout);
                    endCallWithMessage('Call rejected ❌'); 
                });
                
                socket.once('call_timeout', () => { 
                    if (callTimeout) clearTimeout(callTimeout);
                    endCallWithMessage('No answer ⏰'); 
                });
                
            } catch (err) {
                console.error('❌ Error:', err);
                let errorMsg = 'Microphone access denied';
                if (err.name === 'NotAllowedError') errorMsg = 'Please allow microphone access';
                if (err.name === 'NotFoundError') errorMsg = 'No microphone found';
                endCallWithMessage(errorMsg);
            }
        }

        // Accept incoming call (Receiver)
        async function acceptIncomingCall(callerId, offerSdp) {
            console.log('📞 Accepting call from:', callerId);
            stopRingtone();
            incomingPopup.style.display = 'none';
            callStatusDiv.innerText = 'Connecting... 🔄';
            callStatusDiv.style.color = '#a0b3d9';
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { 
                        echoCancellation: true, 
                        noiseSuppression: true, 
                        autoGainControl: true,
                        sampleRate: 48000,
                        channelCount: 1
                    } 
                });
                
                setupAudioMeter(localStream);
                
                const pc = await createPeerConnection();
                await pc.setRemoteDescription(new RTCSessionDescription(offerSdp));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                
                socket.emit('answer_call', { 
                    caller_id: callerId, 
                    answer: pc.localDescription, 
                    call_type: callType 
                });
                console.log('✅ Answer sent');
                isCallActive = true;
                
            } catch (err) {
                console.error('❌ Accept error:', err);
                endCallWithMessage('Failed to accept call');
            }
        }
        
        function endCallWithMessage(reason = '') {
            if (reason) {
                callStatusDiv.innerText = reason;
                showToast(reason, 1500);
            }
            endCallInternal(true);
            setTimeout(() => {
                if (!isCallActive) redirectToChat();
            }, 1500);
        }

        // UI Controls
        function toggleMute() {
            if (!localStream) { showToast('No active call'); return; }
            isMuted = !isMuted;
            if (localStream.getAudioTracks()[0]) {
                localStream.getAudioTracks()[0].enabled = !isMuted;
            }
            muteBtn.classList.toggle('active', isMuted);
            muteBtn.innerHTML = isMuted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
            showToast(isMuted ? 'Muted 🔇' : 'Unmuted 🎤', 1000);
        }
        
        function setVolume(value) {
            if (remoteAudio) {
                remoteAudio.volume = value / 100;
            }
        }
        
        function toggleHold() {
            if (!localStream) { showToast('No active call'); return; }
            isOnHold = !isOnHold;
            if (localStream.getAudioTracks()[0]) {
                localStream.getAudioTracks()[0].enabled = !isOnHold;
            }
            holdBtn.classList.toggle('active', isOnHold);
            holdBtn.innerHTML = isOnHold ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
            callStatusDiv.innerText = isOnHold ? 'Call on hold ⏸️' : (peerConnection?.iceConnectionState === 'connected' ? 'Connected ✅' : 'Connecting...');
            showToast(isOnHold ? 'Call on hold' : 'Resumed', 1000);
        }

        // Event Listeners
        muteBtn.onclick = toggleMute;
        holdBtn.onclick = toggleHold;
        speakerBtn.onclick = () => showToast('Adjust volume using slider 🔊', 1000);
        volumeSlider.oninput = (e) => setVolume(e.target.value);
        
        // ONLY END CALL BUTTON TRIGGERS REDIRECT
        endCallBtn.onclick = () => endCallAndRedirect();

        // Socket Events
        socket.on('connect', () => {
            console.log('✅ Socket connected, ID:', socket.id);
            showToast('Connected to server', 1000);
            
            if (pendingCallData && !isCallActive) {
                console.log('📞 Processing pending call after socket connect');
                acceptIncomingCall(pendingCallData.callerId, pendingCallData.offer);
                pendingCallData = null;
            }
        });
        
        socket.on('disconnect', () => {
            console.log('⚠️ Socket disconnected');
            showToast('Server connection lost', 2000);
            if (isCallActive) {
                endCallWithMessage('Connection lost');
            }
        });
        
        socket.on('incoming_call', (data) => {
            console.log('📞 Incoming call from:', data.caller_id);
            
            if (data.caller_id === otherUserId) {
                callerNameSpan.innerText = data.caller_name || 'User';
                incomingPopup.style.display = 'flex';
                playRingtone();
                
                const acceptHandler = () => { 
                    acceptIncomingCall(data.caller_id, data.offer); 
                };
                const rejectHandler = () => { 
                    stopRingtone(); 
                    socket.emit('reject_call', { caller_id: data.caller_id }); 
                    endCallWithMessage('Call rejected'); 
                    incomingPopup.style.display = 'none';
                };
                
                acceptCallBtn.onclick = acceptHandler;
                rejectCallBtn.onclick = rejectHandler;
            }
        });
        
        socket.on('call_answered', async (data) => {
            console.log('📞 Call answered event');
            if (peerConnection && peerConnection.signalingState === 'have-local-offer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
        });
        
        socket.on('ice_candidate', async (data) => {
            if (peerConnection && data.candidate) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                    console.log('✅ ICE candidate added');
                } catch (e) { 
                    console.warn('⚠️ ICE candidate error:', e); 
                }
            }
        });
        
        socket.on('call_ended', () => {
            console.log('📞 Remote ended call');
            endCallWithMessage('Call ended');
        });
        
        socket.on('call_rejected', () => {
            console.log('📞 Call rejected');
            endCallWithMessage('Call rejected');
        });
        
        socket.on('call_timeout', () => {
            console.log('⏰ Call timeout');
            endCallWithMessage('No answer');
        });
        
        socket.on('call_error', (err) => {
            console.error('❌ Call error:', err);
            endCallWithMessage(err.message || 'Call error');
        });

        // Resume audio context on user interaction
        document.addEventListener('click', () => {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
                console.log('Audio context resumed');
            }
            if (remoteAudio && remoteAudio.paused) {
                remoteAudio.play().catch(e => console.log);
            }
        });

        // Start the call flow
        if (pendingCallData) {
            if (socket.connected) {
                acceptIncomingCall(pendingCallData.callerId, pendingCallData.offer);
                pendingCallData = null;
            } else {
                console.log('⏳ Waiting for socket connection to accept pending call');
                callStatusDiv.innerText = 'Connecting to server...';
            }
        } 
        else if (isCaller) {
            if (socket.connected) {
                setTimeout(() => initiateCall(), 500);
            } else {
                callStatusDiv.innerText = 'Connecting to server...';
                socket.once('connect', () => {
                    setTimeout(() => initiateCall(), 500);
                });
            }
        } 
        else {
            callStatusDiv.innerText = 'Waiting for call... 📞';
        }
    </script>
</body>
</html>
