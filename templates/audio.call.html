<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Audio Call with {{ other_user.username }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .call-container { text-align: center; color: white; width: 100%; max-width: 500px; padding: 20px; }
        .avatar { width: 120px; height: 120px; background: #0f3460; border-radius: 60px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 3rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .user-name { font-size: 2rem; font-weight: 600; margin-bottom: 10px; }
        .call-status { font-size: 1rem; opacity: 0.8; margin-bottom: 20px; }
        .timer { font-size: 2rem; font-family: monospace; margin-bottom: 30px; letter-spacing: 2px; }
        .controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .control-btn { background: #2c3e50; border: none; width: 55px; height: 55px; border-radius: 50%; font-size: 1.5rem; color: white; cursor: pointer; transition: transform 0.2s, background 0.2s; }
        .control-btn:hover { transform: scale(1.05); background: #34495e; }
        .control-btn.active { background: #e74c3c; }
        .end-call-btn { background: #e74c3c; border: none; width: 70px; height: 70px; border-radius: 35px; font-size: 2rem; color: white; cursor: pointer; transition: transform 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .end-call-btn:hover { transform: scale(1.05); background: #c0392b; }
        .back-link { position: fixed; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 30px; text-decoration: none; font-size: 0.9rem; backdrop-filter: blur(5px); z-index: 100; }
        .back-link:hover { background: rgba(0,0,0,0.7); color: white; }
        @media (max-width: 600px) { .avatar { width: 90px; height: 90px; font-size: 2.5rem; } .user-name { font-size: 1.5rem; } .timer { font-size: 1.5rem; } .control-btn { width: 45px; height: 45px; font-size: 1.2rem; } }
    </style>
</head>
<body>
    <a href="{{ url_for('chat', user_id=other_user.id) }}" class="back-link"><i class="fas fa-arrow-left"></i> Back to Chat</a>
    <div class="call-container">
        <div class="avatar"><i class="fas fa-user-circle"></i></div>
        <div class="user-name">{{ other_user.username }}</div>
        <div class="call-status" id="callStatus">Connecting...</div>
        <div class="timer" id="timer">00:00</div>
        <div class="controls">
            <button class="control-btn" id="muteBtn" title="Mute"><i class="fas fa-microphone"></i></button>
            <button class="control-btn" id="speakerBtn" title="Speaker"><i class="fas fa-volume-up"></i></button>
            <button class="control-btn" id="holdBtn" title="Hold"><i class="fas fa-pause"></i></button>
        </div>
        <button class="end-call-btn" id="endCallBtn"><i class="fas fa-phone-slash"></i></button>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        const currentUserId = "{{ current_user.id }}";
        const otherUserId = "{{ other_user.id }}";
        const socket = io();

        let peer = null;
        let currentCall = null;
        let localStream = null;
        let remoteStream = null;
        let callStartTime = null;
        let timerInterval = null;
        let isMuted = false;
        let isOnHold = false;
        let remoteAudio = null;
        let keepAliveInterval = null;

        const callStatusDiv = document.getElementById('callStatus');
        const timerDiv = document.getElementById('timer');
        const muteBtn = document.getElementById('muteBtn');
        const speakerBtn = document.getElementById('speakerBtn');
        const holdBtn = document.getElementById('holdBtn');
        const endCallBtn = document.getElementById('endCallBtn');

        // Timer functions
        function updateTimer() {
            if (!callStartTime) return;
            const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            timerDiv.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }
        function startTimer() {
            callStartTime = Date.now();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }
        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = null;
            callStartTime = null;
        }

        // Keep call alive (send ping every 10 sec)
        function startKeepAlive() {
            if (keepAliveInterval) clearInterval(keepAliveInterval);
            keepAliveInterval = setInterval(() => {
                if (currentCall && currentCall.open) {
                    socket.emit('call_keepalive', { target_id: otherUserId });
                }
            }, 10000);
        }
        function stopKeepAlive() {
            if (keepAliveInterval) clearInterval(keepAliveInterval);
            keepAliveInterval = null;
        }

        // Call controls
        function toggleMute() {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(track => track.enabled = !isMuted);
            muteBtn.classList.toggle('active', isMuted);
            muteBtn.innerHTML = isMuted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
        }

        function toggleSpeaker() {
            if (!remoteAudio) {
                remoteAudio = document.createElement('audio');
                remoteAudio.autoplay = true;
                remoteAudio.controls = false;
                document.body.appendChild(remoteAudio);
            }
            if (remoteAudio.muted) {
                remoteAudio.muted = false;
                speakerBtn.classList.remove('active');
                speakerBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
            } else {
                remoteAudio.muted = true;
                speakerBtn.classList.add('active');
                speakerBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
            }
        }

        function toggleHold() {
            isOnHold = !isOnHold;
            if (localStream) {
                localStream.getAudioTracks().forEach(track => track.enabled = !isOnHold);
            }
            if (remoteStream) {
                remoteStream.getAudioTracks().forEach(track => track.enabled = !isOnHold);
            }
            holdBtn.classList.toggle('active', isOnHold);
            holdBtn.innerHTML = isOnHold ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
            callStatusDiv.innerText = isOnHold ? 'Call on hold' : 'Connected';
        }

        function endCall() {
            stopTimer();
            stopKeepAlive();
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (currentCall) currentCall.close();
            if (remoteAudio) remoteAudio.pause();
            socket.emit('end_call', { target_id: otherUserId });
            setTimeout(() => window.location.href = "{{ url_for('chat', user_id=other_user.id) }}", 300);
        }

        // PeerJS configuration with STUN + TURN (free)
        const peerConfig = {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'stun:stun3.l.google.com:19302' },
                    { urls: 'stun:stun4.l.google.com:19302' },
                    {
                        urls: 'turn:turn.anyfirewall.com:443?transport=tcp',
                        username: 'webrtc',
                        credential: 'webrtc'
                    },
                    {
                        urls: 'turn:turn.anyfirewall.com:443?transport=udp',
                        username: 'webrtc',
                        credential: 'webrtc'
                    }
                ],
                iceCandidatePoolSize: 10
            }
        };

        peer = new Peer(currentUserId, peerConfig);
        peer.on('open', (id) => {
            console.log('PeerJS open, id:', id);
            // Request microphone and call the other user
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                .then(stream => {
                    localStream = stream;
                    callStatusDiv.innerText = 'Calling...';
                    const call = peer.call(otherUserId, stream);
                    setupCall(call);
                    currentCall = call;
                })
                .catch(err => {
                    console.error('Microphone error:', err);
                    callStatusDiv.innerText = 'Microphone access denied';
                    setTimeout(endCall, 2000);
                });
        });

        peer.on('error', (err) => {
            console.error('Peer error:', err);
            callStatusDiv.innerText = 'Connection error';
            setTimeout(endCall, 2000);
        });

        // Handle incoming call (if the other user calls us)
        peer.on('call', (incomingCall) => {
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                .then(stream => {
                    localStream = stream;
                    incomingCall.answer(stream);
                    setupCall(incomingCall);
                    currentCall = incomingCall;
                    callStatusDiv.innerText = 'Connected';
                    startTimer();
                    startKeepAlive();
                })
                .catch(err => {
                    console.error('Failed to answer call:', err);
                    incomingCall.close();
                    endCall();
                });
        });

        function setupCall(call) {
            call.on('stream', (remoteStreamData) => {
                remoteStream = remoteStreamData;
                // Create or reuse audio element
                if (!remoteAudio) {
                    remoteAudio = document.createElement('audio');
                    remoteAudio.autoplay = true;
                    remoteAudio.controls = false;
                    document.body.appendChild(remoteAudio);
                }
                remoteAudio.srcObject = remoteStream;
                remoteAudio.play().catch(e => console.warn('Audio play error:', e));
                callStatusDiv.innerText = 'Connected';
                startTimer();
                startKeepAlive();
            });
            call.on('close', () => {
                console.log('Call closed by remote');
                endCall();
            });
            call.on('error', (err) => {
                console.error('Call error:', err);
                endCall();
            });
        }

        // Button listeners
        muteBtn.onclick = toggleMute;
        speakerBtn.onclick = toggleSpeaker;
        holdBtn.onclick = toggleHold;
        endCallBtn.onclick = endCall;

        // Socket events for keep-alive and remote end
        socket.on('call_ended', () => endCall());
        socket.on('call_keepalive_ack', () => {
            // just keep connection alive
        });
    </script>
</body>
</html>
