<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Audio Call with {{ other_user.username }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1c, #03060c);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .call-card {
            background: rgba(18, 22, 35, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 2rem;
            width: 100%;
            max-width: 520px;
            margin: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .avatar-wrapper { text-align: center; margin-bottom: 1.5rem; position: relative; }
        .avatar-ring {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #2a2f4b, #1a1f33);
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.3s ease;
        }
        .avatar-ring.active-ring {
            box-shadow: 0 0 20px rgba(52, 211, 153, 0.5);
            border-color: #34d399;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .avatar-ring i { font-size: 3.8rem; color: #cbd5e6; }
        .user-name {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #b9c3e6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 12px;
        }
        .call-status {
            font-size: 0.9rem;
            font-weight: 500;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            margin-bottom: 16px;
            color: #a0b3d9;
        }
        .timer {
            font-family: monospace;
            font-size: 2.8rem;
            font-weight: 500;
            letter-spacing: 3px;
            background: linear-gradient(120deg, #eef2ff, #9aa9cf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 28px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 32px;
        }
        .ctrl-btn {
            background: rgba(30,35,55,0.8);
            backdrop-filter: blur(8px);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.6rem;
            color: #eef2ff;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .ctrl-btn:hover { transform: translateY(-3px); background: rgba(50,58,85,0.9); }
        .ctrl-btn.active { background: #e11d48; color: white; }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 8px;
        }
        .end-btn {
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50px;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            background: #dc2626;
            color: white;
        }
        .end-btn:hover { background: #b91c1c; transform: scale(1.05); }
        .incoming-popup {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            background: rgba(25,30,45,0.95);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 14px 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .incoming-popup span i { margin-right: 12px; color: #34d399; animation: ring 1s infinite; }
        @keyframes ring {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(15deg); }
            75% { transform: rotate(-15deg); }
        }
        .incoming-popup button {
            background: none;
            border: none;
            font-size: 1.8rem;
            margin: 0 6px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .incoming-popup button:hover { transform: scale(1.1); }
        .accept-btn { color: #34d399; }
        .reject-btn { color: #f87171; }
        .toast-msg {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #e2e8f0;
            z-index: 2000;
            display: none;
            white-space: nowrap;
        }
        .debug-panel {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            font-family: monospace;
            font-size: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            z-index: 1000;
            max-width: 400px;
            max-height: 250px;
            overflow-y: auto;
            display: block;
            backdrop-filter: blur(5px);
            border: 1px solid #0f0;
        }
        .volume-meter {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        .volume-level {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #34d399, #10b981);
            transition: width 0.05s;
        }
        .quality-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-family: monospace;
            z-index: 1000;
        }
        .quality-excellent { color: #34d399; }
        .quality-good { color: #60a5fa; }
        .quality-poor { color: #fbbf24; }
        .quality-bad { color: #f87171; }
        @media (max-width: 550px) {
            .call-card { padding: 1.5rem; border-radius: 40px; }
            .avatar-ring { width: 90px; height: 90px; }
            .avatar-ring i { font-size: 2.8rem; }
            .user-name { font-size: 1.5rem; }
            .timer { font-size: 2rem; }
            .ctrl-btn { width: 50px; height: 50px; font-size: 1.3rem; }
            .end-btn { width: 65px; height: 65px; font-size: 1.6rem; }
            .debug-panel { font-size: 8px; max-width: 250px; max-height: 150px; }
            .quality-badge { font-size: 9px; }
        }
    </style>
</head>
<body>
    <audio id="remoteAudio" autoplay style="display: none;"></audio>
    
    <div class="call-card">
        <div class="avatar-wrapper">
            <div class="avatar-ring" id="avatarRing">
                <i class="fas fa-user-circle"></i>
            </div>
            <div class="volume-meter">
                <div class="volume-level" id="volumeLevel"></div>
            </div>
            <div class="user-name">{{ other_user.username }}</div>
        </div>
        <div style="text-align: center;">
            <div class="call-status" id="callStatus">Initializing...</div>
            <div class="timer" id="timer">00:00</div>
        </div>
        <div class="controls">
            <button class="ctrl-btn" id="muteBtn" title="Mute"><i class="fas fa-microphone"></i></button>
            <button class="ctrl-btn" id="speakerBtn" title="Speaker"><i class="fas fa-volume-up"></i></button>
            <button class="ctrl-btn" id="holdBtn" title="Hold"><i class="fas fa-pause"></i></button>
        </div>
        <div class="action-buttons">
            <button class="end-btn" id="endCallBtn"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <div id="incomingPopup" class="incoming-popup">
        <span><i class="fas fa-phone-alt"></i> Incoming call from <strong id="callerName"></strong></span>
        <div>
            <button id="acceptCallBtn" class="accept-btn"><i class="fas fa-check-circle"></i></button>
            <button id="rejectCallBtn" class="reject-btn"><i class="fas fa-times-circle"></i></button>
        </div>
    </div>
    
    <div id="toastMsg" class="toast-msg"></div>
    <div id="debugPanel" class="debug-panel">
        <div style="color:#fff; border-bottom:1px solid #333; margin-bottom:5px;">🔍 WebRTC Debug Console</div>
    </div>
    <div id="qualityBadge" class="quality-badge quality-good">📡 Checking...</div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // ==================== ULTIMATE WEBRTC SOLUTION ====================
        // Version: 5.0.0 - Complete All-in-One Solution
        
        (function() {
            'use strict';
            
            // ========== CONFIGURATION ==========
            const ULTIMATE_CONFIG = {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302', priority: 1 },
                    { urls: 'stun:stun1.l.google.com:19302', priority: 1 },
                    { urls: 'stun:stun2.l.google.com:19302', priority: 1 },
                    { urls: 'stun:stun3.l.google.com:19302', priority: 1 },
                    { urls: 'stun:stun4.l.google.com:19302', priority: 1 },
                    { urls: 'stun:stun.stunprotocol.org:3478', priority: 2 },
                    { urls: 'stun:stun.voipbuster.com', priority: 2 },
                    { urls: 'stun:stun.ekiga.net', priority: 2 },
                    { urls: 'stun:stun.ideasip.com', priority: 2 },
                    { urls: 'stun:stun.iptel.org', priority: 2 },
                    { urls: 'stun:stun.rixtelecom.se', priority: 2 },
                    { urls: 'stun:stun.schlund.de', priority: 2 },
                    { urls: 'stun:stunserver.org', priority: 2 },
                    { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject', priority: 3 },
                    { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject', priority: 3 },
                    { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject', priority: 3 }
                ],
                timings: {
                    iceTimeout: 8000,
                    connectionTimeout: 15000,
                    answerTimeout: 20000,
                    reconnectDelay: 2000,
                    maxReconnectAttempts: 5
                }
            };
            
            // ========== FIX 1: Enhanced RTCPeerConnection ==========
            const OriginalRTCPeerConnection = window.RTCPeerConnection;
            
            class FixedRTCPeerConnection extends OriginalRTCPeerConnection {
                constructor(config) {
                    const flatIceServers = ULTIMATE_CONFIG.iceServers.map(s => ({
                        urls: s.urls,
                        username: s.username,
                        credential: s.credential
                    }));
                    
                    const enhancedConfig = {
                        ...config,
                        iceServers: flatIceServers,
                        iceCandidatePoolSize: 10,
                        bundlePolicy: 'max-bundle',
                        rtcpMuxPolicy: 'require',
                        iceTransportPolicy: 'all'
                    };
                    super(enhancedConfig);
                    this._pendingCandidates = [];
                    this._connectionStartTime = Date.now();
                    this._reconnectAttempts = 0;
                    
                    this._iceTimeout = setTimeout(() => {
                        if (this.iceConnectionState === 'checking') {
                            console.log('[Ultimate] ICE timeout - restarting');
                            this.restartIce();
                        }
                    }, ULTIMATE_CONFIG.timings.iceTimeout);
                }
                
                async restartIce() {
                    try {
                        const offer = await this.createOffer({ iceRestart: true });
                        await this.setLocalDescription(offer);
                        console.log('[Ultimate] ICE restart initiated');
                        return offer;
                    } catch(e) {
                        console.error('[Ultimate] ICE restart failed:', e);
                    }
                }
                
                close() {
                    if (this._iceTimeout) clearTimeout(this._iceTimeout);
                    super.close();
                }
            }
            
            window.RTCPeerConnection = FixedRTCPeerConnection;
            
            // ========== FIX 2: Enhanced addIceCandidate with Queuing ==========
            const originalAddIceCandidate = RTCPeerConnection.prototype.addIceCandidate;
            RTCPeerConnection.prototype.addIceCandidate = function(candidate) {
                if (!candidate) return Promise.resolve();
                
                if (!this.remoteDescription && candidate.candidate) {
                    console.log('[Ultimate] Queuing ICE candidate');
                    this._pendingCandidates = this._pendingCandidates || [];
                    this._pendingCandidates.push(candidate);
                    return Promise.resolve();
                }
                
                return originalAddIceCandidate.call(this, candidate).catch(e => {
                    if (!e.message.includes('already')) {
                        console.warn('[Ultimate] ICE error:', e.message);
                    }
                });
            };
            
            // ========== FIX 3: Enhanced setRemoteDescription ==========
            const originalSetRemoteDescription = RTCPeerConnection.prototype.setRemoteDescription;
            RTCPeerConnection.prototype.setRemoteDescription = async function(desc) {
                const result = await originalSetRemoteDescription.call(this, desc);
                
                if (this._pendingCandidates && this._pendingCandidates.length > 0) {
                    console.log(`[Ultimate] Processing ${this._pendingCandidates.length} queued ICE candidates`);
                    for (const candidate of this._pendingCandidates) {
                        try {
                            await originalAddIceCandidate.call(this, candidate);
                        } catch(e) {}
                    }
                    this._pendingCandidates = [];
                }
                
                return result;
            };
            
            // ========== FIX 4: Enhanced getUserMedia with Fallback ==========
            const originalGetUserMedia = navigator.mediaDevices.getUserMedia;
            navigator.mediaDevices.getUserMedia = async function(constraints) {
                try {
                    return await originalGetUserMedia.call(this, constraints);
                } catch(err) {
                    console.log('[Ultimate] getUserMedia failed, fallback:', err.message);
                    if (err.name === 'NotAllowedError') throw err;
                    return await originalGetUserMedia.call(this, { audio: true });
                }
            };
            
            // ========== FIX 5: Connection Monitor ==========
            class ConnectionMonitor {
                constructor() {
                    this.rtt = [];
                    this.packetLoss = 0;
                    this.quality = 'good';
                    this.interval = null;
                }
                
                start() {
                    this.interval = setInterval(() => this.checkNetwork(), 3000);
                    if ('connection' in navigator) {
                        navigator.connection.addEventListener('change', () => this.updateQuality());
                    }
                }
                
                checkNetwork() {
                    if ('connection' in navigator) {
                        this.updateQuality();
                    }
                }
                
                updateQuality() {
                    const conn = navigator.connection;
                    if (conn) {
                        const type = conn.effectiveType;
                        const qualities = { '4g': 'excellent', '3g': 'good', '2g': 'poor', 'slow-2g': 'bad' };
                        this.quality = qualities[type] || 'good';
                        
                        const badge = document.getElementById('qualityBadge');
                        if (badge) {
                            badge.className = `quality-badge quality-${this.quality}`;
                            badge.innerHTML = `📡 ${this.quality.toUpperCase()} | ${type || 'unknown'}`;
                        }
                    }
                }
                
                updateStats(stats) {
                    if (stats.rtt) {
                        this.rtt.push(stats.rtt);
                        if (this.rtt.length > 10) this.rtt.shift();
                    }
                    if (stats.packetsLost !== undefined) {
                        this.packetLoss = stats.packetsLost;
                    }
                }
                
                getAvgRtt() {
                    if (this.rtt.length === 0) return null;
                    return Math.round(this.rtt.reduce((a,b) => a+b, 0) / this.rtt.length);
                }
                
                stop() {
                    if (this.interval) clearInterval(this.interval);
                }
            }
            
            // ========== FIX 6: Health Checker ==========
            class HealthChecker {
                static async run() {
                    const results = {
                        browser: this.checkBrowser(),
                        microphone: await this.checkMicrophone(),
                        network: this.checkNetwork(),
                        webRTC: this.checkWebRTC()
                    };
                    results.overall = this.calculateOverall(results);
                    return results;
                }
                
                static checkBrowser() {
                    const ua = navigator.userAgent;
                    const isChrome = /Chrome/.test(ua) && !/Edg/.test(ua);
                    const isFirefox = /Firefox/.test(ua);
                    const isSafari = /Safari/.test(ua) && !/Chrome/.test(ua);
                    return {
                        name: isChrome ? 'Chrome' : isFirefox ? 'Firefox' : isSafari ? 'Safari' : 'Other',
                        supported: isChrome || isFirefox || isSafari
                    };
                }
                
                static async checkMicrophone() {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        const hasMic = stream.getAudioTracks().length > 0;
                        stream.getTracks().forEach(t => t.stop());
                        return { available: hasMic };
                    } catch(err) {
                        return { available: false, error: err.message };
                    }
                }
                
                static checkNetwork() {
                    return { online: navigator.onLine, type: navigator.connection?.effectiveType || 'unknown' };
                }
                
                static checkWebRTC() {
                    return { supported: !!window.RTCPeerConnection };
                }
                
                static calculateOverall(results) {
                    let score = 0;
                    if (results.webRTC.supported) score += 30;
                    if (results.microphone.available) score += 30;
                    if (results.network.online) score += 20;
                    if (results.browser.supported) score += 20;
                    return score >= 80 ? 'excellent' : score >= 60 ? 'good' : score >= 40 ? 'poor' : 'bad';
                }
            }
            
            // ========== FIX 7: Auto-Fix Module ==========
            class AutoFix {
                constructor() {
                    this.active = true;
                    this.interval = null;
                }
                
                start() {
                    this.interval = setInterval(() => this.runChecks(), 10000);
                }
                
                async runChecks() {
                    if (!this.active) return;
                    
                    if (window.peerConnection) {
                        const state = window.peerConnection.iceConnectionState;
                        if (state === 'failed') {
                            console.log('[AutoFix] ICE failed, attempting restart');
                            if (window.peerConnection.restartIce) {
                                await window.peerConnection.restartIce();
                            }
                        }
                    }
                    
                    if (window.localStream) {
                        const audioTrack = window.localStream.getAudioTracks()[0];
                        if (audioTrack && !audioTrack.enabled && window.isCallActive) {
                            console.log('[AutoFix] Audio track disabled, re-enabling');
                            audioTrack.enabled = true;
                        }
                    }
                }
                
                stop() {
                    if (this.interval) clearInterval(this.interval);
                }
            }
            
            // Export to global
            window.UltimateWebRTC = {
                ConnectionMonitor,
                HealthChecker,
                AutoFix,
                config: ULTIMATE_CONFIG
            };
            
            console.log('🚀 Ultimate WebRTC Solution Loaded!');
            
            // Run health check on load
            HealthChecker.run().then(results => {
                console.log('[Health]', results);
                if (results.overall === 'bad') {
                    console.warn('[Health] Poor connection quality detected');
                }
            });
        })();
        
        // ==================== MAIN APPLICATION ====================
        
        // User info
        const currentUserId = "{{ current_user.id }}";
        const otherUserId = "{{ other_user.id }}";
        const currentUserName = "{{ current_user.username }}";
        const chatUrl = "{{ url_for('chat', user_id=other_user.id) }}";
        const callType = "audio";
        
        // Socket connection
        const socket = io({
            reconnection: true,
            reconnectionAttempts: 10,
            reconnectionDelay: 1000,
            reconnectionDelayMax: 5000,
            timeout: 20000
        });

        // Check role
        const urlParams = new URLSearchParams(window.location.search);
        let isCaller = urlParams.get('role') !== 'receiver';
        
        // Pending call
        let pendingCallData = null;
        const pendingOfferJson = sessionStorage.getItem('pendingOffer');
        if (pendingOfferJson) {
            try {
                pendingCallData = JSON.parse(pendingOfferJson);
                sessionStorage.removeItem('pendingOffer');
                isCaller = false;
                console.log('📦 Found pending call');
            } catch(e) {}
        }

        // DOM elements
        const remoteAudio = document.getElementById('remoteAudio');
        const callStatusDiv = document.getElementById('callStatus');
        const timerDiv = document.getElementById('timer');
        const muteBtn = document.getElementById('muteBtn');
        const speakerBtn = document.getElementById('speakerBtn');
        const holdBtn = document.getElementById('holdBtn');
        const endCallBtn = document.getElementById('endCallBtn');
        const incomingPopup = document.getElementById('incomingPopup');
        const acceptCallBtn = document.getElementById('acceptCallBtn');
        const rejectCallBtn = document.getElementById('rejectCallBtn');
        const callerNameSpan = document.getElementById('callerName');
        const toastMsg = document.getElementById('toastMsg');
        const avatarRing = document.getElementById('avatarRing');
        const volumeLevel = document.getElementById('volumeLevel');
        const debugPanel = document.getElementById('debugPanel');

        // State
        let peerConnection = null;
        let localStream = null;
        let callStartTime = null;
        let timerInterval = null;
        let isMuted = false;
        let isOnHold = false;
        let ringtoneContext = null;
        let isCallActive = false;
        let callTimeout = null;
        let audioContext = null;
        let volumeInterval = null;
        let answerReceived = false;
        let monitor = null;
        let autoFix = null;
        let statsInterval = null;
        
        // Debug logging
        function debugLog(msg, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const colors = { info: '#0f0', warn: '#ff0', error: '#f00', debug: '#888' };
            console.log(`[${timestamp}] ${msg}`);
            if (debugPanel) {
                const div = document.createElement('div');
                div.style.color = colors[type] || '#0f0';
                div.style.fontSize = '10px';
                div.style.fontFamily = 'monospace';
                div.style.borderBottom = '1px solid #333';
                div.style.padding = '2px 0';
                div.textContent = `${timestamp}: ${msg}`;
                debugPanel.appendChild(div);
                while (debugPanel.children.length > 50) {
                    debugPanel.removeChild(debugPanel.children[1]);
                }
                debugPanel.scrollTop = debugPanel.scrollHeight;
            }
        }
        
        // Volume meter
        function setupVolumeMeter(stream) {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            try {
                const source = audioContext.createMediaStreamSource(stream);
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                if (volumeInterval) clearInterval(volumeInterval);
                volumeInterval = setInterval(() => {
                    if (!isCallActive) return;
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                    let percent = Math.min(100, (sum / dataArray.length / 255) * 100);
                    if (volumeLevel) volumeLevel.style.width = percent + '%';
                }, 100);
                
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
            } catch(e) {
                debugLog('Volume meter error: ' + e.message, 'error');
            }
        }
        
        function showToast(msg, duration = 2500) {
            toastMsg.innerText = msg;
            toastMsg.style.display = 'block';
            setTimeout(() => { toastMsg.style.display = 'none'; }, duration);
        }

        function redirectToChat() {
            debugLog('Redirecting to chat');
            window.location.href = chatUrl;
        }

        function updateTimer() {
            if (!callStartTime) return;
            const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            timerDiv.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }
        
        function startTimer() { 
            callStartTime = Date.now(); 
            if (timerInterval) clearInterval(timerInterval); 
            timerInterval = setInterval(updateTimer, 1000); 
        }
        
        function stopTimer() { 
            if (timerInterval) clearInterval(timerInterval); 
            timerInterval = null; 
            callStartTime = null; 
            timerDiv.innerText = '00:00'; 
        }

        function playRingtone() {
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) return;
                if (ringtoneContext) ringtoneContext.close();
                ringtoneContext = new AudioContextClass();
                const gainNode = ringtoneContext.createGain();
                gainNode.gain.value = 0.15;
                gainNode.connect(ringtoneContext.destination);
                const playTone = (freq, duration) => new Promise(resolve => {
                    const osc = ringtoneContext.createOscillator();
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    osc.connect(gainNode);
                    osc.start();
                    setTimeout(() => { osc.stop(); resolve(); }, duration);
                });
                const ringPattern = async () => {
                    if (!ringtoneContext) return;
                    if (ringtoneContext.state === 'suspended') await ringtoneContext.resume();
                    await playTone(440, 400);
                    await new Promise(r => setTimeout(r, 200));
                    if (!ringtoneContext) return;
                    await playTone(440, 400);
                    await new Promise(r => setTimeout(r, 200));
                    if (!ringtoneContext) return;
                    await playTone(440, 400);
                    await new Promise(r => setTimeout(r, 800));
                    if (ringtoneContext) ringPattern();
                };
                ringPattern();
                ringtoneContext.resume();
            } catch(e) { debugLog('Ringtone error: ' + e.message, 'warn'); }
        }
        
        function stopRingtone() { 
            if (ringtoneContext) { 
                try { ringtoneContext.close(); } catch(e) {}
                ringtoneContext = null; 
            } 
        }

        // Get connection stats
        async function getConnectionStats() {
            if (!peerConnection || !isCallActive) return null;
            try {
                const stats = await peerConnection.getStats();
                let result = { rtt: null, packetsLost: 0, jitter: null };
                stats.forEach(report => {
                    if (report.type === 'candidate-pair' && report.nominated && report.currentRoundTripTime) {
                        result.rtt = Math.round(report.currentRoundTripTime * 1000);
                    }
                    if (report.type === 'inbound-rtp' && report.kind === 'audio') {
                        result.packetsLost = report.packetsLost || 0;
                        result.jitter = Math.round((report.jitter || 0) * 1000);
                    }
                });
                return result;
            } catch(e) {
                return null;
            }
        }
        
        // Start stats monitoring
        function startStatsMonitoring() {
            if (statsInterval) clearInterval(statsInterval);
            statsInterval = setInterval(async () => {
                if (!isCallActive) return;
                const stats = await getConnectionStats();
                if (stats && monitor) {
                    monitor.updateStats(stats);
                    if (stats.rtt) {
                        const badge = document.getElementById('qualityBadge');
                        if (badge && stats.rtt) {
                            const existingText = badge.innerHTML;
                            if (!existingText.includes(`${stats.rtt}ms`)) {
                                badge.innerHTML = `${existingText.split('|')[0]} | ${stats.rtt}ms`;
                            }
                        }
                    }
                }
            }, 3000);
        }

        // Create PeerConnection
        async function createPeerConnection() {
            if (peerConnection) {
                try { peerConnection.close(); } catch(e) {}
                peerConnection = null;
            }
            
            peerConnection = new RTCPeerConnection();
            debugLog('PeerConnection created');
            
            if (localStream && localStream.getTracks) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                    debugLog(`Added ${track.kind} track`);
                });
            }
            
            peerConnection.ontrack = (event) => {
                debugLog(`Received remote ${event.track.kind} track`);
                if (event.streams && event.streams[0]) {
                    remoteAudio.srcObject = event.streams[0];
                    remoteAudio.play().catch(e => debugLog('Autoplay error: ' + e.message, 'warn'));
                    avatarRing.classList.add('active-ring');
                }
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    debugLog('Sending ICE candidate');
                    socket.emit('ice_candidate', { target_id: otherUserId, candidate: event.candidate });
                }
            };
            
            peerConnection.oniceconnectionstatechange = () => {
                const state = peerConnection.iceConnectionState;
                debugLog(`ICE state: ${state}`);
                
                if (state === 'connected' || state === 'completed') {
                    callStatusDiv.innerText = 'Connected ✅';
                    if (!callStartTime) startTimer();
                    isCallActive = true;
                    if (callTimeout) clearTimeout(callTimeout);
                    avatarRing.classList.add('active-ring');
                    showToast('Call connected!', 1500);
                    startStatsMonitoring();
                } 
                else if (state === 'failed') {
                    callStatusDiv.innerText = 'Connection failed ❌';
                    showToast('Connection failed!', 2000);
                    endCallInternal(false);
                } 
                else if (state === 'disconnected') {
                    callStatusDiv.innerText = 'Reconnecting... 🔄';
                    avatarRing.classList.remove('active-ring');
                }
                else if (state === 'checking') {
                    callStatusDiv.innerText = 'Connecting... 🔄';
                }
            };
            
            peerConnection.onconnectionstatechange = () => {
                debugLog(`Connection state: ${peerConnection.connectionState}`);
            };
            
            return peerConnection;
        }

        // End call
        function endCallInternal(notifyServer = true) {
            debugLog('Ending call, notifyServer: ' + notifyServer);
            stopTimer();
            isCallActive = false;
            answerReceived = false;
            
            if (volumeInterval) clearInterval(volumeInterval);
            if (callTimeout) clearTimeout(callTimeout);
            if (statsInterval) clearInterval(statsInterval);
            
            if (localStream && localStream.getTracks) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            if (peerConnection) {
                try { peerConnection.close(); } catch(e) {}
                peerConnection = null;
            }
            
            if (notifyServer) {
                socket.emit('end_call', { target_id: otherUserId });
            }
            
            stopRingtone();
            
            isMuted = false;
            isOnHold = false;
            muteBtn.classList.remove('active');
            muteBtn.innerHTML = '<i class="fas fa-microphone"></i>';
            holdBtn.classList.remove('active');
            holdBtn.innerHTML = '<i class="fas fa-pause"></i>';
            avatarRing.classList.remove('active-ring');
            
            callStatusDiv.innerText = 'Call ended 📞';
            
            if (remoteAudio.srcObject) {
                remoteAudio.srcObject = null;
            }
        }

        function endCallAndRedirect() {
            endCallInternal(true);
            redirectToChat();
        }

        // Initiate call
        async function initiateCall() {
            debugLog('Initiating call to: ' + otherUserId);
            endCallInternal(false);
            callStatusDiv.innerText = 'Starting call... 🚀';
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
                });
                debugLog('Microphone ready');
                setupVolumeMeter(localStream);
                
                const pc = await createPeerConnection();
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                debugLog('Offer created');
                
                socket.emit('call_user', { 
                    target_id: otherUserId, 
                    call_type: callType, 
                    offer: pc.localDescription,
                    caller_name: currentUserName
                });
                
                callStatusDiv.innerText = 'Ringing... 🔔';
                
                callTimeout = setTimeout(() => {
                    if (!isCallActive && !answerReceived) {
                        debugLog('Call timeout - no answer', 'warn');
                        endCallWithMessage('No answer ⏰');
                    }
                }, 35000);
                
                socket.once('call_answered', async (data) => {
                    debugLog('Received answer from remote');
                    answerReceived = true;
                    if (callTimeout) clearTimeout(callTimeout);
                    if (pc && pc.signalingState === 'have-local-offer') {
                        await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                        debugLog('Remote description set');
                    }
                });
                
                socket.once('call_rejected', () => { 
                    debugLog('Call rejected', 'warn');
                    endCallWithMessage('Call rejected ❌'); 
                });
                
                socket.once('call_timeout', () => { 
                    debugLog('Call timeout event', 'warn');
                    endCallWithMessage('No answer ⏰'); 
                });
                
            } catch (err) {
                debugLog('Error: ' + err.message, 'error');
                endCallWithMessage('Microphone access denied');
            }
        }

        // Accept call
        async function acceptIncomingCall(callerId, offerSdp) {
            debugLog('Accepting call from: ' + callerId);
            stopRingtone();
            incomingPopup.style.display = 'none';
            callStatusDiv.innerText = 'Connecting... 🔄';
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
                });
                debugLog('Microphone ready');
                setupVolumeMeter(localStream);
                
                const pc = await createPeerConnection();
                await pc.setRemoteDescription(new RTCSessionDescription(offerSdp));
                debugLog('Remote description set');
                
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                debugLog('Answer created');
                
                socket.emit('answer_call', { 
                    caller_id: callerId, 
                    answer: pc.localDescription, 
                    call_type: callType 
                });
                debugLog('Answer sent');
                
            } catch (err) {
                debugLog('Accept error: ' + err.message, 'error');
                endCallWithMessage('Failed to accept call');
            }
        }

        function endCallWithMessage(reason = '') {
            if (reason) {
                callStatusDiv.innerText = reason;
                showToast(reason, 1500);
            }
            endCallInternal(true);
        }

        // UI Controls
        function toggleMute() {
            if (!localStream || !isCallActive) { showToast('No active call'); return; }
            isMuted = !isMuted;
            if (localStream.getAudioTracks()[0]) {
                localStream.getAudioTracks()[0].enabled = !isMuted;
            }
            muteBtn.classList.toggle('active', isMuted);
            muteBtn.innerHTML = isMuted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
            showToast(isMuted ? 'Muted 🔇' : 'Unmuted 🎤', 1000);
        }
        
        function toggleSpeaker() { showToast('Adjust system volume 🔊', 1000); }
        
        function toggleHold() {
            if (!localStream || !isCallActive) { showToast('No active call'); return; }
            isOnHold = !isOnHold;
            if (localStream.getAudioTracks()[0]) {
                localStream.getAudioTracks()[0].enabled = !isOnHold;
            }
            holdBtn.classList.toggle('active', isOnHold);
            holdBtn.innerHTML = isOnHold ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
            callStatusDiv.innerText = isOnHold ? 'Call on hold ⏸️' : (peerConnection?.iceConnectionState === 'connected' ? 'Connected ✅' : 'Connecting...');
            showToast(isOnHold ? 'Call on hold' : 'Resumed', 1000);
        }

        muteBtn.onclick = toggleMute;
        speakerBtn.onclick = toggleSpeaker;
        holdBtn.onclick = toggleHold;
        endCallBtn.onclick = endCallAndRedirect;

        // Socket events
        socket.on('connect', () => {
            debugLog('Socket connected: ' + socket.id);
            showToast('Connected to server', 1000);
            
            if (pendingCallData && !isCallActive) {
                acceptIncomingCall(pendingCallData.callerId, pendingCallData.offer);
                pendingCallData = null;
            }
        });
        
        socket.on('disconnect', () => {
            debugLog('Socket disconnected', 'warn');
            if (isCallActive) endCallWithMessage('Connection lost');
        });
        
        socket.on('connect_error', (err) => {
            debugLog('Socket error: ' + err.message, 'error');
        });
        
        socket.on('incoming_call', (data) => {
            debugLog('Incoming call from: ' + data.caller_id);
            
            if (data.caller_id === otherUserId) {
                callerNameSpan.innerText = data.caller_name || 'User';
                incomingPopup.style.display = 'flex';
                playRingtone();
                
                acceptCallBtn.onclick = () => {
                    stopRingtone();
                    acceptIncomingCall(data.caller_id, data.offer);
                };
                rejectCallBtn.onclick = () => {
                    stopRingtone();
                    socket.emit('reject_call', { caller_id: data.caller_id });
                    endCallWithMessage('Call rejected');
                    incomingPopup.style.display = 'none';
                };
            }
        });
        
        socket.on('call_answered', async (data) => {
            debugLog('Call answered event');
            if (peerConnection && peerConnection.signalingState === 'have-local-offer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
        });
        
        socket.on('ice_candidate', async (data) => {
            if (peerConnection && data.candidate) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                    debugLog('ICE candidate added');
                } catch (e) { 
                    debugLog('ICE candidate error: ' + e.message, 'warn');
                }
            }
        });
        
        socket.on('call_ended', () => {
            debugLog('Remote ended call');
            endCallWithMessage('Call ended');
        });
        
        socket.on('call_rejected', () => {
            debugLog('Call rejected by remote', 'warn');
            endCallWithMessage('Call rejected');
        });
        
        socket.on('call_timeout', () => {
            debugLog('Call timeout from server', 'warn');
            endCallWithMessage('No answer');
        });
        
        socket.on('call_error', (err) => {
            debugLog('Call error: ' + err.message, 'error');
            endCallWithMessage(err.message || 'Call error');
        });

        // Resume audio on user interaction
        document.body.addEventListener('click', () => {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        });

        // Initialize monitors
        monitor = new UltimateWebRTC.ConnectionMonitor();
        monitor.start();
        
        autoFix = new UltimateWebRTC.AutoFix();
        autoFix.start();
        
        // Make available globally for auto-fix
        window.peerConnection = () => peerConnection;
        window.localStream = () => localStream;
        window.isCallActive = () => isCallActive;

        // Start call
        if (pendingCallData) {
            if (socket.connected) {
                acceptIncomingCall(pendingCallData.callerId, pendingCallData.offer);
                pendingCallData = null;
            } else {
                callStatusDiv.innerText = 'Connecting to server...';
            }
        } 
        else if (isCaller) {
            if (socket.connected) {
                initiateCall();
            } else {
                callStatusDiv.innerText = 'Connecting to server...';
                socket.once('connect', () => initiateCall());
            }
        } 
        else {
            callStatusDiv.innerText = 'Waiting for call... 📞';
        }
        
        debugLog('Application initialized', 'info');
    </script>
</body>
</html>
