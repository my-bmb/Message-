<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Audio Call with {{ other_user.username }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .call-container { text-align: center; color: white; width: 100%; max-width: 500px; padding: 20px; }
        .avatar { width: 120px; height: 120px; background: #0f3460; border-radius: 60px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 3rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .user-name { font-size: 2rem; font-weight: 600; margin-bottom: 10px; }
        .call-status { font-size: 1rem; opacity: 0.8; margin-bottom: 20px; }
        .timer { font-size: 2rem; font-family: monospace; margin-bottom: 30px; letter-spacing: 2px; }
        .controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .control-btn { background: #2c3e50; border: none; width: 55px; height: 55px; border-radius: 50%; font-size: 1.5rem; color: white; cursor: pointer; transition: transform 0.2s, background 0.2s; }
        .control-btn:hover { transform: scale(1.05); background: #34495e; }
        .control-btn.active { background: #e74c3c; }
        .end-call-btn { background: #e74c3c; border: none; width: 70px; height: 70px; border-radius: 35px; font-size: 2rem; color: white; cursor: pointer; transition: transform 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .end-call-btn:hover { transform: scale(1.05); background: #c0392b; }
        .incoming-popup { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #0f3460; border-radius: 20px; padding: 15px; display: none; align-items: center; justify-content: space-between; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .incoming-popup button { background: none; border: none; font-size: 1.5rem; margin: 0 10px; cursor: pointer; }
        .accept-btn { color: #2ecc71; }
        .reject-btn { color: #e74c3c; }
        .toast-msg { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #2c3e50; padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; z-index: 2000; display: none; white-space: nowrap; }
        @media (max-width: 600px) { .avatar { width: 90px; height: 90px; font-size: 2.5rem; } .user-name { font-size: 1.5rem; } .timer { font-size: 1.5rem; } .control-btn { width: 45px; height: 45px; font-size: 1.2rem; } }
    </style>
</head>
<body>
    <audio id="remoteAudio" autoplay style="display: none;"></audio>
    <div class="call-container">
        <div class="avatar"><i class="fas fa-user-circle"></i></div>
        <div class="user-name">{{ other_user.username }}</div>
        <div class="call-status" id="callStatus">Initializing...</div>
        <div class="timer" id="timer">00:00</div>
        <div class="controls">
            <button class="control-btn" id="muteBtn" title="Mute"><i class="fas fa-microphone"></i></button>
            <button class="control-btn" id="speakerBtn" title="Speaker"><i class="fas fa-volume-up"></i></button>
            <button class="control-btn" id="holdBtn" title="Hold"><i class="fas fa-pause"></i></button>
        </div>
        <button class="end-call-btn" id="endCallBtn"><i class="fas fa-phone-slash"></i></button>
    </div>
    <div id="incomingPopup" class="incoming-popup">
        <span><i class="fas fa-phone-alt"></i> Incoming call from <span id="callerName"></span></span>
        <div>
            <button id="acceptCallBtn" class="accept-btn"><i class="fas fa-check-circle"></i></button>
            <button id="rejectCallBtn" class="reject-btn"><i class="fas fa-times-circle"></i></button>
        </div>
    </div>
    <div id="toastMsg" class="toast-msg"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // -------------------- User & call info --------------------
        const currentUserId = "{{ current_user.id }}";
        const otherUserId = "{{ other_user.id }}";
        const callType = "audio";
        const socket = io();

        const urlParams = new URLSearchParams(window.location.search);
        let isCaller = urlParams.get('role') !== 'receiver';

        const pendingOfferJson = sessionStorage.getItem('pendingOffer');
        if (pendingOfferJson) {
            sessionStorage.removeItem('pendingOffer');
            const pending = JSON.parse(pendingOfferJson);
            isCaller = false;
            window.pendingCall = pending;
        }

        // -------------------- DOM elements --------------------
        const remoteAudio = document.getElementById('remoteAudio');
        const callStatusDiv = document.getElementById('callStatus');
        const timerDiv = document.getElementById('timer');
        const muteBtn = document.getElementById('muteBtn');
        const speakerBtn = document.getElementById('speakerBtn');
        const holdBtn = document.getElementById('holdBtn');
        const endCallBtn = document.getElementById('endCallBtn');
        const incomingPopup = document.getElementById('incomingPopup');
        const acceptCallBtn = document.getElementById('acceptCallBtn');
        const rejectCallBtn = document.getElementById('rejectCallBtn');
        const callerNameSpan = document.getElementById('callerName');
        const toastMsg = document.getElementById('toastMsg');

        // -------------------- State --------------------
        let peerConnection = null;
        let localStream = null;
        let callStartTime = null;
        let timerInterval = null;
        let isMuted = false;
        let isOnHold = false;
        let iceRestartAttempts = 0;
        let ringtoneContext = null;
        let audioEnabledByUser = false;

        // -------------------- Free TURN servers (multiple fallbacks) --------------------
        const iceServers = {
            iceServers: [
                // STUN
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                // Free TURN #1 - Open Relay (most reliable)
                { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
                // Free TURN #2 - Numb.vi
                { urls: 'turn:numb.vi:3478', username: 'webrtc', credential: 'webrtc' },
                { urls: 'turn:numb.vi:3478?transport=tcp', username: 'webrtc', credential: 'webrtc' },
                // Free TURN #3 - Freeturn (sometimes works)
                { urls: 'turn:freeturn.net:3478', username: 'free', credential: 'free' }
            ],
            iceCandidatePoolSize: 10
        };

        // Helper: show temporary message
        function showToast(msg, duration = 3000) {
            toastMsg.innerText = msg;
            toastMsg.style.display = 'block';
            setTimeout(() => { toastMsg.style.display = 'none'; }, duration);
        }

        // Timer functions
        function updateTimer() {
            if (!callStartTime) return;
            const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            timerDiv.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }
        function startTimer() { callStartTime = Date.now(); if (timerInterval) clearInterval(timerInterval); timerInterval = setInterval(updateTimer, 1000); }
        function stopTimer() { if (timerInterval) clearInterval(timerInterval); timerInterval = null; callStartTime = null; timerDiv.innerText = '00:00'; }

        // Ringtone
        function playRingtone() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            ringtoneContext = ctx;
            const gainNode = ctx.createGain();
            gainNode.gain.value = 0.3;
            gainNode.connect(ctx.destination);
            const playTone = (freq, duration) => new Promise(resolve => {
                const osc = ctx.createOscillator();
                osc.frequency.value = freq;
                osc.type = 'sine';
                osc.connect(gainNode);
                osc.start();
                setTimeout(() => { osc.stop(); resolve(); }, duration);
            });
            const ringPattern = async () => {
                if (!ringtoneContext) return;
                await playTone(440, 400);
                await new Promise(r => setTimeout(r, 200));
                if (!ringtoneContext) return;
                await playTone(440, 400);
                await new Promise(r => setTimeout(r, 200));
                if (!ringtoneContext) return;
                await playTone(440, 400);
                await new Promise(r => setTimeout(r, 800));
                if (ringtoneContext) ringPattern();
            };
            ringPattern();
        }
        function stopRingtone() { if (ringtoneContext) { ringtoneContext.close(); ringtoneContext = null; } }

        // Ensure audio playback (user interaction fallback)
        function ensureAudioPlay() {
            if (remoteAudio.srcObject && !audioEnabledByUser) {
                remoteAudio.play().catch(e => {
                    console.warn('Autoplay blocked:', e);
                    showToast('Click anywhere to enable audio');
                    const enableHandler = () => {
                        remoteAudio.play().then(() => {
                            audioEnabledByUser = true;
                            showToast('Audio enabled');
                        }).catch(err => console.log);
                        document.removeEventListener('click', enableHandler);
                    };
                    document.addEventListener('click', enableHandler);
                });
            }
        }

        // Create RTCPeerConnection with current ICE config (supports relay fallback)
        async function createPeerConnection(forceRelay = false) {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            const config = forceRelay ? { ...iceServers, iceTransportPolicy: 'relay' } : iceServers;
            peerConnection = new RTCPeerConnection(config);
            
            if (localStream) {
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                // Optionally set Opus bitrate
                const sender = peerConnection.getSenders().find(s => s.track?.kind === 'audio');
                if (sender) {
                    const params = sender.getParameters();
                    if (params.encodings) params.encodings[0].maxBitrate = 32000;
                    await sender.setParameters(params).catch(e => console.log);
                }
            }
            
            peerConnection.ontrack = (event) => {
                console.log('ontrack fired');
                remoteAudio.srcObject = event.streams[0];
                ensureAudioPlay();
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice_candidate', { target_id: otherUserId, candidate: event.candidate });
                }
            };
            
            peerConnection.oniceconnectionstatechange = () => {
                const state = peerConnection.iceConnectionState;
                console.log('ICE state:', state);
                if (state === 'connected' || state === 'completed') {
                    callStatusDiv.innerText = 'Connected';
                    if (!callStartTime) startTimer();
                    iceRestartAttempts = 0;
                } else if (state === 'failed') {
                    if (iceRestartAttempts < 3) {
                        iceRestartAttempts++;
                        showToast(`Connection lost, restart attempt ${iceRestartAttempts}...`);
                        callStatusDiv.innerText = `Reconnecting (${iceRestartAttempts}/3)`;
                        // ICE restart without closing
                        peerConnection.createOffer({ iceRestart: true }).then(offer => {
                            return peerConnection.setLocalDescription(offer);
                        }).then(() => {
                            socket.emit('renegotiate', { target_id: otherUserId, offer: peerConnection.localDescription });
                        }).catch(e => console.log);
                    } else if (iceRestartAttempts === 3) {
                        // Force relay mode as last resort
                        showToast('Switching to relay mode...');
                        callStatusDiv.innerText = 'Switching to relay...';
                        iceRestartAttempts = 4; // prevent infinite loop
                        const currentStream = localStream;
                        const tracks = currentStream ? currentStream.getTracks() : [];
                        createPeerConnection(true).then(async (pc) => {
                            if (currentStream) tracks.forEach(t => pc.addTrack(t, currentStream));
                            const offer = await pc.createOffer();
                            await pc.setLocalDescription(offer);
                            socket.emit('renegotiate', { target_id: otherUserId, offer: pc.localDescription });
                        }).catch(e => endCall('Relay failed'));
                    } else {
                        endCall('Connection failed');
                    }
                } else if (state === 'disconnected') {
                    showToast('Connection unstable...');
                }
            };
            
            return peerConnection;
        }

        // -------------------- Call signaling --------------------
        async function initiateCall() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
                const pc = await createPeerConnection(false);
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                socket.emit('call_user', { target_id: otherUserId, call_type: callType, offer: pc.localDescription });
                callStatusDiv.innerText = 'Ringing...';
                const timeoutId = setTimeout(() => {
                    if (peerConnection?.iceConnectionState !== 'connected') endCall('No answer');
                }, 30000);
                socket.once('call_answered', async (data) => {
                    clearTimeout(timeoutId);
                    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                });
                socket.once('call_rejected', () => { clearTimeout(timeoutId); endCall('Call rejected'); });
                socket.once('call_timeout', () => { clearTimeout(timeoutId); endCall('No answer'); });
            } catch (err) {
                console.error(err);
                endCall('Microphone error');
            }
        }
        
        async function acceptIncomingCall(callerId, offerSdp) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
                const pc = await createPeerConnection(false);
                await pc.setRemoteDescription(new RTCSessionDescription(offerSdp));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.emit('answer_call', { caller_id: callerId, answer: pc.localDescription, call_type: callType });
                callStatusDiv.innerText = 'Connecting...';
                incomingPopup.style.display = 'none';
                stopRingtone();
            } catch (err) {
                console.error(err);
                endCall();
            }
        }
        
        function endCall(reason = '') {
            stopTimer();
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (peerConnection) peerConnection.close();
            socket.emit('end_call', { target_id: otherUserId });
            stopRingtone();
            if (reason) callStatusDiv.innerText = reason;
            setTimeout(() => window.location.href = "{{ url_for('chat', user_id=other_user.id) }}", 1000);
        }
        
        // UI controls
        function toggleMute() {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(track => track.enabled = !isMuted);
            muteBtn.classList.toggle('active', isMuted);
            muteBtn.innerHTML = isMuted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
        }
        function toggleSpeaker() { showToast('Adjust system volume'); }
        function toggleHold() {
            if (!localStream) return;
            isOnHold = !isOnHold;
            localStream.getAudioTracks().forEach(track => track.enabled = !isOnHold);
            holdBtn.classList.toggle('active', isOnHold);
            holdBtn.innerHTML = isOnHold ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
            callStatusDiv.innerText = isOnHold ? 'Call on hold' : (peerConnection?.iceConnectionState === 'connected' ? 'Connected' : 'Connecting...');
        }
        
        muteBtn.onclick = toggleMute;
        speakerBtn.onclick = toggleSpeaker;
        holdBtn.onclick = toggleHold;
        endCallBtn.onclick = () => endCall();
        
        // Socket events
        socket.on('incoming_call', (data) => {
            if (data.caller_id === otherUserId) {
                callerNameSpan.innerText = data.caller_name;
                incomingPopup.style.display = 'flex';
                playRingtone();
                acceptCallBtn.onclick = () => { stopRingtone(); acceptIncomingCall(data.caller_id, data.offer); };
                rejectCallBtn.onclick = () => { stopRingtone(); socket.emit('reject_call', { caller_id: data.caller_id }); endCall(); };
            }
        });
        
        socket.on('call_answered', async (data) => {
            if (peerConnection && peerConnection.signalingState === 'have-local-offer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
        });
        
        socket.on('ice_candidate', async (data) => {
            if (peerConnection) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                } catch (e) { console.warn('ICE candidate error', e); }
            }
        });
        
        socket.on('call_ended', () => endCall());
        socket.on('call_rejected', () => endCall('Call rejected'));
        socket.on('call_timeout', () => endCall('No answer'));
        socket.on('call_error', (err) => endCall(err.message));
        
        // Renegotiation support
        socket.on('renegotiate', async (data) => {
            if (peerConnection && data.offer) {
                try {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    socket.emit('renegotiate_answer', { target_id: data.target_id, answer });
                } catch (e) { console.log('renegotiate error', e); }
            }
        });
        socket.on('renegotiate_answer', async (data) => {
            if (peerConnection && peerConnection.signalingState === 'have-local-offer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
        });
        
        // Start call
        if (window.pendingCall) {
            const pending = window.pendingCall;
            const doAccept = () => { acceptIncomingCall(pending.callerId, pending.offer); };
            if (socket.connected) doAccept(); else socket.once('connect', doAccept);
        } else if (isCaller) {
            initiateCall();
        } else {
            callStatusDiv.innerText = 'Waiting for call...';
        }
    </script>
</body>
</html>
